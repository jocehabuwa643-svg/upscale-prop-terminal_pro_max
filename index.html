        const fetchWithTimeout = async (url, options = {}) => {
            const { timeout = 4000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id); return response;
            } catch(e) { clearTimeout(id); throw e; }
        };

        const ScannerAPI = {
          async getCandles(symbol, count = 1000, interval = '1h') { 
            const endpoints = ['https://api.binance.com', 'https://api1.binance.com', 'https://api2.binance.com', 'https://api3.binance.com', 'https://data-api.binance.vision'];
            for (let retry = 0; retry < 3; retry++) {
                for (let base of endpoints) {
                    try {
                        let allKlines = []; let remaining = count; let endTime = null;
                        while(remaining > 0) {
                            let batch = Math.min(remaining, 1000);
                            let url = `${base}/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${batch}`;
                            if (endTime) url += `&endTime=${endTime}`;
                            const controller = new AbortController();
                            const id = setTimeout(() => controller.abort(), 4000);
                            let response = await fetch(url, { signal: controller.signal });
                            clearTimeout(id);
                            if (response.ok) {
                                const data = await response.json();
                                if (data.length === 0) break;
                                allKlines = data.concat(allKlines); 
                                endTime = data[0][0] - 1; 
                                remaining -= data.length;
                            } else { throw new Error('API Error'); }

                        return allKlines.map(d => ({
                            time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),

            return [];

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity; let low = Infinity;
                for (let j = 1; j <= period; j++) { high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low); }

            }

        const BookflowButton = React.memo(() => (

        const App = () => {

            const initAudio = () => {

            };

            const playSound = (type) => {
                if (!audioCtxRef.current) return;
                try {
                    const ctx = audioCtxRef.current; if (ctx.state === 'suspended') ctx.resume();
                    const playTone = (freq, oscType, dur, vol, delay = 0) => {
                        try {
                            const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;
                            o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                            g.gain.setValueAtTime(0, ctx.currentTime + delay);
                            g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                            o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                        } catch (e) {}
                    };
                    if (type === 'startup') { playTone(440, 'sine', 0.2, 0.05); playTone(554.37, 'sine', 0.2, 0.05, 0.1); playTone(659.25, 'sine', 0.4, 0.05, 0.2); }
                    if (type === 'tick') { playTone(800 + Math.random()*200, 'sine', 0.05, 0.015); }
                    if (type === 'playback-end') { playTone(523.25, 'triangle', 0.1, 0.05); playTone(659.25, 'triangle', 0.2, 0.05, 0.1); }
                    if (type === 'signal') { playTone(880, 'square', 0.1, 0.04); playTone(1760, 'square', 0.2, 0.04, 0.1); }
                    if (type === 'win') { playTone(523.25, 'triangle', 0.2, 0.05); playTone(659.25, 'triangle', 0.2, 0.05, 0.1); playTone(783.99, 'triangle', 0.4, 0.05, 0.2); playTone(1046.50, 'triangle', 0.6, 0.05, 0.3); }
                    if (type === 'loss') { playTone(250, 'triangle', 0.4, 0.06); playTone(230, 'triangle', 0.6, 0.06, 0.3); }
                    if (type === 'zone') { playTone(400, 'sine', 0.3, 0.04); playTone(600, 'sine', 0.4, 0.04, 0.15); }
                    if (type === 'alert') playTone(800, 'square', 0.1, 0.05);
                    if (type === 'partial') { playTone(600, 'sine', 0.2, 0.05); playTone(900, 'sine', 0.2, 0.05, 0.1); }
                } catch(e){}
            };

            const enqueueSpeech = useCallback((text, key = null, dedupeMs = 60000) => {
                if (key) {
                    const now = Date.now();
                    if (lastSpokenKeysRef.current[key] && (now - lastSpokenKeysRef.current[key]) < dedupeMs) return;
                    lastSpokenKeysRef.current[key] = now; 
                }
                speechQueueRef.current.push(text); processSpeechQueue();
            }, []);

            const processSpeechQueue = () => {
                if (isSpeakingRef.current || speechQueueRef.current.length === 0) return;
                isSpeakingRef.current = true; const text = speechQueueRef.current.shift();
                try {
                    if (!window.speechSynthesis) throw new Error("No speech synthesis");
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'ru-RU'; utterance.rate = 1.05; utterance.pitch = 0.90;
                    let isFinished = false;
                    const completeSpeech = () => {
                        if (isFinished) return;
                        isFinished = true; isSpeakingRef.current = false;
                        setTimeout(processSpeechQueue, 300); 
                    };
                    utterance.onend = completeSpeech; utterance.onerror = completeSpeech;
                    window.speechSynthesis.cancel(); setTimeout(() => window.speechSynthesis.speak(utterance), 50); 
                } catch (e) { isSpeakingRef.current = false; setTimeout(processSpeechQueue, 300); }
            };

            useEffect(() => {
                const fetchNews = async () => {
                    try {
                        const res = await fetchWithTimeout('https://api.rss2json.com/v1/api.json?rss_url=https://lenta.ru/rss/news', { timeout: 6000 });
                        if (res.ok) {
                            const data = await res.json();
                            if (data?.items?.length > 0) {
                                const headlines = data.items.map(i => i.title); setNewsData(headlines); setCurrentNews(headlines[0]);
                                return;
                            }
                        }
                    } catch (e) {}
                    setNewsData(FALLBACK_NEWS); setCurrentNews(FALLBACK_NEWS[0]);
                };
                fetchNews(); const intId = setInterval(fetchNews, 60 * 60 * 1000); return () => clearInterval(intId);
            }, []);

            useEffect(() => {
                if (!isStarted || newsData.length === 0) return;
                const readNews = () => {
                    const randomNews = newsData[Math.floor(Math.random() * newsData.length)];
                    enqueueSpeech(`Сводка новостей. ${randomNews}`, `news-broadcast-${Date.now()}`, 0);

                const initialTimeout = setTimeout(readNews, 300000);

            useEffect(() => {
                if (!isStarted || newsData.length === 0) return;
                let idx = 0; const rotInt = setInterval(() => { idx = (idx + 1) % newsData.length; setCurrentNews(newsData[idx]); }, 8000); return () => clearInterval(rotInt); 
            }, [isStarted, newsData]);

            useEffect(() => {
                if (slCountdown > 0) { playSound('alert'); const timer = setTimeout(() => setSlCountdown(c => c - 1), 1000); return () => clearTimeout(timer); } 
                else if (slCountdown === 0) { setSlCountdown(null); }
            }, [slCountdown]);

            const updateTradeHistory = (newHistory) => { tradesHistoryRef.current = newHistory; setTradesHistory([...newHistory]); };
            
            const updateBalance = (pnlAmount) => {
                propBalanceRef.current += pnlAmount; totalPnLRef.current += pnlAmount;
                if (propBalanceRef.current > peakBalanceRef.current) peakBalanceRef.current = propBalanceRef.current;

                setPropBalance(propBalanceRef.current); setTotalPnL(totalPnLRef.current);
            };

            const setLiveTrade = (trade) => { activeTradeRef.current = trade; setActiveTrade(trade ? {...trade} : null); };

            const initChart = async () => {
                if (!chartContainerRef.current) return false;
                if (chartInstance.current) return true;

                let attempts = 0;

                    await new Promise(r => setTimeout(r, 500));

                }

                if (!window.LightweightCharts) {

                try {

                    const chart = window.LightweightCharts.createChart(chartContainerRef.current, {

                    candleSeries.current = chart.addCandlestickSeries({

                    chartInstance.current = chart;

                    const ro = new ResizeObserver(() => {

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            const runEngine = async () => {
                if (engineActive.current) return; engineActive.current = true;
                
                setAppState('BACKTEST');
                setAppPhase('ЧЕСТНЫЙ БЭКТЕСТ (1H ФОКУС): ЗАГРУЗКА...');
                
                const fetchWithRetry = async (sym, cnt, int) => {
                    let retries = 0;
                    while(engineActive.current && retries < 5) {

                            const data = await ScannerAPI.getCandles(sym, cnt, int);

                        setAppPhase(`ОШИБКА АПИ. ПОВТОРНАЯ ПОПЫТКА ${retries + 1}/5...`);
                        await sleep(3000);
                        retries++;
                    }
                    return [];
                };

                const data4h = await fetchWithRetry('BTCUSDT', 300, '4h');
                const data1h = await fetchWithRetry('BTCUSDT', 750, '1h');
                const data15m = await fetchWithRetry('BTCUSDT', 3000, '15m');
                
                if (!data1h.length || !data15m.length || !data4h.length) {
                    setAppPhase('КРИТИЧЕСКАЯ ОШИБКА ДАННЫХ. ОСТАНОВКА.'); return;
                }

                setAppPhase('БЭКТЕСТ: СИМУЛЯЦИЯ ПО СТРОГИМ ПРАВИЛАМ...');
                
                await initChart();
                if (candleSeries.current) {
                    try {

                        setTimeout(() => { try { if (chartInstance.current) chartInstance.current.timeScale().fitContent(); } catch(e){} }, 100); 
                    } catch(e){}
                }

                const liq1H = calcLiquidityZones(data1h, 30);
                const atr1H = calcATRSeries(data1h, 14);
                const trend1H = calcTrendSeries(data1h, 20);
                const trend4H = calcTrendSeries(data4h, 20);
                const regime1H = calcMarketRegime(data1h, 20, 50);

                const lMap1H = new Map(liq1H.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const aMap1H = new Map(atr1H.map(i => [i.time, i.value]));
                const tMap1H = new Map(trend1H.map(i => [i.time, i.trend]));
                const tMap4H = new Map(trend4H.map(i => [i.time, i.trend]));
                const rMap1H = new Map(regime1H.map(i => [i.time, i.regime]));

                let histTrades = []; let simBalance = propBalanceRef.current; let simPeak = simBalance;
                const startIdx = Math.max(50, data15m.length - 2880); 
                
                let btEngineState = { 
                    forcedDirection: null, 
                    consecutiveLosses: 0, 
                    dailyLosses: 0, 
                    currentDay: 0, 
                    securityPauseUntil: 0, 
                    pauses: [], 
                    focus1HMode: false
                };

                let t1HForBacktestEnd = null;

                for (let i = startIdx; i < data15m.length - 2; i++) {
                    if (i % 50 === 0) await sleep(1);
                    
                    const tStamp = data15m[i].time; const cDay = Math.floor(tStamp / 86400);
                    if (btEngineState.currentDay !== cDay) { btEngineState.currentDay = cDay; btEngineState.dailyLosses = 0; }
                    
                    if (tStamp < btEngineState.securityPauseUntil) continue;
                    if (btEngineState.focus1HMode && tStamp > btEngineState.securityPauseUntil) { btEngineState.focus1HMode = false; }

                    const sig = evaluateSignalEngineHybrid(data15m, i, lMap1H, aMap1H, tMap1H, tMap4H, rMap1H, btEngineState);
                    t1HForBacktestEnd = getLatestClosedHTFOpenTime(tStamp + 900, 3600);
                    
                    if (sig.valid) {
                        const riskAmount = simBalance * RISK_PERCENT; 
                        let trade = {
                            id: `hist_${sig.signalTime}`, tf: '15M', isLong: sig.isLong, type: sig.isLong ? 'LONG' : 'SHORT',
                            entryPrice: sig.entryPrice, slPrice: sig.slPrice, level1R: sig.level1R, levelTarget: sig.levelTarget, R_value: sig.R_value,
                            startTime: sig.signalTime, score: sig.score, pattern: sig.signalType,
                            stakeAmount: riskAmount, logicalIndex: i, 
                            isPartialClosed: false, trailingSL: sig.slPrice, targetPercent: sig.targetPercent, decision: sig.decision,
                            isReverse: btEngineState.forcedDirection !== null, announcedTPs: {}
                        };
                        
                        let pnl = 0; let isPartialClosed = false; let trailingSL = trade.slPrice;
                        let closePrice = 0; let closeTime = 0; let result = '';
                        let rPart1 = -1; let rPart2 = -1;

                        for (let j = i + 1; j < data15m.length; j++) {
                            const c = data15m[j]; const prevC = data15m[j-1];
                            if (trade.isLong) {
                                if (c.low <= trailingSL) {
                                    closePrice = trailingSL; closeTime = c.time;
                                    if (!isPartialClosed) { pnl = -riskAmount; result = 'LOSS'; rPart1 = -1; rPart2 = -1; } 
                                    else { let p2R = (trailingSL - trade.entryPrice) / trade.R_value; rPart2 = p2R; pnl = ((riskAmount/2) * rPart1) + ((riskAmount/2) * p2R); result = 'WIN (TRAILED)'; }

                                {activeTrade ? (
                                    <div className="flex flex-col gap-1.5 text-[11px] font-mono mt-1">
                                        <div className="flex justify-between items-center text-slate-300"><span>Направление:</span><div className="flex items-center gap-1"><span className={`font-black uppercase px-2 py-0.5 rounded ${activeTrade.isLong ? 'bg-[#e9d5ff]/20 text-[#e9d5ff]' : 'bg-rose-900/50 text-rose-400'}`}>{activeTrade.type} 15M</span>{activeTrade.isReverse && <span className="bg-amber-600/30 text-amber-400 px-1 py-0.5 rounded text-[8px]">REV</span>}</div></div>
                                        <div className="flex justify-between items-center text-slate-300"><span>Паттерн:</span><span className="text-purple-300 font-bold tracking-wider">{activeTrade.pattern}</span></div>
                                        <div className="flex justify-between items-center text-slate-300"><span>Управление:</span><span className="bg-indigo-600/30 text-indigo-300 px-1.5 py-0.5 rounded font-black border border-indigo-500/50">{activeTrade.decision === 'TRAIL' ? `ТРЕЙЛИНГ (ДО +${activeTrade.targetPercent}%)` : `ФИКС (${activeTrade.targetPercent}%)`}</span></div>
                                        <div className="mt-1 bg-black/30 p-2 rounded border border-white/5 flex flex-col gap-1"><div className="flex justify-between text-slate-400"><span>Вход:</span><span className="text-white">{formatPrice(activeTrade.entryPrice)}</span></div><div className="flex justify-between text-slate-400"><span>Стоп-Лосс:</span><span className={activeTrade.isPartialClosed ? 'text-amber-400' : 'text-rose-400'}>{formatPrice(activeTrade.trailingSL)}</span></div><div className="flex justify-between text-slate-400"><span>Тейк (Цель):</span><span className="text-emerald-400">{formatPrice(activeTrade.levelTarget)}</span></div></div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center justify-center h-[100px] gap-2 text-slate-400">{appState === 'SCANNING' ? <Radar size={24} className="animate-spin text-purple-500 opacity-60" /> : <Clock size={24} className="text-slate-600" />}<span className="text-[10px] font-mono font-bold uppercase tracking-widest text-center">{appState === 'SCANNING' ? 'Поиск паттернов...' : 'Ожидание...'}</span></div>
                                )}
                            </div>

                            <div className="flex-1 luxury-card rounded-2xl p-4 flex flex-col overflow-hidden">
                                <h3 className="text-[11px] font-black tracking-widest text-slate-200 uppercase oswald-font mb-2 border-b border-purple-500/30 pb-1.5 flex justify-between"><span>Журнал (15M)</span><span className="text-emerald-500/70 text-[9px] border border-emerald-500/30 px-1.5 rounded bg-emerald-900/20">ВЕСЬ ПОТОК (100%)</span></h3>
                                <div className="flex-1 overflow-y-auto journal-scroll pr-2 flex flex-col gap-2">
                                    {tradesHistory.length === 0 ? (<div className="text-[10px] text-slate-500 text-center font-mono mt-4">Ожидание сделок...</div>) : tradesHistory.map((t, idx) => (
                                        <div key={t.id || idx} className={`p-2.5 rounded-xl border flex flex-col gap-1.5 transition-all cursor-default group ${t.pnl > 0 ? 'bg-[#0f182b]/80 border-emerald-500/20 hover:border-emerald-500/40' : 'bg-[#1a0f14]/80 border-rose-500/10 hover:border-rose-500/30'}`}>
                                            <div className="flex justify-between items-center">
                                                <div className="flex gap-2 items-center"><span className={`text-[9px] font-black tracking-widest uppercase px-1.5 py-0.5 rounded shadow-inner ${t.type === 'LONG' ? 'bg-[#e9d5ff]/20 text-[#e9d5ff] border border-[#e9d5ff]/30' : 'bg-rose-900/40 text-rose-400 border border-rose-500/20'}`}>{t.type}</span>{t.isReverse && <span className="bg-amber-600/30 text-amber-400 px-1 py-0.5 rounded text-[7px] font-black shadow-inner">REV</span>}<span className="text-[8px] text-slate-400 font-bold truncate max-w-[80px]" title={t.pattern}>{t.pattern}</span></div>
                                                <div className="flex flex-col items-end"><span className={`text-[11px] font-black ${t.pnl > 0 ? 'text-emerald-400' : 'text-rose-500'}`}>{t.pnl > 0 ? '+' : ''}{t.pnl?.toFixed(2)}$</span><span className={`text-[9px] font-bold ${t.pnl > 0 ? 'text-emerald-500' : 'text-rose-600'}`}>{t.pnl > 0 ? '+' : ''}{t.effectivePricePercent?.toFixed(2)}%</span></div>
                                            </div>
                                            <div className="flex justify-between text-[9px] font-mono text-slate-500 group-hover:text-slate-400 transition-colors">
                                                <span>IN: {formatPrice(t.entryPrice)}</span><div className="flex gap-2">{t.result.includes('WIN') ? <span className="text-emerald-400/80 font-bold">КАЧЕСТВО</span> : <span className="text-rose-500">SL</span>}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const RootApp = () => ( <ErrorBoundary><App /></ErrorBoundary> );

        // БЕЗОПАСНАЯ ИНИЦИАЛИЗАЦИЯ REACT (Игнорируем window.onload для babel-standalone)
        const startApp = () => {
            try {
                const rootElement = document.getElementById('root');
                if (!rootElement) return;
                
                const root = window.ReactDOM.createRoot(rootElement);
                root.render(<RootApp />);
            } catch (error) {
                console.error("Критическая ошибка запуска React:", error);
                const r = document.getElementById('root');
                if (r) {
                    r.innerHTML = `
                        <div style="height:100vh; width:100vw; background:#030108; color:#f43f5e; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:monospace; text-align:center; padding:20px;">
                            <h2 style="font-size:24px; font-weight:bold; margin-bottom:10px;">СИСТЕМНЫЙ СБОЙ ИНИЦИАЛИЗАЦИИ</h2>
                            <p style="max-width:600px; color:#fecdd3;">${error.message}</p>
                        </div>
                    `;
                }
            }
        };

        // Запуск с небольшой задержкой гарантирует, что DOM готов после отработки Babel
        setTimeout(startApp, 50);

    </script>
</body>
</html>
