        /* --- BOOKFLOW BUTTON --- */

        .trade-glass-box {
            background: rgba(15, 23, 42, 0.6);

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const suppressResizeObserverErrors = () => {
            window.addEventListener('error', e => {
                if (e.message?.includes('ResizeObserver')) { e.stopImmediatePropagation(); e.preventDefault(); }
            });
        };
        suppressResizeObserverErrors();

        // Icons
        const Shield = React.memo(({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 4.81 17 6 19 6a1 1 0 0 1 1 1z"/></svg>);
        const Cpu = React.memo(({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>);
        const Activity = React.memo(({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>);
        const Globe = React.memo(({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>);
        const Radar = React.memo(({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 5.49A10 10 0 0 0 5.3 19.38"/><path d="M20 8.74A10 10 0 0 1 17.38 20"/><path d="M16 8a6 6 0 0 0-8.5-1.5"/><path d="M7.5 16.5a6 6 0 0 0 9.2-.5"/><path d="M12 12v.01"/></svg>);
        const MousePointer = React.memo(({ size=24, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" stroke="#0f172a" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                <path d="M13 13l6 6"/>
            </svg>
        ));
        const ArrowUp = React.memo(({ className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={`arrow-icon ${className}`}><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        ));
        const ArrowDown = React.memo(({ className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={`arrow-icon ${className}`}><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
        ));

        // Core Configuration
        const INITIAL_BALANCE = 5000;
        const BASE_RISK_PERCENT = 0.0075; 
        const TRADING_PAIRS = ['BTCUSDT', 'WLDUSDT', 'TONUSDT', 'TRXUSDT', 'SOLUSDT', 'DOGEUSDT'];
        
        const fetchWithTimeout = async (url, options = {}) => {
            const { timeout = 4000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id); return response;
            } catch(e) { clearTimeout(id); throw e; }
        };

        const ScannerAPI = {
          async getCandles(symbol, count = 1000, interval = '5m') { 
            const endpoints = [
                'https://api.binance.com', 'https://api1.binance.com',
                'https://api2.binance.com', 'https://api3.binance.com',
                'https://data-api.binance.vision'
            ];
            
            for (let retry = 0; retry < 3; retry++) {
                for (let base of endpoints) {
                    try {
                        const controller = new AbortController();
                        const id = setTimeout(() => controller.abort(), 4000);
                        let response = await fetch(`${base}/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`, { signal: controller.signal });
                        clearTimeout(id);
                        
                        if (response.ok) {
                            const data = await response.json();
                            return data.map(d => ({
                                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                                low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
                            }));
                        }
                    } catch(e) {}
                }
                await new Promise(r => setTimeout(r, 1500));
            }
            return null; 
          }
        };

        const formatPrice = (p) => p ? p.toFixed(4) : '0.00';
        
        // Deduplicate data to prevent Lightweight Charts errors
        const dedupeData = (data) => {
            if (!data) return [];
            return Array.from(new Map(data.map(item => [item.time, item])).values()).sort((a,b)=>a.time - b.time);
        };

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity; let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0; let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j]; const prevC = data[i - j - 1];
                    let tr = Math.max( c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close) );
                    sumTR += tr; count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function evaluateSignalEngine(data, evalIdx, liqMap, atrMap, engineState, timeframeLabel = "5M", pair = "BTCUSDT") {
            if (evalIdx < 50) return { valid: false, score: 0 };

            const currCandle = data[evalIdx];
            const prevCandle = data[evalIdx - 1];
            const currTime = currCandle.time;
            
            const zones = liqMap.get(currTime);
            const cAtr = atrMap.get(currTime);
            
            if (!zones || !cAtr) return { valid: false, score: 0 };

            const cUpper = zones.upper;
            const cLower = zones.lower;
            
            const candleRange = currCandle.high - currCandle.low;
            if (candleRange === 0) return { valid: false, score: 0 };

            const upperWick = currCandle.high - Math.max(currCandle.open, currCandle.close);
            const lowerWick = Math.min(currCandle.open, currCandle.close) - currCandle.low;
            const isRedCandle = currCandle.close < currCandle.open;
            const isGreenCandle = currCandle.close > currCandle.open;

            let PASS_THRESHOLD = 50; 

            const sweptTop = currCandle.high >= (cUpper - cAtr * 0.8);
            const sweptBot = currCandle.low <= (cLower + cAtr * 0.8);

            const isStrongRejectionShort = sweptTop && (isRedCandle || (upperWick / candleRange) > 0.4);
            const isStrongRejectionLong = sweptBot && (isGreenCandle || (lowerWick / candleRange) > 0.4);

            let isLong = false; let isShort = false; let signalType = ''; let baseScore = 40;

            if (isStrongRejectionShort) {
                isShort = true; signalType = 'Снятие ликвидности SMC'; baseScore += 25;
            }
            if (isStrongRejectionLong) {
                isLong = true; signalType = 'Снятие ликвидности SMC'; baseScore += 25;
            }

            if (engineState.forcedDirection === 'LONG' && isShort) return { valid: false, score: 0 };
            if (engineState.forcedDirection === 'SHORT' && isLong) return { valid: false, score: 0 };

            if (!isLong && !isShort) return { valid: false, score: 0 };
            if (isLong && isShort) return { valid: false, score: 0 };

            let qScore = baseScore + Math.floor(Math.random() * 20);
            if (qScore < PASS_THRESHOLD) return { valid: false, score: qScore };

            const entryPrice = currCandle.close;
            let rawSlPrice = isLong ? Math.min(currCandle.low, prevCandle.low) - (cAtr * 0.2) : Math.max(currCandle.high, prevCandle.high) + (cAtr * 0.2);
            
            const slDistancePercent = Math.abs(entryPrice - rawSlPrice) / entryPrice;
            if (slDistancePercent > 0.015) return { valid: false, score: 0 }; 
            
            let slPrice = rawSlPrice;
            if (slDistancePercent < 0.001) slPrice = isLong ? entryPrice * 0.999 : entryPrice * 1.001; 

            const tp1Price = isLong ? entryPrice * 1.008 : entryPrice * 0.992;
            const tp2Price = isLong ? entryPrice * 1.010 : entryPrice * 0.990;
            const tp3Price = isLong ? entryPrice * 1.013 : entryPrice * 0.987;

            return { 
                valid: true, isLong, isShort, signalType, score: Math.min(100, qScore), 
                signalTime: currTime, entryPrice, slPrice, tp1Price, tp2Price, tp3Price,
                tf: timeframeLabel, pair: pair, cUpper, cLower, logicalIndex: evalIdx
            };
        }

        // Subcomponents
        const CompactSpeedometer = React.memo(({ value, label, color }) => {
            const safeValue = isNaN(value) ? 50 : Math.max(0, Math.min(100, value));
            const angle = -90 + (safeValue / 100) * 180;
            const radius = 25; const circumference = Math.PI * radius;
            const strokeDashoffset = circumference - (safeValue / 100) * circumference;

            return (
                <div className="flex flex-col items-center justify-center px-3 py-1 relative">
                    <svg viewBox="0 0 80 45" className="w-12 h-6 overflow-visible relative z-10 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
                        <path d="M 10 40 A 30 30 0 0 1 70 40" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="5" strokeLinecap="round" />
                        <path d="M 10 40 A 30 30 0 0 1 70 40" fill="none" stroke={color} strokeWidth="5" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} className="transition-all duration-1000 ease-out" filter={`drop-shadow(0 0 6px ${color})`} />
                        <g style={{ transform: `rotate(${angle}deg)`, transformOrigin: '40px 40px', transition: 'transform 1s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
                            <polygon points="38,40 42,40 40,12" fill="#fff" filter="drop-shadow(0 0 3px rgba(255,255,255,0.8))" />
                            <circle cx="40" cy="40" r="4" fill="#fff" />
                            <circle cx="40" cy="40" r="1.5" fill="#0f172a" />
                        </g>
                    </svg>
                    <div className="flex items-center gap-2 mt-1">
                        <span className="text-[8px] text-slate-400 font-bold tracking-[0.1em] uppercase leading-none">{label}</span>
                        <span className="text-[10px] font-black oswald-font leading-none" style={{color, textShadow: `0 0 8px ${color}`}}>{Math.round(safeValue)}</span>
                    </div>
                </div>
            );
        });

        const TrendPixels = React.memo(() => {
            const [pixels, setPixels] = useState([]);
            useEffect(() => {
                const generate = () => Array.from({length: 24}).map(() => {
                    const r = Math.random();
                    return r > 0.6 ? 'text-emerald-500' : r < 0.4 ? 'text-rose-500' : 'text-slate-600';
                });
                setPixels(generate());
                const int = setInterval(() => setPixels(generate()), 3000);
                return () => clearInterval(int);
            }, []);

            return (
                <div className="flex items-center gap-[2px] bg-slate-900/60 p-1.5 rounded-lg border border-slate-700/50">
                    {pixels.map((color, i) => (
                        <div key={i} className={`w-1.5 h-1.5 rounded-sm pixel-pulse ${color} bg-current`} style={{animationDelay: `${i*0.1}s`}}></div>
                    ))}
                </div>
            );
        });

        const OrderBookDepth = React.memo(({ price }) => {
            const p = price || 0;
            if (!p) return <div className="text-xs text-slate-500 font-bold p-2">СИНХРОНИЗАЦИЯ...</div>;
            const formattedP = formatPrice(p); const step = p > 100 ? 0.5 : p > 1 ? 0.005 : 0.00005;
            
            return (
                <div className="flex flex-col mono-font text-slate-100 border-l border-purple-500/20 px-3 justify-center h-full w-full relative">
                    <div className="flex justify-between text-slate-400 mb-1 border-b border-purple-500/20 pb-1 text-[10px] tracking-widest font-bold uppercase"><span>Цена</span><span>Объем</span></div>
                    <div className="space-y-0.5 mt-1 relative z-10">
                        {[...Array(3)].map((_, i) => {

                                tp1Box.style.top = `${Math.min(yE, yTP1)}px`; tp1Box.style.height = `${Math.abs(yTP1 - yE)}px`;

                                tp3Box.style.left = `${left}px`; tp3Box.style.width = `${w}px`;
                                tp3Box.style.top = `${Math.min(yTP1, yTP3)}px`; tp3Box.style.height = `${Math.abs(yTP3 - yTP1)}px`;

                                const arrow = actContainer.querySelector('.entry-arrow');
                                arrow.style.left = `${xE - 12}px`;
                                arrow.style.top = `${activeTrade.isLong ? yE + 20 : yE - 40}px`;

                            actContainer.style.display = 'none';
                        }
                    }

                    // Zone Focus Capsule
                    const capsule = overlayRef.current.querySelector('.zone-capsule');
                    if (capsule && zoneInfo && isFocusMode) {
                        const zX = timeScale.timeToCoordinate(zoneInfo.time);
                        const zTop = series.priceToCoordinate(zoneInfo.top);
                        const zBot = series.priceToCoordinate(zoneInfo.bottom);
                        
                        if (zX !== null && zTop !== null && zBot !== null) {
                            capsule.classList.add('active');
                            const minY = Math.min(zTop, zBot);

                    } else if (capsule) {
                        capsule.classList.remove('active');
                    }

                    rafId = requestAnimationFrame(loop);
                };

                rafId = requestAnimationFrame(loop);
                return () => { isActive = false; cancelAnimationFrame(rafId); };
            }, [chart, series, trades, activeTrade, zoneInfo, isFocusMode, replayTrade, showHistoricalTrades, activePair]);

            const allTradesToRender = replayTrade ? [...trades, replayTrade] : trades;

            return (

                            style={{ display: 'none' }}
                            onMouseEnter={(e) => {
                                const rect = e.currentTarget.getBoundingClientRect();
                                const containerRect = overlayRef.current.getBoundingClientRect();
                                setHoverPos({ x: rect.left - containerRect.left + rect.width / 2, y: rect.top - containerRect.top });

                            onMouseLeave={() => setHoveredTrade(null)}
                        >
                            <div className="absolute -top-4 left-1 text-[8px] font-bold text-white drop-shadow-md pointer-events-none">

                            </div>

                    ))}
                    
                    <div className={`zone-capsule ${zoneInfo?.type === 'RESISTANCE' ? 'zone-capsule-res' : 'zone-capsule-sup'}`}>

                    {/* Russian Detailed Tooltip */}
                    {hoveredTrade && (
                        <div 
                            className="absolute z-50 bg-slate-900/95 border border-purple-500/50 p-3 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.8)] pointer-events-none transform -translate-x-1/2 -translate-y-[110%] w-[220px]"
                            style={{ left: hoverPos.x, top: hoverPos.y }}
                        >
                            <div className="flex justify-between items-center border-b border-slate-700 pb-1 mb-2">
                                <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded ${hoveredTrade.isLong ? 'bg-purple-900/60 text-purple-300' : 'bg-slate-700/60 text-slate-300'}`}>
                                    {hoveredTrade.isLong ? 'Лонг' : 'Шорт'}
                                </span>
                                <span className={`text-xs font-black ${hoveredTrade.result?.includes('WIN') ? 'text-emerald-400' : hoveredTrade.result === 'LOSS' ? 'text-rose-400' : 'text-amber-400'}`}>
                                    {hoveredTrade.result?.includes('WIN') ? 'ПРИБЫЛЬ' : hoveredTrade.result === 'LOSS' ? 'УБЫТОК' : 'АКТИВНА'}
                                </span>
                            </div>
                            <div className="flex flex-col gap-1 text-[10px] font-mono text-slate-300">
                                <div className="flex justify-between"><span>Пара:</span> <span className="text-white font-bold">{hoveredTrade.pair}</span></div>
                                <div className="flex justify-between"><span>Сумма сделки:</span> <span className="text-white font-bold">{hoveredTrade.stakeAmount?.toFixed(2)} USDT</span></div>
                                <div className="flex justify-between"><span>Длительность:</span> <span className="text-white">
                                    {hoveredTrade.closeTime ? Math.max(1, Math.round((hoveredTrade.closeTime - hoveredTrade.startTime) / 60)) : Math.max(1, Math.round((Date.now()/1000 - hoveredTrade.startTime) / 60))} мин.
                                </span></div>
                                <div className="flex justify-between"><span>Вход:</span> <span className="text-white">{formatPrice(hoveredTrade.entryPrice)}</span></div>
                                <div className="flex justify-between"><span>Выход:</span> <span className="text-white">{hoveredTrade.closePrice ? formatPrice(hoveredTrade.closePrice) : '---'}</span></div>
                                <div className="flex justify-between mt-1 pt-1 border-t border-slate-700 font-bold text-[11px]">
                                    <span>Результат:</span> 
                                    <span className={hoveredTrade.pnl > 0 ? 'text-emerald-400' : hoveredTrade.pnl < 0 ? 'text-rose-400' : 'text-slate-400'}>
                                        {hoveredTrade.pnl > 0 ? '+' : ''}{hoveredTrade.pnl ? hoveredTrade.pnl.toFixed(2) : '0.00'} USDT
                                    </span>
                                </div>
