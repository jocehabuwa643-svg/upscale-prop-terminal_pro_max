    <script>

            }
        };
        window.addEventListener('error', (e) => showError(e.message, e.filename, e.lineno));

        const ArrowDown = window.React.memo(({ className="" }) => (

        ));

        // Constants & Risk
        const INITIAL_BALANCE = 5000;
        const RISK_TIERS = [0.0075, 0.0075, 0.005]; // 0 losses = 0.75%, 1 loss = 0.75%, 2 losses = 0.5%, 3 losses = Pause
        const MAX_DAILY_DD = 0.025; // 2.5% max drawdown
        const MAIN_TIMEFRAME = 'HYBRID 1H/15M (TRAIL)';

        const fetchWithTimeout = async (url, options = {}) => {
            const { timeout = 4000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id); return response;
            } catch(e) { clearTimeout(id); throw e; }
        };

        const ScannerAPI = {
          async getCandles(symbol, count = 1000, interval = '1h') { 
            const endpoints = [
                'https://api.binance.com', 'https://api1.binance.com',
                'https://api2.binance.com', 'https://api3.binance.com',
                'https://data-api.binance.vision'
            ];
            for (let retry = 0; retry < 3; retry++) {
                for (let base of endpoints) {
                    try {
                        const controller = new AbortController();
                        const id = setTimeout(() => controller.abort(), 4000);
                        let response = await fetch(`${base}/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`, { signal: controller.signal });
                        clearTimeout(id);
                        if (response.ok) {
                            const data = await response.json();
                            return data.map(d => ({
                                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                                low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
                            }));
                        }
                    } catch(e) {}
                }
                await new Promise(r => setTimeout(r, 2000));
            }
            return null; 
          }
        };

        const formatPrice = (p) => p ? p.toFixed(2) : '0.00';

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity; let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0; let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j]; const prevC = data[i - j - 1];
                    let tr = Math.max( c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close) );
                    sumTR += tr; count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function evaluateSignalEngineHybrid(data15m, evalIdx, liqMap1H, atrMap1H, engineState) {
            if (evalIdx < 20) return { valid: false, score: 0 };

            const curr15m = data15m[evalIdx];
            const prev15m = data15m[evalIdx - 1];
            const prev2_15m = data15m[evalIdx - 2];
            
            let t1H = curr15m.time - (curr15m.time % 3600);
            let zones = liqMap1H.get(t1H);
            let cAtr = atrMap1H.get(t1H);
            
            if (!zones || !cAtr) {
                let latest1H = 0;
                for (let t of liqMap1H.keys()) {
                    if (t <= curr15m.time && t > latest1H) latest1H = t;
                }
                zones = liqMap1H.get(latest1H);
                cAtr = atrMap1H.get(latest1H);
            }

            if (!zones || !cAtr) return { valid: false, score: 0 };

            const cUpper = zones.upper;
            const cLower = zones.lower;

            const distTop = cUpper - curr15m.close;
            const distBot = curr15m.close - cLower;
            
            const inResZone = distTop > -cAtr * 1.5 && distTop < cAtr * 2.5;
            const inSupZone = distBot > -cAtr * 1.5 && distBot < cAtr * 2.5;
            
            if (!inResZone && !inSupZone) return { valid: false, score: 0 };

            let sumVol = 0;
            for(let i=1; i<=20; i++) sumVol += data15m[evalIdx-i].volume;
            const avgVol = sumVol / 20;
            const hasVolume = curr15m.volume > avgVol * 1.05;

            const body = Math.abs(curr15m.close - curr15m.open);
            const upperWick = curr15m.high - Math.max(curr15m.close, curr15m.open);
            const lowerWick = Math.min(curr15m.close, curr15m.open) - curr15m.low;

            const isBullish = curr15m.close > curr15m.open;
            const isBearish = curr15m.close < curr15m.open;

            const isBullishRejection = lowerWick > body * 1.2 && isBullish;
            const isBearishRejection = upperWick > body * 1.2 && isBearish;

            const bosShort = curr15m.close < prev15m.low;
            const bosLong = curr15m.close > prev15m.high;

            const isBearFVG = curr15m.high < prev2_15m.low;
            const isBullFVG = curr15m.low > prev2_15m.high;

            let shortConfluence = 0;
            let longConfluence = 0;

            if (inResZone) shortConfluence += 40;
            if (inSupZone) longConfluence += 40;

            if (hasVolume) { shortConfluence += 15; longConfluence += 15; }

            if (isBearishRejection) shortConfluence += 25;
            if (isBullishRejection) longConfluence += 25;

            if (bosShort) shortConfluence += 20;
            if (bosLong) longConfluence += 20;

            if (isBearFVG && isBearish) shortConfluence += 15;
            if (isBullFVG && isBullish) longConfluence += 15;

            let isLong = false; let isShort = false; let patternName = ''; let finalScore = 0;

            if (shortConfluence >= 70 && engineState.forcedDirection !== 'LONG') {
                isShort = true; finalScore = shortConfluence;
                if (isBearishRejection) patternName = 'LIQUIDITY SWEEP';

                if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
                if (type === 'win') { playTone(523.25, 'triangle', 0.4, 0.04); playTone(659.25, 'triangle', 0.5, 0.04, 0.1); playTone(783.99, 'triangle', 0.8, 0.05, 0.2); }
                if (type === 'loss') { playTone(200, 'sawtooth', 0.6, 0.05); playTone(150, 'sawtooth', 0.8, 0.05, 0.2); }
                if (type === 'zone') playTone(350, 'sine', 0.15, 0.05);
                if (type === 'alert') playTone(800, 'square', 0.1, 0.05);
                if (type === 'partial') { playTone(600, 'sine', 0.2, 0.05); playTone(900, 'sine', 0.2, 0.05, 0.1); }
            };

            const enqueueSpeech = useCallback((text, key = null, dedupeMs = 60000) => {
                if (key) {
                    const now = Date.now();
                    if (lastSpokenKeysRef.current[key] && (now - lastSpokenKeysRef.current[key]) < dedupeMs) return;
                    lastSpokenKeysRef.current[key] = now; 
                }
                speechQueueRef.current.push(text);
                processSpeechQueue();
            }, []);

            const processSpeechQueue = () => {
                if (isSpeakingRef.current || speechQueueRef.current.length === 0) return;
                isSpeakingRef.current = true;
                const text = speechQueueRef.current.shift();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU'; utterance.rate = 1.05; utterance.pitch = 0.90;
                
                let isFinished = false;
                const completeSpeech = () => {
                    if (isFinished) return;
                    isFinished = true; isSpeakingRef.current = false;
                    setTimeout(processSpeechQueue, 300); 
                };
                utterance.onend = completeSpeech; utterance.onerror = completeSpeech;

                try { window.speechSynthesis.cancel(); setTimeout(() => window.speechSynthesis.speak(utterance), 50); } 
                catch (e) { completeSpeech(); }
            };

            useEffect(() => {
                if (slCountdown > 0) {
                    playSound('alert');
                    const timer = setTimeout(() => setSlCountdown(c => c - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (slCountdown === 0) {
                    setSlCountdown(null);
                }
            }, [slCountdown]);

            const updateTradeHistory = (newHistory) => {
                tradesHistoryRef.current = newHistory; setTradesHistory([...newHistory]);
            };
            
            const updateBalance = (pnlAmount) => {
                propBalanceRef.current += pnlAmount; 
                totalPnLRef.current += pnlAmount;
                
                if (propBalanceRef.current > peakBalanceRef.current) {
                    peakBalanceRef.current = propBalanceRef.current;
                }
                const currentDD = (peakBalanceRef.current - propBalanceRef.current) / peakBalanceRef.current;
                if (currentDD > maxDDRef.current) {
                    maxDDRef.current = currentDD;
                    setGlobalMaxDD(currentDD);
                }

                setPropBalance(propBalanceRef.current); 
                setTotalPnL(totalPnLRef.current);
            };

            const setLiveTrade = (trade) => {
                activeTradeRef.current = trade; setActiveTrade(trade ? {...trade} : null);
            };

            useEffect(() => {
                const fetchNews = async () => {
                    try {
                        const res = await fetchWithTimeout('https://api.rss2json.com/v1/api.json?rss_url=https://lenta.ru/rss/news', { timeout: 6000 });
                        if (res.ok) {
                            const data = await res.json();
                            if (data?.items?.length > 0) {
                                const headlines = data.items.map(i => i.title);
                                setNewsData(headlines); setCurrentNews(headlines[0]);
                            }
                        }
                    } catch (e) {}
                };
                fetchNews();
                const intId = setInterval(fetchNews, 60 * 60 * 1000); 
                return () => clearInterval(intId);
            }, []);

            useEffect(() => {
                if (!isStarted || newsData.length === 0) return;
                let idx = 0;
                const rotInt = setInterval(() => { idx = (idx + 1) % newsData.length; setCurrentNews(newsData[idx]); }, 8000);
                return () => clearInterval(rotInt); 
            }, [isStarted, newsData]);

            const initChart = async () => {
                if (!chartContainerRef.current) { setTimeout(initChart, 500); return; }
                if (!window.LightweightCharts) {
                    await new Promise(resolve => {
                        const script = document.createElement('script'); script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js';
                        script.onload = resolve; document.head.appendChild(script);
                    });
                }
                if (chartInstance.current) return;

                const chart = window.LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight,
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1', fontFamily: 'JetBrains Mono' },
                    grid: { vertLines: { color: 'rgba(168, 85, 247, 0.05)' }, horzLines: { color: 'rgba(168, 85, 247, 0.05)' } },
                    timeScale: { timeVisible: true, borderVisible: false, rightOffset: 20 }, rightPriceScale: { borderVisible: false }
                });

                candleSeries.current = chart.addCandlestickSeries({ 
                    upColor: '#c084fc', downColor: '#64748b', borderVisible: true, 
                    borderUpColor: '#d946ef', borderDownColor: '#94a3b8', 
                    wickUpColor: '#d946ef', wickDownColor: '#94a3b8' 
                });
                chartInstance.current = chart;

                const ro = new ResizeObserver(() => {
                    if (chartInstance.current && chartContainerRef.current) {
                        chartInstance.current.applyOptions({ width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight });
                    }
                });
                ro.observe(chartContainerRef.current);
            };

            const clearLines = () => {
                if (!candleSeries.current) return;
                analysisLinesRef.current.forEach(l => { try { candleSeries.current.removePriceLine(l); } catch(e){} });
                analysisLinesRef.current = [];
            };

            const drawTradeLines = (trade) => {
                clearLines();
                if (!candleSeries.current || !trade) return;
                
                try {
                    const entryLine = candleSeries.current.createPriceLine({ price: trade.entryPrice, color: trade.isLong ? '#c084fc' : '#64748b', lineWidth: 2, lineStyle: 0, title: 'ENTRY' });
                    
                    let slColor = trade.isPartialClosed ? '#f59e0b' : '#e11d48'; 
                    let slTitle = trade.isPartialClosed ? 'TRAIL SL' : 'STOP LOSS';
                    const slLine = candleSeries.current.createPriceLine({ price: trade.trailingSL || trade.slPrice, color: slColor, lineWidth: 2, lineStyle: 2, title: slTitle });
                    
                    if (!trade.isPartialClosed && trade.level1R) {
                        const r1Line = candleSeries.current.createPriceLine({ price: trade.level1R, color: '#10b981', lineWidth: 2, lineStyle: 2, title: '+1R PARTIAL' });
                        analysisLinesRef.current.push(r1Line);
                    }
                    
                    analysisLinesRef.current.push(entryLine, slLine);
                } catch(e) {}
            };

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            const runEngine = async () => {
                if (engineActive.current) return; engineActive.current = true;
                
                setAppState('BACKTEST');
                setAppPhase('БЭКТЕСТ ЗА 7 ДНЕЙ: ТРЕЙЛИНГ И ФИКСАЦИЯ 50%...');
                
                const fetchWithRetry = async (sym, cnt, int) => {
                    while(engineActive.current) {
                        const data = await ScannerAPI.getCandles(sym, cnt, int);
                        if (data && data.length > 50) return data;
                        setAppPhase('ОШИБКА АПИ. ПОВТОРНАЯ ПОПЫТКА...');
                        await sleep(3000);
                    }
                };

                const data1h = await fetchWithRetry('BTCUSDT', 300, '1h');
                const data15m = await fetchWithRetry('BTCUSDT', 1000, '15m');
                
                await initChart();
                if (candleSeries.current) {
                    candleSeries.current.setData(data15m);
                    setTimeout(() => chartInstance.current.timeScale().fitContent(), 100);
                }

                const liq1H = calcLiquidityZones(data1h, 30);
                const atr1H = calcATRSeries(data1h, 14);
                const lMap1H = new Map(liq1H.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const aMap1H = new Map(atr1H.map(i => [i.time, i.value]));

                let histTrades = []; 
                let simBalance = propBalanceRef.current;
                let simPeak = simBalance;
                
                const startIdx = Math.max(50, data15m.length - 672); 
                let btEngineState = { forcedDirection: null, consecutiveLosses: 0 };

                for (let i = startIdx; i < data15m.length - 2; i++) {
                    if (i % 20 === 0) await sleep(10);

                    const sig = evaluateSignalEngineHybrid(data15m, i, lMap1H, aMap1H, btEngineState);
                    
                    if (sig.valid) {
                        const currentRiskIndex = Math.min(btEngineState.consecutiveLosses, 2);
                        const currentRiskPercent = RISK_TIERS[currentRiskIndex];
                        const riskAmount = simBalance * currentRiskPercent;
                        
                        let trade = {
                            id: `hist_${sig.signalTime}`, tf: '15M', isLong: sig.isLong, type: sig.isLong ? 'LONG' : 'SHORT',
                            entryPrice: sig.entryPrice, slPrice: sig.slPrice, level1R: sig.level1R, R_value: sig.R_value,
                            startTime: sig.signalTime, score: sig.score, pattern: sig.signalType,
                            stakeAmount: riskAmount, logicalIndex: i, 
                            isPartialClosed: false, trailingSL: sig.slPrice
                        };
                        
                        let pnl = 0;
                        let isPartialClosed = false;
                        let trailingSL = trade.slPrice;
                        let closePrice = 0;
                        let closeTime = 0;
                        let result = '';

                        for (let j = i + 1; j < data15m.length; j++) {
                            const c = data15m[j];
                            const prevC = data15m[j-1];

                            if (trade.isLong) {
                                if (c.low <= trailingSL) {
                                    closePrice = trailingSL;
                                    closeTime = c.time;
                                    if (!isPartialClosed) {
                                        pnl = -riskAmount; 
                                        result = 'LOSS';
                                    } else {
                                        let partialPnL = (riskAmount / 2) * ((trailingSL - trade.entryPrice) / trade.R_value);
                                        pnl += partialPnL;
                                        result = 'WIN (TRAILED)';
                                    }
                                    break;
                                }

                                if (!isPartialClosed && c.high >= trade.level1R) {
                                    isPartialClosed = true;
                                    pnl += (riskAmount / 2); 
                                    trailingSL = trade.entryPrice; 
                                }

                                if (isPartialClosed) {
                                    let lowest3 = Math.min(c.low, prevC.low, data15m[j-2]?.low || prevC.low);
                                    let trailPoint = lowest3; 
                                    if (trailPoint > trailingSL) trailingSL = trailPoint;
                                }

                            } else { 
                                if (c.high >= trailingSL) {
                                    closePrice = trailingSL;
                                    closeTime = c.time;
                                    if (!isPartialClosed) {
                                        pnl = -riskAmount;
                                        result = 'LOSS';
                                    } else {
                                        let partialPnL = (riskAmount / 2) * ((trade.entryPrice - trailingSL) / trade.R_value);
                                        pnl += partialPnL;
                                        result = 'WIN (TRAILED)';
                                    }
                                    break;
                                }

                                if (!isPartialClosed && c.low <= trade.level1R) {
                                    isPartialClosed = true;
                                    pnl += (riskAmount / 2);
                                    trailingSL = trade.entryPrice;
                                }

                                if (isPartialClosed) {
                                    let highest3 = Math.max(c.high, prevC.high, data15m[j-2]?.high || prevC.high);
                                    let trailPoint = highest3;
                                    if (trailPoint < trailingSL) trailingSL = trailPoint;
                                }
                            }

                            if (j === data15m.length - 1) {
                                closePrice = c.close; closeTime = c.time;
                                let remainingRisk = isPartialClosed ? (riskAmount/2) : riskAmount;
                                let finalDiff = trade.isLong ? (c.close - trade.entryPrice) : (trade.entryPrice - c.close);
                                pnl += remainingRisk * (finalDiff / trade.R_value);
                                result = pnl > 0 ? (isPartialClosed ? 'WIN (TRAILED)' : 'WIN') : 'LOSS';
                            }
                        }

                        trade.status = 'CLOSED'; 
                        trade.result = result; 
                        trade.pnl = pnl; 
                        trade.realizedR = pnl / riskAmount;
                        trade.closeTime = closeTime; 
                        trade.closePrice = closePrice;
                        trade.isPartialClosed = isPartialClosed;

                        histTrades.push(trade); 
                        simBalance += pnl;

                        if (simBalance > simPeak) simPeak = simBalance;
                        const dd = (simPeak - simBalance) / simPeak;
                        if (dd > maxDDRef.current) maxDDRef.current = dd;

                        if (result === 'LOSS') {
                            btEngineState.consecutiveLosses += 1;
                            if (btEngineState.consecutiveLosses >= 3) {
                                btEngineState.forcedDirection = null;
                                btEngineState.consecutiveLosses = 0; 
                            } else {
                                btEngineState.forcedDirection = trade.isLong ? 'SHORT' : 'LONG';
                            }
                        } else {
                            btEngineState.forcedDirection = null;
                            btEngineState.consecutiveLosses = 0;
                        }

                        i += 4; 
                    }
                }
                
                updateTradeHistory(histTrades.reverse());
                
                setGlobalMaxDD(maxDDRef.current);
                propBalanceRef.current = simBalance;
                peakBalanceRef.current = simPeak;
                totalPnLRef.current = simBalance - INITIAL_BALANCE;
                setPropBalance(simBalance); 
                setTotalPnL(simBalance - INITIAL_BALANCE);

                setAppPhase('СИНХРОНИЗАЦИЯ ГРАФИКА...');
                for(let trade of histTrades.reverse()) { 
                    if (!engineActive.current) break;
                    chartInstance.current.timeScale().setVisibleLogicalRange({ from: trade.logicalIndex - 30, to: trade.logicalIndex + 50 });
                    setReplayTrade(trade); playSound('scan'); await sleep(80);
                }
                setReplayTrade(null);
                chartInstance.current.timeScale().scrollToRealTime();
                
                setAppState('RESULTS_PAUSE');
                setAppPhase(`ИСТОРИЯ ЗАГРУЖЕНА. СДЕЛОК ЗА 7 ДНЕЙ: ${histTrades.length}.`);
                enqueueSpeech(`Анализ истории за 7 дней завершен. Найдено ${histTrades.length} сделок. Перехожу в режим активного сканирования.`, 'startup-stats', 60000);
                await sleep(4000);

                let lastEvaluatedCandleTime = data15m[data15m.length - 1].time;
                engineStateRef.current.dailyStartBalance = simBalance;

                // --- 3. LIVE SCANNING LOOP (HYBRID) ---
                while (engineActive.current) {
                    try {
                        const nowSec = Math.floor(Date.now() / 1000);
                        const currentRiskIndex = Math.min(engineStateRef.current.consecutiveLosses, 2);
                        const currentRiskPercent = RISK_TIERS[currentRiskIndex];
                        const calculatedStake = propBalanceRef.current * currentRiskPercent;
                        setCurrentStake(calculatedStake);

                        const dailyDD = (engineStateRef.current.dailyStartBalance - propBalanceRef.current) / engineStateRef.current.dailyStartBalance;
                        if (dailyDD >= MAX_DAILY_DD) {
                            setAppState('PAUSED');
                            setAppPhase(`ДОСТИГНУТ ЛИМИТ ПРОСАДКИ ЗА ДЕНЬ (2.5%)`);
                            setZoneInfo(null); currentZoneRef.current = null;
                            setCurrentTF('SYSTEM LOCKED');
                            enqueueSpeech('Достигнут дневной лимит потерь. Торговля заблокирована до конца сессии.', 'daily-limit', 3600000);
                            await sleep(60000);
                            continue;
                        }

                        if (engineStateRef.current.securityPauseUntil > nowSec) {
                            setAppState('PAUSED');
                            setAppPhase(`ЗАЩИТА (3 УБЫТКА). ПАУЗА 60 МИНУТ.`);
                            setZoneInfo(null); currentZoneRef.current = null;
                            setCurrentTF('SYSTEM PAUSE');
                            await sleep(5000);
                            continue;
                        }

                        const newCandles15m = await ScannerAPI.getCandles('BTCUSDT', 3, '15m');
                        if (!newCandles15m || newCandles15m.length === 0) { await sleep(2000); continue; }
                        
                        const tick = newCandles15m[newCandles15m.length - 1];
                        tick.close += (Math.random() - 0.5) * 10;
                        tick.high = Math.max(tick.high, tick.close);
                        tick.low = Math.min(tick.low, tick.close);
                        currentPrice.current = tick.close;
                        
                        if (candleSeries.current) candleSeries.current.update(tick);

                        const activeT = activeTradeRef.current;

                        if (!activeT) {
                            if (!currentZoneRef.current && appState !== 'SCANNING') {
                                setAppState('SCANNING');
                                setCurrentTF('1H (ZONES) / 15M (SCAN)');
                                setAppPhase(engineStateRef.current.forcedDirection ? `СКАНИРОВАНИЕ 15M (ОЖИДАНИЕ ${engineStateRef.current.forcedDirection})` : `ГЛУБОКОЕ СКАНИРОВАНИЕ 15M...`);
                            }

                            const freshData1H = await ScannerAPI.getCandles('BTCUSDT', 150, '1h');
                            const freshData15M = await ScannerAPI.getCandles('BTCUSDT', 150, '15m');
                            
                            if (!freshData1H || !freshData15M || freshData15M.length < 50) { await sleep(2000); continue; }
                            setChartDataForScanner(freshData15M);

                            const freshLiq1H = calcLiquidityZones(freshData1H, 30);
                            const freshAtr1H = calcATRSeries(freshData1H, 14);
                            const lMap1H = new Map(freshLiq1H.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                            const aMap1H = new Map(freshAtr1H.map(i => [i.time, i.value]));

                            const evalIdx = freshData15M.length - 2; 
                            const evalCandleTime = freshData15M[evalIdx].time;

                            let liveSignal = null;
                            let updatedZone = currentZoneRef.current;
                            
                            const z = freshLiq1H[freshLiq1H.length - 1];
                            const a = freshAtr1H[freshAtr1H.length - 1].value;
                            
                            if (z && a && currentPrice.current) {
                                const distTop = z.upper - currentPrice.current;
                                const distBot = currentPrice.current - z.lower;
                                
                                if (distTop > -a * 1.5 && distTop < a * 2.5) {
                                    if (!updatedZone || updatedZone.type !== 'RESISTANCE') {
                                        updatedZone = { type: 'RESISTANCE', top: z.upper, bottom: z.upper - (a*0.5), time: freshData15M[freshData15M.length-1].time, atr: a };
                                        enqueueSpeech(`Внимание. Цена вошла в зону сопротивления на таймфрейме 1 час. Ожидаю 15 минутный паттерн.`, `zone-res`, 90000);
                                        playSound('zone');
                                    }
                                } else if (distBot > -a * 1.5 && distBot < a * 2.5) {
                                    if (!updatedZone || updatedZone.type !== 'SUPPORT') {
                                        updatedZone = { type: 'SUPPORT', top: z.lower + (a*0.5), bottom: z.lower, time: freshData15M[freshData15M.length-1].time, atr: a };
                                        enqueueSpeech(`Внимание. Цена вошла в зону поддержки на таймфрейме 1 час. Ожидаю 15 минутный паттерн.`, `zone-sup`, 90000);
                                        playSound('zone');
                                    }
                                }
                                
                                if (updatedZone) {
                                    if (updatedZone.type === 'RESISTANCE' && (currentPrice.current < updatedZone.bottom - a * 2.5 || currentPrice.current > updatedZone.top + a * 2.5)) {
                                        updatedZone = null;
                                    } else if (updatedZone.type === 'SUPPORT' && (currentPrice.current > updatedZone.top + a * 2.5 || currentPrice.current < updatedZone.bottom - a * 2.5)) {
                                        updatedZone = null;
                                    }
                                }
                            }

                            if (currentZoneRef.current !== updatedZone) {
                                currentZoneRef.current = updatedZone;
                                setZoneInfo(updatedZone);

                                if (updatedZone) {
                                    setAppState('ZONE_DETECTED');
                                    setCurrentTF('15M (PATTERN FOCUS)');
                                    setAppPhase('ЦЕНА В ЗОНЕ 1H. ИЩУ 15M ПАТТЕРН...');
                                } else {
                                    setAppState('SCANNING');
                                    setCurrentTF('1H (ZONES) / 15M (SCAN)');
                                    setAppPhase(engineStateRef.current.forcedDirection ? `СКАНИРОВАНИЕ 15M (ОЖИДАНИЕ ${engineStateRef.current.forcedDirection})` : `ГЛУБОКОЕ СКАНИРОВАНИЕ 15M...`);
                                }
                            }

                            if (evalCandleTime > lastEvaluatedCandleTime) {
                                liveSignal = evaluateSignalEngineHybrid(freshData15M, evalIdx, lMap1H, aMap1H, engineStateRef.current);
                                
                                if (liveSignal && liveSignal.valid) {
                                    lastEvaluatedCandleTime = evalCandleTime; 
                                    
                                    setAppState('PREPARING');
                                    setZoneInfo(null);
                                    currentZoneRef.current = null; 
                                    playSound('found');
                                    setAppPhase(`СИГНАЛ: ${liveSignal.signalType}`);

                                    const isRecovery = engineStateRef.current.consecutiveLosses > 0;
                                    const prepMsg = isRecovery ? 
                                        `Сделка ${liveSignal.isLong?'Лонг':'Шорт'}. Включен режим контроля убытков.` : 
                                        `Слияние таймфреймов успешно. Сделка ${liveSignal.isLong?'Лонг':'Шорт'} на 15 минутах.`;
                                    
                                    enqueueSpeech(prepMsg, 'prep-sig', 0);

                                    for(let w=3; w>0; w--) { setPrepCountdown(w); await sleep(1000); }
                                    setPrepCountdown(null);

                                    const newTrade = {
                                        id: `trade_${Date.now()}`, tf: liveSignal.tf, isLong: liveSignal.isLong, type: liveSignal.isLong ? 'LONG' : 'SHORT',
                                        entryPrice: liveSignal.entryPrice, slPrice: liveSignal.slPrice, level1R: liveSignal.level1R, R_value: liveSignal.R_value,
                                        startTime: Date.now() / 1000, status: 'ACTIVE', score: liveSignal.score, pattern: liveSignal.signalType,
                                        isPartialClosed: false, trailingSL: liveSignal.slPrice,
                                        warnedTP: false, slTimerStarted: false, stakeAmount: calculatedStake, pnl: 0
                                    };
                                    
                                    setLiveTrade(newTrade);
                                    drawTradeLines(newTrade); 
                                    
                                    setAppState('ACTIVE_TRADE');
                                    setCurrentTF('15M (ACTIVE TRADE)');
                                    setAppPhase(`АКТИВНА СДЕЛКА: ${newTrade.type} 15M`);
                                    enqueueSpeech(`Ордер исполнен. Стоп-лосс на графике. Фиксация 50 процентов планируется при +1 R.`, `trade-start-${Date.now()}`, 0);
                                }
                            }
                        } 
                        else {
                            setAppState('ACTIVE_TRADE');
                            setCurrentTF('15M (ACTIVE TRADE)');
                            
                            if (activeT.isPartialClosed) {
                                setAppPhase(`В РАБОТЕ: ${activeT.type} 15M (ТРЕЙЛИНГ)`);
                            } else {
                                setAppPhase(`В РАБОТЕ: ${activeT.type} 15M (ОЖИДАНИЕ 1R)`);
                            }

                            const curP = currentPrice.current;
                            let closed = false; 
                            let result = '';

                            const distToSL = Math.abs(curP - activeT.trailingSL);
                            const fullRisk = activeT.R_value;

                            if (distToSL < fullRisk * 0.25 && !activeT.slTimerStarted && !activeT.isPartialClosed) {
                                activeT.slTimerStarted = true;
                                setSlCountdown(5); 
                                enqueueSpeech("Опасность ликвидации ордера. Приближаемся к стоп-лоссу.", `warn-sl-${activeT.id}`, 0);
                            }

                            if (activeT.isLong) {
                                if (curP <= activeT.trailingSL) { 
                                    closed = true; 
                                    if (!activeT.isPartialClosed) {
                                        activeT.pnl = -activeT.stakeAmount;
                                        result = 'LOSS';
                                    } else {
                                        activeT.pnl += (activeT.stakeAmount / 2) * ((activeT.trailingSL - activeT.entryPrice) / fullRisk);
                                        result = 'WIN (TRAILED)';
                                    }
                                }
                                else if (!activeT.isPartialClosed && curP >= activeT.level1R) {
                                    activeT.isPartialClosed = true;
                                    activeT.pnl += (activeT.stakeAmount / 2); 
                                    activeT.trailingSL = activeT.entryPrice; 
                                    setLiveTrade(activeT); drawTradeLines(activeT);
                                    playSound('partial');
                                    enqueueSpeech('Частичная фиксация прибыли успешна. Половина позиции закрыта. Стоп лосс в безубытке.', `partial-${activeT.id}`, 0);
                                }
                                else if (activeT.isPartialClosed && newCandles15m.length >= 3) {
                                    const len = newCandles15m.length;
                                    const lowest3 = Math.min(newCandles15m[len-1].low, newCandles15m[len-2].low, newCandles15m[len-3].low);
                                    if (lowest3 > activeT.trailingSL) {
                                        activeT.trailingSL = lowest3;
                                        setLiveTrade(activeT); drawTradeLines(activeT);
                                    }
                                }

                            } else { 
                                if (curP >= activeT.trailingSL) { 
                                    closed = true; 
                                    if (!activeT.isPartialClosed) {
                                        activeT.pnl = -activeT.stakeAmount;
                                        result = 'LOSS';
                                    } else {
                                        activeT.pnl += (activeT.stakeAmount / 2) * ((activeT.entryPrice - activeT.trailingSL) / fullRisk);
                                        result = 'WIN (TRAILED)';
                                    }
                                }
                                else if (!activeT.isPartialClosed && curP <= activeT.level1R) {
                                    activeT.isPartialClosed = true;
                                    activeT.pnl += (activeT.stakeAmount / 2); 
                                    activeT.trailingSL = activeT.entryPrice; 
                                    setLiveTrade(activeT); drawTradeLines(activeT);
                                    playSound('partial');
                                    enqueueSpeech('Частичная фиксация прибыли успешна. Половина позиции закрыта. Стоп лосс в безубытке.', `partial-${activeT.id}`, 0);
                                }
                                else if (activeT.isPartialClosed && newCandles15m.length >= 3) {
                                    const len = newCandles15m.length;
                                    const highest3 = Math.max(newCandles15m[len-1].high, newCandles15m[len-2].high, newCandles15m[len-3].high);
                                    if (highest3 < activeT.trailingSL) {
                                        activeT.trailingSL = highest3;
                                        setLiveTrade(activeT); drawTradeLines(activeT);
                                    }
                                }
                            }

                            if (closed) {
                                setSlCountdown(null); 
                                updateBalance(activeT.pnl);
                                activeT.status = 'CLOSED'; activeT.result = result; activeT.closePrice = curP; activeT.closeTime = Date.now() / 1000;
                                activeT.realizedR = activeT.pnl / activeT.stakeAmount;
                                
                                updateTradeHistory([activeT, ...tradesHistoryRef.current].slice(0, 100)); 
                                setLiveTrade(null);
                                clearLines(); 
                                
                                setAppState('TRADE_CLOSED');
                                setCurrentTF('HYBRID 1H/15M');

                                if (result === 'LOSS') {
                                    playSound('loss');
                                    engineStateRef.current.consecutiveLosses += 1;
                                    
                                    if (engineStateRef.current.consecutiveLosses === 1) {
                                        engineStateRef.current.forcedDirection = activeT.isLong ? 'SHORT' : 'LONG';
                                        enqueueSpeech('Убыток зафиксирован. Включаю реверс направления.', 'close-loss1', 0);
                                    } else if (engineStateRef.current.consecutiveLosses === 2) {
                                        engineStateRef.current.forcedDirection = activeT.isLong ? 'SHORT' : 'LONG';
                                        enqueueSpeech('Второй убыток. Риск временно снижен для минимизации просадки.', 'close-loss2', 0);
                                    } else if (engineStateRef.current.consecutiveLosses >= 3) {
                                        engineStateRef.current.securityPauseUntil = Math.floor(Date.now()/1000) + (60 * 60); 
                                        engineStateRef.current.forcedDirection = null; 
                                        engineStateRef.current.consecutiveLosses = 0; 
                                        enqueueSpeech('Три убытка подряд. Система активирует защитную блокировку на 60 минут. Риск сброшен до базового.', 'close-loss3', 0);
                                    }

                                    playSound('win');
                                    enqueueSpeech('Сделка успешно закрыта по трейлингу. Риск-менеджмент сброшен до базового.', `win-${Date.now()}`, 0);
                                    engineStateRef.current.consecutiveLosses = 0;
                                    engineStateRef.current.forcedDirection = null;
                                }
                                
                                await sleep(1500); 
                            }
                        }
                        await sleep(1500);

                                                    <span className={`text-[10px] font-black tracking-widest uppercase px-2 py-1 rounded shadow-inner ${t.type === 'LONG' ? 'bg-emerald-900/40 text-emerald-400 border border-emerald-500/20' : 'bg-rose-900/40 text-rose-400 border border-rose-500/20'}`}>{t.type}</span>
                                                    {t.isPartialClosed && <span className="text-[8px] px-1.5 py-0.5 bg-amber-500/20 text-amber-300 rounded border border-amber-500/40" title="Был активирован трейлинг">TRL</span>}
                                                    <span className="text-[8px] text-slate-500 font-mono tracking-widest ml-1">{t.realizedR ? `${t.realizedR > 0 ? '+' : ''}${t.realizedR.toFixed(1)}R` : ''}</span>
                                                </div>
                                                <span className={`text-sm font-black ${t.result?.includes('WIN') ? 'text-emerald-400' : 'text-rose-500'}`}>{t.pnl > 0 ? '+' : ''}{t.pnl?.toFixed(2)}$</span>
                                            </div>
                                            <div className="flex justify-between text-[10px] font-mono text-slate-400 group-hover:text-slate-300 transition-colors">
                                                <span>{t.pattern}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const initReactApp = () => {
            const rootElement = document.getElementById('root');
            if (!rootElement) {
                console.warn("Ожидание загрузки DOM-элемента #root...");
                return;
            }
            if (!window.ReactDOM || !window.React) {
                showError("Библиотеки React не загружены. Обновите страницу.", "Init", "");
                return;
            }
            try {
                if (window.ReactDOM.createRoot) {
                    const root = window.ReactDOM.createRoot(rootElement);
                    root.render(<App />);
                } else {
                    window.ReactDOM.render(<App />, rootElement);
                }
            } catch (e) {
                showError("Не удалось инициализировать React DOM: " + e.message, "DOM Init", "");
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(initReactApp, 50);
            });
        } else {
            setTimeout(initReactApp, 50);
        }
    </script>
</body>
</html>
