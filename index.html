                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity; let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0; let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j]; const prevC = data[i - j - 1];
                    let tr = Math.max( c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close) );
                    sumTR += tr; count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function calcTrendSeries(data, period = 20) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({time: data[i].time, trend: data[i].close >= data[i].open ? 1 : -1}); continue; }
                let sum = 0;
                for (let j = 0; j < period; j++) sum += data[i - j].close;
                let sma = sum / period;
                res.push({time: data[i].time, trend: data[i].close >= sma ? 1 : -1});
            }
            return res;
        }

        function evaluateSignalEngineHybrid(data15m, evalIdx, liqMap1H, atrMap1H, trendMap1H, engineState) {
            if (evalIdx < 20) return { valid: false, score: 0 };

            const curr15m = data15m[evalIdx];
            const prev15m = data15m[evalIdx - 1];
            const prev2_15m = data15m[evalIdx - 2];
            
            let t1H = curr15m.time - (curr15m.time % 3600);
            let zones = liqMap1H.get(t1H);
            let cAtr = atrMap1H.get(t1H);
            let cTrend = trendMap1H.get(t1H);
            
            if (!zones || !cAtr || cTrend === undefined) {
                let latest1H = 0;
                for (let t of trendMap1H.keys()) {
                    if (t <= curr15m.time && t > latest1H) latest1H = t;
                }
                zones = liqMap1H.get(latest1H);
                cAtr = atrMap1H.get(latest1H);
                cTrend = trendMap1H.get(latest1H);
            }

            if (!zones || !cAtr || cTrend === undefined) return { valid: false, score: 0 };

            const cUpper = zones.upper;
            const cLower = zones.lower;

            const distTop = cUpper - curr15m.close;
            const distBot = curr15m.close - cLower;
            
            const inResZone = distTop > -cAtr * 2.0 && distTop < cAtr * 3.5; 
            const inSupZone = distBot > -cAtr * 2.0 && distBot < cAtr * 3.5;
            
            if (!inResZone && !inSupZone) return { valid: false, score: 0 };

            let sumVol = 0;
            for(let i=1; i<=20; i++) sumVol += data15m[evalIdx-i].volume;
            const avgVol = sumVol / 20;
            const hasVolume = curr15m.volume > avgVol * 1.1;

            const body = Math.abs(curr15m.close - curr15m.open);
            const upperWick = curr15m.high - Math.max(curr15m.close, curr15m.open);
            const lowerWick = Math.min(curr15m.close, curr15m.open) - curr15m.low;

            const isBullish = curr15m.close > curr15m.open;
            const isBearish = curr15m.close < curr15m.open;

            const isBullishRejection = lowerWick > body * 1.0 && isBullish;
            const isBearishRejection = upperWick > body * 1.0 && isBearish;

            const bosShort = curr15m.close < prev15m.low;
            const bosLong = curr15m.close > prev15m.high;

            const isBearFVG = curr15m.high < prev2_15m.low;
            const isBullFVG = curr15m.low > prev2_15m.high;

            let shortConfluence = 0;
            let longConfluence = 0;

            if (inResZone) shortConfluence += 40;
            if (inSupZone) longConfluence += 40;

            if (hasVolume) { shortConfluence += 15; longConfluence += 15; }

            if (isBearishRejection) shortConfluence += 25;
            if (isBullishRejection) longConfluence += 25;

            if (bosShort) shortConfluence += 20;
            if (bosLong) longConfluence += 20;

            if (isBearFVG && isBearish) shortConfluence += 15;
            if (isBullFVG && isBullish) longConfluence += 15;

            if (cTrend === 1) longConfluence += 15;
            if (cTrend === -1) shortConfluence += 15;

            // СТРОГИЙ ФИЛЬТР ТРЕНДА 1H (если нет принудительного реверса)
            if (!engineState.forcedDirection) {
                if (cTrend === -1) longConfluence = 0; 
                if (cTrend === 1) shortConfluence = 0; 
            } else {
                if (engineState.forcedDirection === 'LONG') shortConfluence = 0;
                if (engineState.forcedDirection === 'SHORT') longConfluence = 0;
            }

            let isLong = false; let isShort = false; let patternName = ''; let finalScore = 0;

            if (shortConfluence >= MIN_SCORE && engineState.forcedDirection !== 'LONG') {
                isShort = true; finalScore = shortConfluence;
                if (isBearishRejection) patternName = 'LIQUIDITY SWEEP';
                else if (isBearFVG) patternName = 'ORDER BLOCK + FVG';
                else patternName = 'ZONE RETEST + BOS';
            } else if (longConfluence >= MIN_SCORE && engineState.forcedDirection !== 'SHORT') {
                isLong = true; finalScore = longConfluence;
                if (isBullishRejection) patternName = 'LIQUIDITY SWEEP';
                else if (isBullFVG) patternName = 'ORDER BLOCK + FVG';
                else patternName = 'ZONE RETEST + BOS';
            }

            if (!isLong && !isShort) return { valid: false, score: 0 };

            const entryPrice = curr15m.close;
            let rawSlPrice = isLong ? Math.min(curr15m.low, prev15m.low) - (cAtr * 0.15) : Math.max(curr15m.high, prev15m.high) + (cAtr * 0.15);
            
            const slDistancePercent = Math.abs(entryPrice - rawSlPrice) / entryPrice * 100;
            
            if (slDistancePercent > 1.3) return { valid: false, score: 0 }; 
            
            let slPrice = rawSlPrice;
            if (slDistancePercent < 0.2) slPrice = isLong ? entryPrice * 0.998 : entryPrice * 1.002; 
            
            const riskDist = Math.abs(entryPrice - slPrice);
            
            const decision = finalScore >= 85 ? 'TRAIL' : 'FIXED';
            const targetPercentValue = decision === 'TRAIL' ? 1.3 : 1.0; 
            const tpDist = entryPrice * (targetPercentValue / 100);
            const levelTarget = isLong ? entryPrice + tpDist : entryPrice - tpDist;
            
            const level1R = isLong ? entryPrice + riskDist : entryPrice - riskDist;

            return { 
                valid: true, isLong, isShort, signalType: patternName, score: Math.min(100, finalScore), 
                signalTime: curr15m.time, entryPrice, slPrice, level1R, levelTarget, R_value: riskDist,
                tf: '15M', cUpper, cLower, logicalIndex: evalIdx, targetPercent: targetPercentValue, decision: decision
            };
        }

        const CompactSpeedometer = window.React.memo(({ value, label, color }) => {
            const safeValue = isNaN(value) ? 50 : Math.max(0, Math.min(100, value));

                const int = setInterval(() => setPixels(generate()), 3000);
                return () => clearInterval(int);

            return (
                <div className="flex items-center gap-[2px] bg-black/40 p-1.5 rounded border border-white/5 shadow-inner">
                    {pixels.map((color, i) => (
                        <div key={i} className={`w-1.5 h-1.5 rounded-sm pixel-pulse ${color} bg-current`} style={{animationDelay: `${i*0.1}s`}}></div>
                    ))}
                </div>
            );
        });

        // КОМПОНЕНТ ОТРИСОВКИ БОКСОВ СДЕЛОК, ПАУЗ И ЗОН ИНТЕРЕСА
        const ChartOverlays = window.React.memo(({ chart, series, trades, activeTrade, zoneInfo, isFocusMode, replayTrade, slCountdown, currentPriceRef, pauses }) => {

                                    if (!isTradeActive) {
                                         exitDot.style.display = 'block';
                                         const isLoss = trade.result === 'LOSS';
                                         exitDot.className = `exit-dot absolute w-2 h-2 rounded-full shadow-[0_0_8px_currentColor] -mr-1 -mt-1 right-0 z-30 ${isLoss ? 'bg-rose-500 text-rose-500' : 'bg-emerald-400 text-emerald-400'}`;
                                    } else {
                                         exitDot.style.display = 'block'; 
                                         exitDot.className = `exit-dot absolute w-2 h-2 rounded-full shadow-[0_0_8px_currentColor] -mr-1 -mt-1 right-0 z-30 bg-purple-400 text-purple-400 animate-ping`;
                                    }
                                }
                            }
                        } else { box.style.display = 'none'; }
                    });

                    const pauseBoxes = overlayRef.current.querySelectorAll('.pause-glass-box');
                    pauseBoxes.forEach((box, i) => {
                        const p = pauses[i];
                        if (!p) { box.style.display = 'none'; return; }
                        let xStart = timeScale.timeToCoordinate(p.startTime);
                        let xEnd = timeScale.timeToCoordinate(p.endTime);
                        if (xStart !== null && xEnd !== null) {
                            box.style.display = 'flex';
                            let left = Math.min(xStart, xEnd);
                            let width = Math.max(Math.abs(xEnd - xStart), 60); 
                            box.style.left = `${left}px`;
                            box.style.width = `${width}px`;
                            box.style.top = '0px';
                            box.style.height = '100%';
                        } else { box.style.display = 'none'; }
                    });

                    const tpZone = overlayRef.current.querySelector('#active-tp-zone');
                    const slZone = overlayRef.current.querySelector('#active-sl-zone');
                    
                    if (activeTrade && (isFocusMode || activeTrade.status === 'ACTIVE')) {
                        const yEntry = series.priceToCoordinate(activeTrade.entryPrice);
                        const ySL = series.priceToCoordinate(activeTrade.trailingSL || activeTrade.slPrice);
                        const yTP = activeTrade.levelTarget ? series.priceToCoordinate(activeTrade.levelTarget) : null;
                        let xEntry = timeScale.timeToCoordinate(activeTrade.startTime);
                        if (xEntry === null && timeScale.getVisibleLogicalRange()) xEntry = overlayRef.current.clientWidth / 2;
                        
                        if (yEntry !== null && ySL !== null && yTP !== null && xEntry !== null) {
                            const left = Math.max(0, xEntry);
                            const width = Math.max(150, overlayRef.current.clientWidth - left);

                            if (!activeTrade.isPartialClosed) {
                                tpZone.style.display = 'flex'; tpZone.style.left = `${left}px`; tpZone.style.width = `${width}px`;
                                tpZone.style.top = `${yTP - 14}px`; tpZone.style.height = `28px`;
                                tpZone.className = `glass-zone gentle-pulse-anim absolute z-[5] flex justify-center items-center overflow-hidden ${activeTrade.isLong ? 'glass-zone-tp-long' : 'glass-zone-tp-short'}`;
                            } else { tpZone.style.display = 'none'; }

                            slZone.style.display = 'flex'; slZone.style.left = `${left}px`; slZone.style.width = `${width}px`;
                            slZone.style.top = `${ySL - 14}px`; slZone.style.height = `28px`;
                            slZone.className = `glass-zone gentle-pulse-anim glass-zone-sl absolute z-[5] flex justify-center items-center overflow-hidden`;
                        } else {
                            if(tpZone) tpZone.style.display = 'none'; if(slZone) slZone.style.display = 'none';
                        }
                    } else {
                        if(tpZone) tpZone.style.display = 'none'; if(slZone) slZone.style.display = 'none';
                    }

                    // Зоны интереса (Улучшенная подсветка)
                    const interestZoneBox = overlayRef.current.querySelector('#interest-zone-box');
                    const interestZoneText = overlayRef.current.querySelector('#interest-zone-text');
                    if (zoneInfo && isFocusMode && interestZoneBox) {
                        const zTop = series.priceToCoordinate(zoneInfo.top);
                        const zBot = series.priceToCoordinate(zoneInfo.bottom);
                        if (zTop !== null && zBot !== null) {
                            interestZoneBox.style.display = 'flex';
                            const top = Math.min(zTop, zBot);
                            const height = Math.max(40, Math.abs(zBot - zTop));
                            interestZoneBox.style.top = `${top}px`;
                            interestZoneBox.style.height = `${height}px`;
                            interestZoneBox.className = `absolute z-[5] pointer-events-none w-full left-0 rounded-[1.5rem] backdrop-blur-[2px] transition-all duration-300 gentle-pulse-anim flex items-center justify-center ${zoneInfo.type === 'RESISTANCE' ? 'zone-interest-res' : 'zone-interest-sup'}`;
                            
                            interestZoneText.innerHTML = `<span class="font-black text-[14px] tracking-[0.2em] drop-shadow-md">ОЖИДАЕТСЯ ${zoneInfo.type === 'RESISTANCE' ? 'SHORT' : 'LONG'}</span><span class="ml-3 font-mono text-[10px] opacity-80">${zoneInfo.bottom.toFixed(2)} - ${zoneInfo.top.toFixed(2)}</span>`;

                    rafId = requestAnimationFrame(loop);
                };

                rafId = requestAnimationFrame(loop);
                return () => { isActive = false; cancelAnimationFrame(rafId); };
            }, [chart, series, trades, activeTrade, zoneInfo, isFocusMode, replayTrade, currentPriceRef, pauses]);

            const allTradesToRender = replayTrade ? [...trades, replayTrade] : trades;

            return (
                <div className="absolute inset-0 pointer-events-none z-40 overflow-hidden" ref={overlayRef}>
                    
                    {pauses.map((p, i) => (
                        <div key={`pause_${i}`} className="pause-glass-box absolute z-[5] flex flex-col items-center justify-center pointer-events-none" style={{display: 'none'}}>
                            <div className="bg-rose-950/90 border border-rose-500/70 px-2 py-1 rounded text-[8px] font-black text-rose-300 rotate-[-90deg] whitespace-nowrap tracking-widest shadow-[0_0_15px_rgba(225,29,72,0.4)] uppercase">ПАУЗА БЕЗОПАСНОСТИ 30 МИН</div>
                        </div>
                    ))}

                    <div id="interest-zone-box" style={{display: 'none'}}>
                        <div id="interest-zone-text" className="bg-[#0a0514]/80 px-6 py-2 rounded-lg shadow-lg flex items-center">
                            ZONE
                        </div>
                    </div>

                    {allTradesToRender.map((trade, i) => {
                        const isWin = trade.pnl > 0 || trade.result?.includes('WIN');
                        const isLoss = trade.result === 'LOSS';
                        const isActive = trade.status === 'ACTIVE';
                        const isHighQuality = trade.isHighQuality || false;
                        
                        let pricePercent = '0.00';
                        if (isActive) {
                            pricePercent = currentPriceRef?.current ? (Math.abs(currentPriceRef.current - trade.entryPrice) / trade.entryPrice * 100).toFixed(2) : '0.00';
                        } else {
                            pricePercent = trade.effectivePricePercent ? trade.effectivePricePercent.toFixed(2) : '0.00';
                        }

                        if (!isActive && trade.isSmallWin) {
                            return <div key={trade.id || i} className="trade-glass-box hidden" style={{display: 'none'}}></div>;
                        }

                        const boxClass = isActive ? 'bg-purple-500/20 border-purple-400/50 border-dashed animate-pulse' :
                            isLoss ? 'bg-gradient-to-b from-rose-950/70 to-rose-900/40 border border-rose-700/80 shadow-[0_0_15px_rgba(225,29,72,0.3)]' :

                        return (

                                key={trade.id || i}

                                onMouseLeave={() => setHoveredTrade(null)}

                                    <span className={`text-[8px] sm:text-[9px] font-black uppercase tracking-widest leading-none mb-0.5 drop-shadow-md ${trade.isLong ? 'text-[#e9d5ff]' : 'text-rose-400'}`}>
                                        {trade.isLong ? 'LONG' : 'SHORT'}
                                    </span>
                                    
                                    {!isActive && (

                                            )}
                                            <div className="flex items-center text-[9px] font-mono font-bold text-white leading-none whitespace-nowrap">
                                                {trade.isLong ? (isWin ? '↗' : '↘') : (isWin ? '↘' : '↗')} {pricePercent}%

                    })}
                    
                    <div id="active-tp-zone" style={{display: 'none'}}>

                                <span>TAKE PROFIT (+{activeTrade.targetPercent}%)</span>
                                <span className="opacity-70">|</span>
                                <span className="opacity-90">{activeTrade.levelTarget?.toFixed(2)}</span>
                            </div>

                    </div>
                    
                    <div id="active-sl-zone" className="glass-zone gentle-pulse-anim glass-zone-sl absolute z-[5] flex justify-center items-center overflow-hidden" style={{display: 'none'}}>

                                <span>{activeTrade.isPartialClosed ? 'TRAIL SL' : 'STOP LOSS'}</span>
                                <span className="opacity-70">|</span>
                                <span className="opacity-90">{(activeTrade.trailingSL || activeTrade.slPrice)?.toFixed(2)}</span>
                            </div>
                        )}
                    </div>

                    {slCountdown !== null && slCountdown > 0 && (
                        <div className="absolute inset-0 flex items-center justify-center bg-rose-950/40 backdrop-blur-sm z-50 transition-all duration-300 pointer-events-none">

        const BookflowButton = window.React.memo(() => (

        const App = () => {
            const [isStarted, setIsStarted] = useState(false);

            const [tradesHistory, setTradesHistory] = useState([]);

            const [chartDataForScanner, setChartDataForScanner] = useState([]);

            const activeTradeRef = useRef(null);

            const propBalanceRef = useRef(INITIAL_BALANCE);

            const chartContainerRef = useRef(null);
            const chartInstance = useRef(null);
            const candleSeries = useRef(null);
            const analysisLinesRef = useRef([]); 
            const engineActive = useRef(false);
            const currentPrice = useRef(null);
            
            const audioCtxRef = useRef(null);

            const monthlyStats = useMemo(() => {

                const relevantCount = qualityWins + lossCount;

                const profitFactor = grossLoss === 0 ? (qualityPnL > 0 ? 99 : 0) : (qualityPnL / grossLoss);

            const recommendation = useMemo(() => {

                if (s.profitFactor >= 2) {

                }

                return { text: "Стабильная торговля. В работу берутся только качественные паттерны.", style: "text-emerald-400 border-emerald-500/50 bg-emerald-900/40", icon: <TrendingUp size={20} /> };
            }, [monthlyStats]);

            const initAudio = () => {
                const AudioContext = window.AudioContext || window.webkitAudioContext; 
                audioCtxRef.current = new AudioContext();
                if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); 
            };

            const playSound = (type) => {
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current; if (ctx.state === 'suspended') ctx.resume();
                const playTone = (freq, oscType, dur, vol, delay = 0) => {
                    try {
                        const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;
                        o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                        g.gain.setValueAtTime(0, ctx.currentTime + delay);
                        g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                    } catch (e) {}
                };
                if (type === 'startup') { playTone(440, 'sine', 0.2, 0.05); playTone(554.37, 'sine', 0.2, 0.05, 0.1); playTone(659.25, 'sine', 0.4, 0.05, 0.2); }
                if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.05, 0.005);
                if (type === 'tick') { playTone(800 + Math.random()*200, 'sine', 0.05, 0.015); }
                if (type === 'playback-end') { playTone(523.25, 'triangle', 0.1, 0.05); playTone(659.25, 'triangle', 0.2, 0.05, 0.1); }
                if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
                if (type === 'signal') { playTone(880, 'square', 0.1, 0.04); playTone(1760, 'square', 0.2, 0.04, 0.1); }
                if (type === 'win') { playTone(523.25, 'triangle', 0.2, 0.05); playTone(659.25, 'triangle', 0.2, 0.05, 0.1); playTone(783.99, 'triangle', 0.4, 0.05, 0.2); playTone(1046.50, 'triangle', 0.6, 0.05, 0.3); }
                if (type === 'loss') { playTone(250, 'triangle', 0.4, 0.06); playTone(230, 'triangle', 0.6, 0.06, 0.3); }
                if (type === 'zone') { playTone(400, 'sine', 0.3, 0.04); playTone(600, 'sine', 0.4, 0.04, 0.15); }
                if (type === 'alert') playTone(800, 'square', 0.1, 0.05);
                if (type === 'beep') playTone(1000, 'sine', 0.1, 0.03);
                if (type === 'partial') { playTone(600, 'sine', 0.2, 0.05); playTone(900, 'sine', 0.2, 0.05, 0.1); }
            };

            const enqueueSpeech = useCallback((text, key = null, dedupeMs = 60000) => {
                if (key) {
                    const now = Date.now();
                    if (lastSpokenKeysRef.current[key] && (now - lastSpokenKeysRef.current[key]) < dedupeMs) return;
                    lastSpokenKeysRef.current[key] = now; 
                }
                speechQueueRef.current.push(text);
                processSpeechQueue();
            }, []);

            const processSpeechQueue = () => {
                if (isSpeakingRef.current || speechQueueRef.current.length === 0) return;
                isSpeakingRef.current = true;
                const text = speechQueueRef.current.shift();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU'; utterance.rate = 1.05; utterance.pitch = 0.90;
                
                let isFinished = false;
                const completeSpeech = () => {
                    if (isFinished) return;
                    isFinished = true; isSpeakingRef.current = false;
                    setTimeout(processSpeechQueue, 300); 
                };
                utterance.onend = completeSpeech; utterance.onerror = completeSpeech;

                try { window.speechSynthesis.cancel(); setTimeout(() => window.speechSynthesis.speak(utterance), 50); } 
                catch (e) { completeSpeech(); }
            };

            useEffect(() => {
                if (slCountdown > 0) {
                    playSound('alert');
                    const timer = setTimeout(() => setSlCountdown(c => c - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (slCountdown === 0) {
                    setSlCountdown(null);
                }
            }, [slCountdown]);

            const updateTradeHistory = (newHistory) => {
                tradesHistoryRef.current = newHistory; setTradesHistory([...newHistory]);
            };
            
            const updateBalance = (pnlAmount) => {
                propBalanceRef.current += pnlAmount; 
                totalPnLRef.current += pnlAmount;
                
                if (propBalanceRef.current > peakBalanceRef.current) {
                    peakBalanceRef.current = propBalanceRef.current;
                }
                const currentDD = (peakBalanceRef.current - propBalanceRef.current) / peakBalanceRef.current;
                if (currentDD > maxDDRef.current) {
                    maxDDRef.current = currentDD;
                    setGlobalMaxDD(currentDD);
                }

                setPropBalance(propBalanceRef.current); 
                setTotalPnL(totalPnLRef.current);
            };

            const setLiveTrade = (trade) => {
                activeTradeRef.current = trade; setActiveTrade(trade ? {...trade} : null);
            };

            useEffect(() => {
                const fetchNews = async () => {
                    try {
                        const res = await fetchWithTimeout('https://api.rss2json.com/v1/api.json?rss_url=https://lenta.ru/rss/news', { timeout: 6000 });
                        if (res.ok) {
                            const data = await res.json();
                            if (data?.items?.length > 0) {
                                const headlines = data.items.map(i => i.title);
                                setNewsData(headlines); setCurrentNews(headlines[0]);
                            }
                        }
                    } catch (e) {}
                };
                fetchNews();
                const intId = setInterval(fetchNews, 60 * 60 * 1000); 
                return () => clearInterval(intId);
            }, []);

            useEffect(() => {
                if (!isStarted || newsData.length === 0) return;
                let idx = 0;
                const rotInt = setInterval(() => { idx = (idx + 1) % newsData.length; setCurrentNews(newsData[idx]); }, 8000);
                return () => clearInterval(rotInt); 
            }, [isStarted, newsData]);

            useEffect(() => {
                if (!isStarted || newsData.length === 0) return;
                
                const tryReadNews = () => {
                    if (speechQueueRef.current.length === 0 && !isSpeakingRef.current) {
                        const randomNewsIndex = Math.floor(Math.random() * newsData.length);
                        const newsText = newsData[randomNewsIndex];
                        enqueueSpeech(`Фоновая сводка новостей. ${newsText}`, `news-update`, 0);
                    } else {
                        setTimeout(tryReadNews, 30000);
                    }
                };

                const newsReaderInterval = setInterval(tryReadNews, 15 * 60 * 1000); 
                return () => clearInterval(newsReaderInterval);
            }, [isStarted, newsData, enqueueSpeech]);

            const initChart = async () => {
                if (!chartContainerRef.current) { setTimeout(initChart, 500); return; }
                if (!window.LightweightCharts) {
                    await new Promise(resolve => {
                        const script = document.createElement('script'); script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js';
                        script.onload = resolve; document.head.appendChild(script);
                    });
                }
                if (chartInstance.current) return;

                const chart = window.LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight,
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1', fontFamily: 'JetBrains Mono' },
                    grid: { vertLines: { color: 'rgba(255, 255, 255, 0.03)' }, horzLines: { color: 'rgba(255, 255, 255, 0.03)' } },
                    timeScale: { timeVisible: true, borderVisible: false, rightOffset: 20 }, rightPriceScale: { borderVisible: false }
                });

                // ЯРКИЕ, ЧЕТКИЕ И КОНТРАСТНЫЕ СВЕЧИ (СВЕТЛО-СИРЕНЕВЫЙ И ТЕМНО-ФИОЛЕТОВЫЙ)
                candleSeries.current = chart.addCandlestickSeries({ 
                    upColor: '#e9d5ff', downColor: '#7e22ce', borderVisible: true, 
                    borderUpColor: '#e9d5ff', borderDownColor: '#7e22ce', 
                    wickUpColor: '#e9d5ff', wickDownColor: '#7e22ce' 
                });
                chartInstance.current = chart;

                const ro = new ResizeObserver(() => {
                    if (chartInstance.current && chartContainerRef.current) {
                        chartInstance.current.applyOptions({ width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight });
                    }
                });
                ro.observe(chartContainerRef.current);
            };

            const clearLines = () => {
                if (!candleSeries.current) return;
                analysisLinesRef.current.forEach(l => { try { candleSeries.current.removePriceLine(l); } catch(e){} });
                analysisLinesRef.current = [];
            };

            const drawTradeLines = (trade) => {
                clearLines();
                if (!candleSeries.current || !trade) return;
                
                try {
                    const entryLine = candleSeries.current.createPriceLine({ price: trade.entryPrice, color: trade.isLong ? '#e9d5ff' : '#7e22ce', lineWidth: 2, lineStyle: 0, title: 'ENTRY' });
                    
                    let slColor = trade.isPartialClosed ? '#f59e0b' : '#e11d48'; 
                    let slTitle = trade.isPartialClosed ? 'TRAIL SL' : 'STOP LOSS';
                    const slLine = candleSeries.current.createPriceLine({ price: trade.trailingSL || trade.slPrice, color: slColor, lineWidth: 2, lineStyle: 2, title: slTitle });
                    
                    if (!trade.isPartialClosed && trade.level1R) {
                        const r1Line = candleSeries.current.createPriceLine({ price: trade.level1R, color: '#10b981', lineWidth: 2, lineStyle: 2, title: '+1R PARTIAL' });
                        analysisLinesRef.current.push(r1Line);
                    }
                    
                    analysisLinesRef.current.push(entryLine, slLine);
                } catch(e) {}
            };

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            const runEngine = async () => {
                if (engineActive.current) return; engineActive.current = true;
                
                setAppState('BACKTEST');
                setAppPhase('БЭКТЕСТ ЗА 30 ДНЕЙ: СТРОГАЯ ФИЛЬТРАЦИЯ И АНАЛИЗ...');
                
                const fetchWithRetry = async (sym, cnt, int) => {
                    while(engineActive.current) {
                        const data = await ScannerAPI.getCandles(sym, cnt, int);
                        if (data && data.length > 50) return data;
                        setAppPhase('ОШИБКА АПИ. ПОВТОРНАЯ ПОПЫТКА...');
                        await sleep(3000);
                    }
                };

                const data1h = await fetchWithRetry('BTCUSDT', 750, '1h');
                const data15m = await fetchWithRetry('BTCUSDT', 3000, '15m');
                
                if (!data1h || !data15m) {
                    showError("Не удалось получить данные с Binance.", "API Fetch", "");
                    return;
                }

                await initChart();
                if (candleSeries.current) {
                    candleSeries.current.setData(data15m);
                    setTimeout(() => chartInstance.current.timeScale().fitContent(), 100);
                }

                const liq1H = calcLiquidityZones(data1h, 30);
                const atr1H = calcATRSeries(data1h, 14);
                const trend1H = calcTrendSeries(data1h, 20);

                const lMap1H = new Map(liq1H.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const aMap1H = new Map(atr1H.map(i => [i.time, i.value]));
                const tMap1H = new Map(trend1H.map(i => [i.time, i.trend]));

                let histTrades = []; 
                let simBalance = propBalanceRef.current;
                let simPeak = simBalance;
                
                const startIdx = Math.max(50, data15m.length - 2880); 
                let btEngineState = { forcedDirection: null, consecutiveLosses: 0, securityPauseUntil: 0, pauses: [], focus1HMode: false };
                let ignoredSmallWins = 0;

                for (let i = startIdx; i < data15m.length - 2; i++) {
                    if (i % 50 === 0) await sleep(1);
                    
                    if (data15m[i].time < btEngineState.securityPauseUntil) continue;
                    
                    if (btEngineState.focus1HMode && data15m[i].time > btEngineState.securityPauseUntil) {
                        btEngineState.focus1HMode = false;
                    }

                    const sig = evaluateSignalEngineHybrid(data15m, i, lMap1H, aMap1H, tMap1H, btEngineState);
                    
                    if (sig.valid) {
                        const riskAmount = simBalance * RISK_PERCENT; // ФИКСИРОВАННЫЙ РИСК
                        
                        let trade = {
                            id: `hist_${sig.signalTime}`, tf: '15M', isLong: sig.isLong, type: sig.isLong ? 'LONG' : 'SHORT',
                            entryPrice: sig.entryPrice, slPrice: sig.slPrice, level1R: sig.level1R, levelTarget: sig.levelTarget, R_value: sig.R_value,
                            startTime: sig.signalTime, score: sig.score, pattern: sig.signalType,
                            stakeAmount: riskAmount, logicalIndex: i, 
                            isPartialClosed: false, trailingSL: sig.slPrice, targetPercent: sig.targetPercent, decision: sig.decision,
                            isReverse: btEngineState.forcedDirection !== null
                        };
                        
                        let pnl = 0; let isPartialClosed = false; let trailingSL = trade.slPrice;
                        let closePrice = 0; let closeTime = 0; let result = '';
                        let rPart1 = -1; let rPart2 = -1;

                        for (let j = i + 1; j < data15m.length; j++) {
                            const c = data15m[j];
                            const prevC = data15m[j-1];

                            if (trade.isLong) {
                                if (c.low <= trailingSL) {
                                    closePrice = trailingSL; closeTime = c.time;
                                    if (!isPartialClosed) {
                                        pnl = -riskAmount; result = 'LOSS';
                                        rPart1 = -1; rPart2 = -1;
                                    } else {
                                        let p2R = (trailingSL - trade.entryPrice) / trade.R_value;
                                        rPart2 = p2R; pnl = ((riskAmount/2) * rPart1) + ((riskAmount/2) * p2R); 
                                        result = 'WIN (TRAILED)';
                                    }
                                    break;
                                }

                                if (c.high >= trade.levelTarget) {
                                    closePrice = trade.levelTarget; closeTime = c.time;
                                    let finalR = Math.abs(trade.levelTarget - trade.entryPrice) / trade.R_value;
                                    if (!isPartialClosed) {
                                        pnl = riskAmount * finalR; rPart1 = finalR; rPart2 = finalR;
                                    } else {
                                        rPart2 = finalR; pnl = ((riskAmount/2) * rPart1) + ((riskAmount/2) * finalR);
                                    }
                                    result = trade.decision === 'FIXED' ? 'WIN (FIXED)' : 'WIN (TARGET)';
                                    break;
                                }

                                if (!isPartialClosed && c.high >= trade.level1R) {
                                    isPartialClosed = true;
                                    rPart1 = Math.abs(trade.level1R - trade.entryPrice) / trade.R_value;
                                    trailingSL = trade.entryPrice; 
                                }

                                if (isPartialClosed) {
                                    let lowest3 = Math.min(c.low, prevC.low, data15m[j-2]?.low || prevC.low);
                                    if (lowest3 > trailingSL) trailingSL = lowest3;
                                }

                            } else { 
                                if (c.high >= trailingSL) {
                                    closePrice = trailingSL; closeTime = c.time;
                                    if (!isPartialClosed) {
                                        pnl = -riskAmount; result = 'LOSS';
                                        rPart1 = -1; rPart2 = -1;
                                    } else {
                                        let p2R = (trade.entryPrice - trailingSL) / trade.R_value;
                                        rPart2 = p2R; pnl = ((riskAmount/2) * rPart1) + ((riskAmount/2) * p2R);
                                        result = 'WIN (TRAILED)';
                                    }
                                    break;
                                }

                                if (c.low <= trade.levelTarget) {
                                    closePrice = trade.levelTarget; closeTime = c.time;
                                    let finalR = Math.abs(trade.entryPrice - trade.levelTarget) / trade.R_value;
                                    if (!isPartialClosed) {
                                        pnl = riskAmount * finalR; rPart1 = finalR; rPart2 = finalR;
                                    } else {
                                        rPart2 = finalR; pnl = ((riskAmount/2) * rPart1) + ((riskAmount/2) * finalR);
                                    }
                                    result = trade.decision === 'FIXED' ? 'WIN (FIXED)' : 'WIN (TARGET)';
                                    break;
                                }

                                if (!isPartialClosed && c.low <= trade.level1R) {
                                    isPartialClosed = true;
                                    rPart1 = Math.abs(trade.entryPrice - trade.level1R) / trade.R_value;
                                    trailingSL = trade.entryPrice;
                                }

                                if (isPartialClosed) {
                                    let highest3 = Math.max(c.high, prevC.high, data15m[j-2]?.high || prevC.high);
                                    if (highest3 < trailingSL) trailingSL = highest3;
                                }
                            }

                            if (j === data15m.length - 1) {
                                closePrice = c.close; closeTime = c.time;
                                let remainingRisk = isPartialClosed ? (riskAmount/2) : riskAmount;
                                let finalDiff = trade.isLong ? (c.close - trade.entryPrice) : (trade.entryPrice - c.close);
                                let finalR = finalDiff / trade.R_value;
                                
                                if (!isPartialClosed) {
                                    pnl = remainingRisk * finalR; rPart1 = finalR; rPart2 = finalR;
                                } else {
                                    rPart2 = finalR; pnl = ((riskAmount/2) * rPart1) + (remainingRisk * finalR);
                                }
                                result = pnl > 0 ? (isPartialClosed ? 'WIN (TRAILED)' : 'WIN (FIXED)') : 'LOSS';
                            }
                        }

                        trade.status = 'CLOSED'; 
                        trade.result = result; 
                        trade.pnl = pnl; 
                        trade.rPart1 = rPart1;
                        trade.rPart2 = rPart2;
                        trade.realizedR = pnl / riskAmount;
                        trade.closeTime = closeTime; 
                        trade.closePrice = closePrice;
                        trade.isPartialClosed = isPartialClosed;
                        
                        // РАСЧЕТ КАЧЕСТВА СДЕЛКИ
                        const riskPriceDist = Math.abs(trade.entryPrice - trade.slPrice);
                        const rRealized = trade.realizedR;
                        const avgExitPrice = trade.isLong ? trade.entryPrice + (rRealized * riskPriceDist) : trade.entryPrice - (rRealized * riskPriceDist);
                        trade.effectivePricePercent = (Math.abs(avgExitPrice - trade.entryPrice) / trade.entryPrice) * 100;
                        
                        trade.isHighQuality = trade.pnl > 0 && trade.effectivePricePercent >= MIN_QUALITY_PROFIT;
                        trade.isSmallWin = trade.pnl > 0 && !trade.isHighQuality;

                        let isIgnored = false;
                        if (trade.isSmallWin) {
                            isIgnored = true;
                            trade.pnl = 0; // Игнорируем влияние на баланс
                            ignoredSmallWins++;
                        }

                        if (!isIgnored) {
                            histTrades.push(trade); 
                            simBalance += pnl;

                            if (simBalance > simPeak) simPeak = simBalance;
                            const dd = (simPeak - simBalance) / simPeak;
                            if (dd > maxDDRef.current) maxDDRef.current = dd;

                            if (result === 'LOSS') {
                                btEngineState.consecutiveLosses += 1;
                                btEngineState.forcedDirection = trade.isLong ? 'SHORT' : 'LONG';

                                if (btEngineState.consecutiveLosses >= 2) {
                                    // 2 ЛОССА ПОДРЯД = ПАУЗА 30 МИНУТ
                                    const pEnd = closeTime + 1800;
                                    btEngineState.securityPauseUntil = pEnd; 
                                    btEngineState.pauses.push({ startTime: closeTime, endTime: pEnd });
                                    btEngineState.consecutiveLosses = 0; 
                                    btEngineState.forcedDirection = null; // Сброс принудительного направления после паузы
                                    btEngineState.focus1HMode = true; 
                                }
                            } else {
                                btEngineState.forcedDirection = null;
                                btEngineState.consecutiveLosses = 0;
                            }
                        } else {
                            // Мелкая победа просто сбрасывает серию убытков (избегаем тильта)
                            btEngineState.forcedDirection = null;
                            btEngineState.consecutiveLosses = 0;
                        }
                        
                        i += 4; 
                    }
                }
                
                updateTradeHistory([...histTrades].reverse());
                setPausesHistory(btEngineState.pauses);
                
                setGlobalMaxDD(maxDDRef.current);
                propBalanceRef.current = simBalance;
                peakBalanceRef.current = simPeak;
                totalPnLRef.current = simBalance - INITIAL_BALANCE;
                setPropBalance(simBalance); 
                setTotalPnL(simBalance - INITIAL_BALANCE);

                setAppState('PLAYBACK');
                setAppPhase('ВИЗУАЛИЗАЦИЯ ИСТОРИИ СДЕЛОК...');
                
                // Экран загрузки скроется сам из-за смены appState

                for(let trade of histTrades) { 
                    if (!engineActive.current) break;
                    chartInstance.current.timeScale().setVisibleLogicalRange({ from: trade.logicalIndex - 30, to: trade.logicalIndex + 30 });
                    setReplayTrade(trade); 
                    playSound('tick'); 
                    await sleep(80);
                }
                setReplayTrade(null);
                playSound('playback-end');
                
                const pnlDollars = simBalance - INITIAL_BALANCE;
                let qualityCount = 0;
                let losses = 0;
                let pausesCount = btEngineState.pauses.length;
                
                histTrades.forEach(t => {
                    if (t.pnl > 0) qualityCount++; else losses++;
                });
                
                enqueueSpeech(`Завершен анализ за 30 дней. Качественных успешных сделок: ${qualityCount}. Убыточных: ${losses}. Система безопасности активировалась ${pausesCount} раз. Мелких сделок, которые были проигнорированы: ${ignoredSmallWins}. Итоговый результат: ${pnlDollars > 0 ? 'плюс' : 'минус'} ${Math.abs(Math.round(pnlDollars))} долларов.`, 'bt-stats', 0);
                
                const winningTrades = histTrades.filter(t => t.pnl > 0);
                if (winningTrades.length > 0) {
                    const sortedWins = [...winningTrades].sort((a,b) => b.pnl - a.pnl);
                    const topWins = sortedWins.slice(0, Math.max(1, Math.floor(sortedWins.length * 0.2)));
                    const randomStrongTrade = topWins[Math.floor(Math.random() * topWins.length)];

                    setAppState('BEST_TRADE_REVIEW');
                    setAppPhase('ОБЗОР СЛУЧАЙНОЙ КАЧЕСТВЕННОЙ СДЕЛКИ');
                    setBestTradeReview(randomStrongTrade);
                    
                    chartInstance.current.timeScale().setVisibleLogicalRange({ from: randomStrongTrade.logicalIndex - 15, to: randomStrongTrade.logicalIndex + 45 });
                    
                    const tradeDate = new Date(randomStrongTrade.startTime * 1000);
                    const dateString = tradeDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
                    
                    enqueueSpeech(`Краткий обзор одной из качественных сделок периода. Дата: ${dateString}. Направление: ${randomStrongTrade.type === 'LONG' ? 'Лонг' : 'Шорт'}. Движение цены составило ${randomStrongTrade.effectivePricePercent.toFixed(2)} процента.`, 'bt-best', 0);
                    
                    await sleep(10000);
                    setBestTradeReview(null);
                }

                chartInstance.current.timeScale().scrollToRealTime();
                enqueueSpeech('Перехожу в режим активного сканирования.', 'bt-end', 0);
                setAppState('SCANNING');
                
                let lastEvaluatedCandleTime = data15m[data15m.length - 1].time;
                engineStateRef.current.dailyStartBalance = simBalance;
                engineStateRef.current.pauses = btEngineState.pauses;

                // --- LIVE SCANNING LOOP (HYBRID) ---
                while (engineActive.current) {
                    try {

                                        enqueueSpeech(`Цена подошла к зоне интересов. Ожидается шорт.`, `zone-res`, 90000);

                                }
                                
                                if (updatedZone) {

                                        updatedZone = null;

                                        updatedZone = null;
                                    }
                                }
                            }

                            if (currentZoneRef.current !== updatedZone) {
                                currentZoneRef.current = updatedZone;
                                setZoneInfo(updatedZone);

                                if (updatedZone) {
                                    setAppState('ZONE_DETECTED');
                                    setCurrentTF('15M (PATTERN FOCUS)');
                                    setAppPhase('ЦЕНА В ЗОНЕ 1H. ИЩУ 15M ПАТТЕРН...');
                                } else {
                                    setAppState('SCANNING');
                                    setCurrentTF(engineStateRef.current.forcedDirection ? '1H RECOVERY FOCUS' : '1H (ZONES) / 15M (SCAN)');
                                    setAppPhase(engineStateRef.current.forcedDirection ? `СКАНИРОВАНИЕ 15M (ОЖИДАНИЕ ${engineStateRef.current.forcedDirection})` : `ГЛУБОКОЕ СКАНИРОВАНИЕ 15M...`);
                                }
                            }

                            if (evalCandleTime > lastEvaluatedCandleTime) {
                                liveSignal = evaluateSignalEngineHybrid(freshData15M, evalIdx, lMap1H, aMap1H, tMap1H, engineStateRef.current);
                                
                                if (liveSignal && liveSignal.valid) {
                                    lastEvaluatedCandleTime = evalCandleTime; 
                                    
                                    setAppState('PREPARING');

                                    setAppPhase(`СИГНАЛ: ${liveSignal.signalType}`);

                                    const isRecovery = engineStateRef.current.forcedDirection !== null;
                                    const prepMsg = isRecovery ? 
                                        `Сделка ${liveSignal.isLong?'Лонг':'Шорт'}. Реверсная позиция активна. Включен режим контроля убытков.` : 
                                        `Слияние таймфреймов успешно. Сделка ${liveSignal.isLong?'Лонг':'Шорт'}. Условия благоприятные. Трейлинг до 1.3 процента активирован.`;
                                    
                                    enqueueSpeech(prepMsg, 'prep-sig', 0);

                                    for(let w=3; w>0; w--) { setPrepCountdown(w); await sleep(1000); }
                                    setPrepCountdown(null);

                                    const newTrade = {
                                        id: `trade_${Date.now()}`, tf: liveSignal.tf, isLong: liveSignal.isLong, type: liveSignal.isLong ? 'LONG' : 'SHORT',
                                        entryPrice: liveSignal.entryPrice, slPrice: liveSignal.slPrice, level1R: liveSignal.level1R, levelTarget: liveSignal.levelTarget, R_value: liveSignal.R_value,
                                        startTime: Date.now() / 1000, status: 'ACTIVE', score: liveSignal.score, pattern: liveSignal.signalType,
                                        isPartialClosed: false, trailingSL: liveSignal.slPrice,
                                        warnedTPApproach: false, slTimerStarted: false, stakeAmount: calculatedStake, pnl: 0, rPart1: -1, rPart2: -1,
                                        targetPercent: liveSignal.targetPercent, decision: liveSignal.decision,
                                        isReverse: isRecovery
                                    };
                                    
                                    setLiveTrade(newTrade);
                                    drawTradeLines(newTrade); 
                                    
                                    setAppState('ACTIVE_TRADE');
                                    setCurrentTF('15M (ACTIVE TRADE)');
                                    setAppPhase(`АКТИВНА СДЕЛКА: ${newTrade.type} 15M`);
                                }
                            }
                        } 
                        else {
                            setAppState('ACTIVE_TRADE');
                            setCurrentTF('15M (ACTIVE TRADE)');
                            
                            if (activeT.isPartialClosed) {
                                setAppPhase(`В РАБОТЕ: ${activeT.type} 15M (ТРЕЙЛИНГ)`);
                            } else {
                                setAppPhase(`В РАБОТЕ: ${activeT.type} 15M (ОЖИДАНИЕ)`);
                            }

                            const curP = currentPrice.current;
                            let closed = false; 
                            let result = '';

                            const distToSL = Math.abs(curP - activeT.trailingSL);
                            const fullRisk = activeT.R_value;

                            if (distToSL < fullRisk * 0.25 && !activeT.slTimerStarted && !activeT.isPartialClosed) {
                                activeT.slTimerStarted = true;
                                setSlCountdown(5); 
                                enqueueSpeech("Опасность ликвидации ордера. Приближаемся к стоп-лоссу.", `warn-sl-${activeT.id}`, 0);
                            }

                            const tpDistance = Math.abs(activeT.levelTarget - curP) / activeT.entryPrice * 100;
                            if (tpDistance < 0.15 && !activeT.warnedTPApproach) {
                                activeT.warnedTPApproach = true;
                                enqueueSpeech('Внимание, цена подходит к целевой зоне тейк-профита.', `tp-app-${activeT.id}`, 0);

                            if (activeT.isLong) {
                                if (curP <= activeT.trailingSL) { 
                                    closed = true; 
                                    if (!activeT.isPartialClosed) {
                                        activeT.pnl = -activeT.stakeAmount;
                                        result = 'LOSS';
                                        activeT.rPart1 = -1; activeT.rPart2 = -1;
                                    } else {
                                        let p2R = (activeT.trailingSL - activeT.entryPrice) / fullRisk;
                                        activeT.rPart2 = p2R;
                                        activeT.pnl += (activeT.stakeAmount / 2) * p2R;
                                        result = 'WIN (TRAILED)';
                                    }
                                }
                                else if (curP >= activeT.levelTarget) {
                                    closed = true;
                                    let finalR = Math.abs(activeT.levelTarget - activeT.entryPrice) / fullRisk;
                                    if (!activeT.isPartialClosed) {
                                        activeT.pnl = activeT.stakeAmount * finalR;
                                        activeT.rPart1 = finalR; activeT.rPart2 = finalR;
                                    } else {
                                        activeT.rPart2 = finalR;
                                        activeT.pnl += (activeT.stakeAmount / 2) * finalR;
                                    }
                                    result = activeT.decision === 'FIXED' ? 'WIN (FIXED)' : 'WIN (TARGET)';
                                }
                                else if (!activeT.isPartialClosed && curP >= activeT.level1R) {
                                    activeT.isPartialClosed = true;
                                    activeT.rPart1 = Math.abs(activeT.level1R - activeT.entryPrice) / fullRisk;
                                    activeT.pnl += (activeT.stakeAmount / 2) * activeT.rPart1; 
                                    activeT.trailingSL = activeT.entryPrice; 
                                    setLiveTrade(activeT); drawTradeLines(activeT);
                                    playSound('partial');
                                    enqueueSpeech('Частичная фиксация прибыли успешна. Стоп лосс перенесен в безубыток.', `partial-${activeT.id}`, 0);
                                }
                                else if (activeT.isPartialClosed && newCandles15m.length >= 3) {
                                    const len = newCandles15m.length;
                                    const lowest3 = Math.min(newCandles15m[len-1].low, newCandles15m[len-2].low, newCandles15m[len-3].low);
                                    if (lowest3 > activeT.trailingSL) {
                                        activeT.trailingSL = lowest3;
                                        setLiveTrade(activeT); drawTradeLines(activeT);
                                    }
                                }

                            } else { 
                                if (curP >= activeT.trailingSL) { 
                                    closed = true; 
                                    if (!activeT.isPartialClosed) {
                                        activeT.pnl = -activeT.stakeAmount;
                                        result = 'LOSS';
                                        activeT.rPart1 = -1; activeT.rPart2 = -1;
                                    } else {
                                        let p2R = (activeT.entryPrice - activeT.trailingSL) / fullRisk;
                                        activeT.rPart2 = p2R;
                                        activeT.pnl += (activeT.stakeAmount / 2) * p2R;
                                        result = 'WIN (TRAILED)';
                                    }
                                }
                                else if (curP <= activeT.levelTarget) {
                                    closed = true;
                                    let finalR = Math.abs(activeT.entryPrice - activeT.levelTarget) / fullRisk;
                                    if (!activeT.isPartialClosed) {
                                        activeT.pnl = activeT.stakeAmount * finalR;
                                        activeT.rPart1 = finalR; activeT.rPart2 = finalR;
                                    } else {
                                        activeT.rPart2 = finalR;
                                        activeT.pnl += (activeT.stakeAmount / 2) * finalR;
                                    }
                                    result = activeT.decision === 'FIXED' ? 'WIN (FIXED)' : 'WIN (TARGET)';
                                }
                                else if (!activeT.isPartialClosed && curP <= activeT.level1R) {
                                    activeT.isPartialClosed = true;
                                    activeT.rPart1 = Math.abs(activeT.entryPrice - activeT.level1R) / fullRisk;
                                    activeT.pnl += (activeT.stakeAmount / 2) * activeT.rPart1; 
                                    activeT.trailingSL = activeT.entryPrice; 
                                    setLiveTrade(activeT); drawTradeLines(activeT);
                                    playSound('partial');
                                    enqueueSpeech('Частичная фиксация прибыли успешна. Стоп лосс перенесен в безубыток.', `partial-${activeT.id}`, 0);
                                }
                                else if (activeT.isPartialClosed && newCandles15m.length >= 3) {
                                    const len = newCandles15m.length;
                                    const highest3 = Math.max(newCandles15m[len-1].high, newCandles15m[len-2].high, newCandles15m[len-3].high);
                                    if (highest3 < activeT.trailingSL) {
                                        activeT.trailingSL = highest3;
                                        setLiveTrade(activeT); drawTradeLines(activeT);

                                }
                            }

                            if (closed) {
                                setSlCountdown(null); 
                                
                                activeT.status = 'CLOSED'; activeT.result = result; activeT.closePrice = curP; activeT.closeTime = Date.now() / 1000;
                                activeT.realizedR = activeT.pnl / activeT.stakeAmount;
                                
                                const riskPriceDist = Math.abs(activeT.entryPrice - activeT.slPrice);
                                const rRealized = activeT.realizedR;
                                const avgExitPrice = activeT.isLong ? activeT.entryPrice + (rRealized * riskPriceDist) : activeT.entryPrice - (rRealized * riskPriceDist);
                                activeT.effectivePricePercent = (Math.abs(avgExitPrice - activeT.entryPrice) / activeT.entryPrice) * 100;
                                
                                activeT.isHighQuality = activeT.pnl > 0 && activeT.effectivePricePercent >= MIN_QUALITY_PROFIT;
                                activeT.isSmallWin = activeT.pnl > 0 && !activeT.isHighQuality;

                                let isIgnored = false;
                                if (activeT.isSmallWin) {
                                    isIgnored = true;

                                    <div className="flex flex-col items-center justify-center h-[100px] gap-2 text-slate-400">
                                        {appState === 'SCANNING' ? <Radar size={24} className="animate-spin text-purple-500 opacity-60" /> : <Clock size={24} className="text-slate-600" />} 
                                        <span className="text-[10px] font-mono font-bold uppercase tracking-widest text-center">
                                            {appState === 'SCANNING' ? 'Поиск паттернов...' : 'Ожидание...'}
                                        </span>
                                    </div>
                                )}
                            </div>

                            <div className="flex-1 luxury-card rounded-2xl p-4 flex flex-col overflow-hidden">
                                <h3 className="text-[11px] font-black tracking-widest text-slate-200 uppercase oswald-font mb-2 border-b border-purple-500/30 pb-1.5 flex justify-between">
                                    <span>Журнал (15M)</span>
                                    <span className="text-emerald-500/70 text-[9px] border border-emerald-500/30 px-1.5 rounded bg-emerald-900/20">ТОЛЬКО КАЧЕСТВЕННЫЕ</span>
                                </h3>
                                <div className="flex-1 overflow-y-auto journal-scroll pr-2 flex flex-col gap-2">
                                    {tradesHistory.length === 0 ? (
                                        <div className="text-[10px] text-slate-500 text-center font-mono mt-4">Ожидание сделок...</div>
                                    ) : tradesHistory.map((t, idx) => (
                                        <div key={t.id || idx} className={`p-2.5 rounded-xl border flex flex-col gap-1.5 transition-all cursor-default group ${t.pnl > 0 && t.isHighQuality ? 'bg-[#0f182b]/80 border-emerald-500/20 hover:border-emerald-500/40' : 'bg-[#1a0f14]/80 border-rose-500/10 hover:border-rose-500/30'}`}>
                                            <div className="flex justify-between items-center">
                                                <div className="flex gap-2 items-center">
                                                    <span className={`text-[9px] font-black tracking-widest uppercase px-1.5 py-0.5 rounded shadow-inner ${t.type === 'LONG' ? 'bg-emerald-900/40 text-emerald-400 border border-emerald-500/20' : 'bg-rose-900/40 text-rose-400 border border-rose-500/20'}`}>{t.type}</span>
                                                    {t.isReverse && <span className="bg-amber-600/30 text-amber-400 px-1 py-0.5 rounded text-[7px] font-black shadow-inner">REV</span>}
                                                    <span className="text-[8px] text-slate-400 font-bold truncate max-w-[80px]" title={t.pattern}>{t.pattern}</span>
                                                </div>
                                                <div className="flex flex-col items-end">
                                                    <span className={`text-[11px] font-black ${t.pnl > 0 ? 'text-emerald-400' : 'text-rose-500'}`}>{t.pnl > 0 ? '+' : ''}{t.pnl?.toFixed(2)}$</span>
                                                    <span className={`text-[9px] font-bold ${t.pnl > 0 ? 'text-emerald-500' : 'text-rose-600'}`}>{t.pnl > 0 ? '+' : ''}{t.effectivePricePercent?.toFixed(2)}%</span>
                                                </div>
                                            </div>
                                            <div className="flex justify-between text-[9px] font-mono text-slate-500 group-hover:text-slate-400 transition-colors">
                                                <span>IN: {formatPrice(t.entryPrice)}</span>
                                                <div className="flex gap-2">
                                                    {t.result.includes('WIN') ? (
                                                        <span className="text-emerald-400/80 font-bold">КАЧЕСТВО</span>
                                                    ) : (
                                                        <span className="text-rose-500">SL</span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        console.log("[System] Компонент App успешно определен, подготовка к инициализации...");

        function initApp() {
            if (!window.React || !window.ReactDOM) {
                console.error("React или ReactDOM не загружены");
                return;
            }

            const rootElement = document.getElementById('root');
            if (!rootElement) {
                console.error("Элемент #root не найден");
                return;
            }

            try {
                const root = window.ReactDOM.createRoot(rootElement);
                root.render(window.React.createElement(App));
                console.log("%c[App] React приложение успешно запущено", "color: #22c55e");
            } catch (error) {
                console.error("Ошибка при запуске React:", error);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            setTimeout(initApp, 50);
        }
    </script>
</body>
</html>
