                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [isStarted, setIsStarted] = useState(false);
            const [appPhase, setAppPhase] = useState('СИСТЕМА ЗАГРУЖАЕТСЯ...');
            
            const [appState, setAppState] = useState('INIT'); 
            const [currentTF, setCurrentTF] = useState('5M');
            const [activePair, setActivePair] = useState('BTCUSDT'); 
            
            const [tradesHistory, setTradesHistory] = useState([]);
            const [activeTrade, setActiveTrade] = useState(null);
            const [replayTrade, setReplayTrade] = useState(null);

            const [zoneInfo, setZoneInfo] = useState(null);
            
            const [propBalance, setPropBalance] = useState(INITIAL_BALANCE);
            const [totalPnL, setTotalPnL] = useState(0);
            
            const [prepCountdown, setPrepCountdown] = useState(null);
            const [currentStake, setCurrentStake] = useState(INITIAL_BALANCE * BASE_RISK_PERCENT);

            const [metrics, setMetrics] = useState({ strength: 85, acc: 94, vol: 60, liq: 50 });
            const [newsData, setNewsData] = useState([]);
            const [currentNews, setCurrentNews] = useState('СИНХРОНИЗАЦИЯ НОВОСТНЫХ ПОТОКОВ...');
            
            const [allPairsData, setAllPairsData] = useState({});
            const [highlightPair, setHighlightPair] = useState(null);
            const [backtestStats, setBacktestStats] = useState(null);

            const appStateRef = useRef('INIT'); 
            const activeTradeRef = useRef(null);
            const tradesHistoryRef = useRef([]);
            const propBalanceRef = useRef(INITIAL_BALANCE);
            const totalPnLRef = useRef(0);
            
            const allPairsDataRef = useRef({});

            const chartContainerRef = useRef(null);
            const chartInstance = useRef(null);
            const candleSeries = useRef(null);
            const analysisLinesRef = useRef([]); 
            
            const engineActive = useRef(false);
            const currentPrice = useRef(null);
            
            // Voice Refs
            const audioCtxRef = useRef(null);
            const speechQueueRef = useRef([]);
            const isSpeakingRef = useRef(false);
            const lastSpokenKeysRef = useRef({});
            const initialGreetingPlayed = useRef(false);

            const engineStateRef = useRef({
                consecutiveLosses: 0,
                securityPauseUntil: 0,
                riskMultiplier: 1.0,
                forcedDirection: null 
            });

            // State manager sync
            const changeAppState = useCallback((newState) => {
                appStateRef.current = newState;
                setAppState(newState);
            }, []);

            const stats = useMemo(() => {
                const closed = tradesHistory.filter(t => t.status === 'CLOSED');
                const total = closed.length;
                const wins = closed.filter(t => t.result?.includes('WIN')).length;
                const losses = closed.filter(t => t.result === 'LOSS').length;
                const winrate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
                return { total, wins, losses, winrate };
            }, [tradesHistory]);

            const initAudio = () => {
                const AudioContext = window.AudioContext || window.webkitAudioContext; 
                audioCtxRef.current = new AudioContext();
                if (window.speechSynthesis) { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); }
            };

            const playSound = (type) => {
                if (!audioCtxRef.current) return;
                const ctx = audioCtxRef.current; if (ctx.state === 'suspended') ctx.resume();
                const playTone = (freq, oscType, dur, vol, delay = 0) => {
                    try {
                        const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;
                        o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                        g.gain.setValueAtTime(0, ctx.currentTime + delay);
                        g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
                    } catch (e) {}
                };
                if (type === 'scan') playTone(1200 + Math.random()*300, 'sine', 0.05, 0.005);
                if (type === 'found') { playTone(600, 'triangle', 0.1, 0.03); playTone(800, 'triangle', 0.1, 0.03, 0.1); }
                if (type === 'win') { playTone(523.25, 'triangle', 0.4, 0.04); playTone(659.25, 'triangle', 0.5, 0.04, 0.1); playTone(783.99, 'triangle', 0.8, 0.05, 0.2); }
                if (type === 'loss') { playTone(300, 'sawtooth', 0.4, 0.03); playTone(250, 'sawtooth', 0.6, 0.04, 0.2); }
                if (type === 'zone') playTone(400, 'sine', 0.1, 0.05);
            };

            const enqueueSpeech = useCallback((text, key = null, dedupeMs = 60000) => {
                if (key) {
                    const now = Date.now();
                    // Block exact same notification
                    if (lastSpokenKeysRef.current[key] && (now - lastSpokenKeysRef.current[key]) < dedupeMs) return;
                    lastSpokenKeysRef.current[key] = now; 
                }
                speechQueueRef.current.push({ text });
                processSpeechQueue();
            }, []);

            const processSpeechQueue = () => {
                if (isSpeakingRef.current || speechQueueRef.current.length === 0) return;
                isSpeakingRef.current = true;
                const item = speechQueueRef.current.shift();
                
                const utterance = new SpeechSynthesisUtterance(item.text);
                utterance.lang = 'ru-RU'; utterance.rate = 1.05; utterance.pitch = 0.95;

                let isFinished = false;
                const completeSpeech = () => {
                    if (isFinished) return;
                    isFinished = true; isSpeakingRef.current = false;
                    setTimeout(processSpeechQueue, 500); 
                };
                utterance.onend = completeSpeech; utterance.onerror = completeSpeech;

                try { window.speechSynthesis.cancel(); setTimeout(() => window.speechSynthesis.speak(utterance), 50); } 
                catch (e) { completeSpeech(); }
            };

            const updateTradeHistory = (newHistory) => {
                tradesHistoryRef.current = newHistory;
                setTradesHistory([...newHistory]);
            };

            const updateBalance = (pnlAmount) => {
                propBalanceRef.current += pnlAmount;
                totalPnLRef.current += pnlAmount;
                setPropBalance(propBalanceRef.current);
                setTotalPnL(totalPnLRef.current);
            };

            const setLiveTrade = (trade) => {
                activeTradeRef.current = trade;
                setActiveTrade(trade ? {...trade} : null);
            };

            useEffect(() => {
                const fetchNews = async () => {
                    try {
                        const res = await fetchWithTimeout('https://api.rss2json.com/v1/api.json?rss_url=https://lenta.ru/rss/news', { timeout: 6000 });
                        if (res.ok) {
                            const data = await res.json();
                            if (data?.items?.length > 0) {
                                const headlines = data.items.map(i => i.title);
                                setNewsData(headlines); setCurrentNews(headlines[0]);
                            }
                        }
                    } catch (e) {}
                };
                fetchNews();
                const intId = setInterval(fetchNews, 60 * 60 * 1000); 
                return () => clearInterval(intId);
            }, []);

            useEffect(() => {
                if (!isStarted || newsData.length === 0) return;
                let idx = 0;
                const rotInt = setInterval(() => { idx = (idx + 1) % newsData.length; setCurrentNews(newsData[idx]); }, 10000);
                
                const voiceInt = setInterval(() => {
                    if (appStateRef.current === 'DASHBOARD' || appStateRef.current === 'DASHBOARD_SCANNING') {
                        const text = newsData[Math.floor(Math.random() * newsData.length)];
                        enqueueSpeech(`Сводка новостей: ${text}`, `news-${Date.now()}`, 5);
                    }
                }, 10 * 60 * 1000);

                return () => { clearInterval(rotInt); clearInterval(voiceInt); };
            }, [isStarted, newsData, enqueueSpeech]);

            useEffect(() => {
                if (!isStarted) return;
                const int = setInterval(() => {
                    setMetrics(prev => ({
                        strength: Math.max(70, Math.min(99, prev.strength + (Math.random() * 4 - 2))),
                        acc: Math.max(85, Math.min(98, prev.acc + (Math.random() * 2 - 1))),
                        vol: Math.max(20, Math.min(99, prev.vol + (Math.random() * 10 - 5))),
                        liq: Math.max(40, Math.min(95, prev.liq + (Math.random() * 8 - 4)))
                    }));
                }, 2000);
                return () => clearInterval(int);
            }, [isStarted]);

            // Robust Main Chart Initializer and Resizer
            useEffect(() => {
                if (appState === 'ZONE_LOCKED' || appState === 'PREPARING' || appState === 'ACTIVE_TRADE' || appState === 'BACKTESTING') {
                    const timer = setTimeout(() => {
                        if (chartInstance.current && chartContainerRef.current) {
                            chartInstance.current.applyOptions({ 
                                width: chartContainerRef.current.clientWidth, 
                                height: chartContainerRef.current.clientHeight 
                            });
                            chartInstance.current.timeScale().fitContent();
                        }
                    }, 350); // wait for CSS transition
                    return () => clearTimeout(timer);
                }
            }, [appState]);

            // Re-apply resize on window change
            useEffect(() => {
                const handleResize = () => {
                    if (chartInstance.current && chartContainerRef.current) {
                        chartInstance.current.applyOptions({ 
                            width: chartContainerRef.current.clientWidth, 
                            height: chartContainerRef.current.clientHeight 
                        });
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const initChart = async () => {
                if (!chartContainerRef.current) { setTimeout(initChart, 500); return; }
                if (!window.LightweightCharts) {
                    await new Promise(resolve => {
                        const script = document.createElement('script'); script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js';
                        script.onload = resolve; document.head.appendChild(script);
                    });
                }
                if (chartInstance.current) return;

                const chart = window.LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight,
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1', fontFamily: 'JetBrains Mono' },
                    grid: { vertLines: { color: 'rgba(51, 65, 85, 0.2)' }, horzLines: { color: 'rgba(51, 65, 85, 0.2)' } },
                    timeScale: { timeVisible: true, borderVisible: false, rightOffset: 15 }, rightPriceScale: { borderVisible: false }
                });

                candleSeries.current = chart.addCandlestickSeries({ 
                    upColor: '#a855f7', downColor: '#64748b', borderVisible: true, 
                    borderUpColor: '#c084fc', borderDownColor: '#94a3b8', 
                    wickUpColor: '#c084fc', wickDownColor: '#94a3b8' 
                });
                chartInstance.current = chart;
            };

            const clearLines = () => {
                if (!candleSeries.current) return;
                analysisLinesRef.current.forEach(l => { try { candleSeries.current.removePriceLine(l); } catch(e){} });
                analysisLinesRef.current = [];
            };

            const drawTradeLines = (trade) => {
                clearLines();
                if (!candleSeries.current || !trade) return;
                
                try {
                    const entryLine = candleSeries.current.createPriceLine({ price: trade.entryPrice, color: trade.isLong ? '#a855f7' : '#64748b', lineWidth: 2, lineStyle: 0, title: 'ENTRY' });
                    const slLine = candleSeries.current.createPriceLine({ price: trade.slPrice, color: '#e11d48', lineWidth: 2, lineStyle: 2, title: 'STOP LOSS' });
                    const tp1Line = candleSeries.current.createPriceLine({ price: trade.tp1Price, color: '#10b981', lineWidth: 2, lineStyle: 2, title: 'TP1 (0.8%)' });
                    const tp2Line = candleSeries.current.createPriceLine({ price: trade.tp2Price, color: '#059669', lineWidth: 2, lineStyle: 2, title: 'TP2 (1.0%)' });
                    const tp3Line = candleSeries.current.createPriceLine({ price: trade.tp3Price, color: '#047857', lineWidth: 2, lineStyle: 2, title: 'TP MAX (1.3%)' });
                    
                    analysisLinesRef.current.push(entryLine, slLine, tp1Line, tp2Line, tp3Line);
                } catch(e) {}
            };

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            // --- STRICT MULTI-PAIR STATE MACHINE ENGINE ---
            const runEngine = async () => {
                if (engineActive.current) return; engineActive.current = true;
                
                // --- 1. INITIAL DASHBOARD LOAD ---
                changeAppState('DASHBOARD_SCANNING');
                setAppPhase('ИНИЦИАЛИЗАЦИЯ: ОБЗОР ВСЕХ ПАР...');
                
                const fetchWithRetry = async (sym, cnt, int) => {
                    while(engineActive.current) {
                        const data = await ScannerAPI.getCandles(sym, cnt, int);
                        if (data && data.length > 50) return dedupeData(data);
                        await sleep(3000);
                    }
                };

                const initialFetches = TRADING_PAIRS.map(p => fetchWithRetry(p, 150, '5m'));
                const initialResults = await Promise.all(initialFetches);
                
                let initialData = {};
                TRADING_PAIRS.forEach((pair, idx) => {
                    initialData[pair] = initialResults[idx];
                });
                allPairsDataRef.current = initialData;
                setAllPairsData({...initialData});

                for (let i = 0; i < 12; i++) {
                    if (!engineActive.current) break;
                    setHighlightPair(TRADING_PAIRS[i % 6]);
                    playSound('scan');
                    await sleep(300);
                }
                setHighlightPair(null);

                // --- 2. RANDOM PAIR BACKTEST ---
                const btPair = TRADING_PAIRS[Math.floor(Math.random() * TRADING_PAIRS.length)];
                setActivePair(btPair);
                changeAppState('BACKTESTING');
                setAppPhase(`БЭКТЕСТ И ГЕНЕРАЦИЯ ИСТОРИИ (${btPair})...`);
                
                const data5mBT = await fetchWithRetry(btPair, 1500, '5m');
                
                await initChart();
                if (candleSeries.current) {
                    candleSeries.current.setData(data5mBT);
                    setTimeout(() => {
                        if(chartInstance.current) {
                            chartInstance.current.applyOptions({ width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight });
                            chartInstance.current.timeScale().fitContent();
                        }
                    }, 50);
                }

                const liq = calcLiquidityZones(data5mBT, 30);
                const atr = calcATRSeries(data5mBT, 14);
                const lMap = new Map(liq.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const aMap = new Map(atr.map(i => [i.time, i.value]));

                let histTrades = [];
                let bBalance = propBalanceRef.current;
                const startIdx = Math.max(50, data5mBT.length - 144); 
                let btEngineState = { forcedDirection: null, riskMultiplier: 1.0 };
                let btTotalScore = 0;

                for (let i = startIdx; i < data5mBT.length - 2; i++) {
                    const sig = evaluateSignalEngine(data5mBT, i, lMap, aMap, btEngineState, '5M', btPair);
                    
                    if (sig.valid) {
                        const tradeRisk = INITIAL_BALANCE * BASE_RISK_PERCENT * btEngineState.riskMultiplier;
                        btTotalScore += sig.score;
                        let trade = {
                            id: `hist_${sig.signalTime}`, tf: '5M', pair: btPair, isLong: sig.isLong, type: sig.isLong ? 'LONG' : 'SHORT',
                            entryPrice: sig.entryPrice, slPrice: sig.slPrice, tp1Price: sig.tp1Price, tp2Price: sig.tp2Price, tp3Price: sig.tp3Price, startTime: sig.signalTime,
                            score: sig.score, stakeAmount: tradeRisk, logicalIndex: i
                        };
                        
                        let result = 'LOSS';
                        let closeTime = data5mBT[i+1].time;
                        let closePrice = trade.slPrice;
                        let pnlAmount = -tradeRisk;

                        for(let j = i + 1; j < data5mBT.length; j++) {
                            const c = data5mBT[j];
                            if (trade.isLong) {
                                if (c.low <= trade.slPrice) { result='LOSS'; closeTime=c.time; break; }
                                if (c.high >= trade.tp1Price) { result='WIN (TP1)'; closeTime=c.time; closePrice=trade.tp1Price; pnlAmount = tradeRisk * 1.5; break; }
                            } else {
                                if (c.high >= trade.slPrice) { result='LOSS'; closeTime=c.time; break; }
                                if (c.low <= trade.tp1Price) { result='WIN (TP1)'; closeTime=c.time; closePrice=trade.tp1Price; pnlAmount = tradeRisk * 1.5; break; }
                            }
                        }

                        trade.status = 'CLOSED'; trade.result = result; trade.pnl = pnlAmount; trade.closeTime = closeTime; trade.closePrice = closePrice;
                        histTrades.push(trade);
                        bBalance += pnlAmount;
                        
                        if (result === 'LOSS') {
                            btEngineState.forcedDirection = trade.isLong ? 'SHORT' : 'LONG';
                            btEngineState.riskMultiplier = 1.5;
                        } else {
                            btEngineState.forcedDirection = null;
                            btEngineState.riskMultiplier = 1.0;
                        }
                        i += 5; 
                    }
                }
                
                updateTradeHistory(histTrades.reverse());
                
                const btWins = histTrades.filter(t => t.result.includes('WIN')).length;
                const btLosses = histTrades.filter(t => t.result === 'LOSS').length;
                const btWinrate = histTrades.length > 0 ? ((btWins / histTrades.length) * 100).toFixed(1) : 0;
                const btAvgScore = histTrades.length > 0 ? Math.round(btTotalScore / histTrades.length) : 0;
                
                setAppPhase(`ВОСПРОИЗВЕДЕНИЕ ИСТОРИИ (${btPair})...`);
                for(let trade of [...histTrades].reverse()) { 
                    if (!engineActive.current) break;
                    chartInstance.current.timeScale().setVisibleLogicalRange({ from: trade.logicalIndex - 20, to: trade.logicalIndex + 20 });
                    setReplayTrade(trade);
                    playSound('scan');
                    await sleep(300);
                }
                setReplayTrade(null);
                chartInstance.current.timeScale().scrollToRealTime();

                propBalanceRef.current = bBalance;
                totalPnLRef.current = bBalance - INITIAL_BALANCE;
                setPropBalance(bBalance);
                setTotalPnL(bBalance - INITIAL_BALANCE);
                
                // --- 3. RESULTS PAUSE PHASE ---
                setBacktestStats({
                    pair: btPair, total: histTrades.length, wins: btWins, losses: btLosses, 
                    winrate: btWinrate, pnl: bBalance - INITIAL_BALANCE, avgScore: btAvgScore
                });
                changeAppState('RESULTS_PAUSE');
                setAppPhase(`БЭКТЕСТ ЗАВЕРШЕН. СДЕЛОК: ${histTrades.length}.`);
                await sleep(5000);
                
                setBacktestStats(null);
                let lastEvaluatedCandleTime = data5mBT[data5mBT.length - 1].time;
                let currentPairIdx = 0;
                let focusedPair = 'BTCUSDT'; 

                // --- 4. LIVE LOOP ---
                changeAppState('DASHBOARD');

                while (engineActive.current) {
                    try {
                        const nowSec = Math.floor(Date.now() / 1000);
                        const currentStake = INITIAL_BALANCE * BASE_RISK_PERCENT * engineStateRef.current.riskMultiplier;
                        setCurrentStake(currentStake);

                        if (engineStateRef.current.securityPauseUntil > nowSec) {
                            changeAppState('PAUSED');
                            setAppPhase(`РЫНОК ПЕРЕГРЕТ. ЗАЩИТА ДО ${new Date(engineStateRef.current.securityPauseUntil * 1000).toLocaleTimeString()}`);
                            setZoneInfo(null);
                            await sleep(5000);
                            continue;
                        }

                        let activeTF = '5M';
                        if (engineStateRef.current.consecutiveLosses === 2) activeTF = '15M';
                        if (engineStateRef.current.consecutiveLosses >= 3) activeTF = '1H';
                        setCurrentTF(activeTF);
                        const activeTFParam = activeTF === '1H' ? '1h' : activeTF === '15M' ? '15m' : '5m';

                        const state = appStateRef.current;
                        const activeT = activeTradeRef.current;

                        if (state === 'DASHBOARD' && !activeT) {
                            if (!initialGreetingPlayed.current) {
                                enqueueSpeech("Начинаю сканирование валютных пар. Ищу зоны интереса и торговые сигналы.", 'start-scan', 0);
                                initialGreetingPlayed.current = true;
                            }

                            setAppPhase(`СКАНИРОВАНИЕ ВСЕХ ПАР (${activeTF})...`);
                            setHighlightPair(null);
                            
                            const fetches = TRADING_PAIRS.map(p => fetchWithRetry(p, 150, activeTFParam));
                            const results = await Promise.all(fetches);
                            
                            let foundZonePair = null;
                            let foundZoneInfo = null;
                            let foundData = null;

                            for (let i=0; i<TRADING_PAIRS.length; i++) {
                                const pair = TRADING_PAIRS[i];
                                const freshData = results[i];
                                if (!freshData || freshData.length < 30) continue;
                                
                                allPairsDataRef.current[pair] = dedupeData(freshData);

                                const freshLiq = calcLiquidityZones(freshData, 30);
                                const freshAtr = calcATRSeries(freshData, 14);
                                const z = freshLiq[freshLiq.length - 1];
                                const a = freshAtr[freshAtr.length - 1].value;
                                const curP = freshData[freshData.length - 1].close;

                                if (z && a && curP) {
                                    const distTop = z.upper - curP;
                                    const distBot = curP - z.lower;
                                    
                                    if (distTop < a * 1.5) {
                                        foundZonePair = pair;
                                        foundZoneInfo = { type: 'RESISTANCE', top: z.upper, bottom: z.lower, time: freshData[freshData.length-1].time };
                                        foundData = freshData;
                                        enqueueSpeech(`Внимание. Цена ${pair.replace('USDT','')} подошла к зоне сопротивления. Вероятный сигнал на понижение.`, `zone-res-${pair}`, 60000);
                                        playSound('zone');
                                        break; 
                                    } else if (distBot < a * 1.5) {
                                        foundZonePair = pair;
                                        foundZoneInfo = { type: 'SUPPORT', top: z.upper, bottom: z.lower, time: freshData[freshData.length-1].time };
                                        foundData = freshData;
                                        enqueueSpeech(`Внимание. Цена ${pair.replace('USDT','')} подошла к зоне поддержки. Вероятный сигнал на повышение.`, `zone-sup-${pair}`, 60000);
                                        playSound('zone');
                                        break;
                                    }
                                }
                            }

                            setAllPairsData({...allPairsDataRef.current});

                            if (foundZonePair) {
                                setActivePair(foundZonePair);
                                setZoneInfo(foundZoneInfo);
                                
                                if (candleSeries.current) {
                                    candleSeries.current.setData(dedupeData(foundData));
                                    currentPrice.current = foundData[foundData.length-1].close;
                                }
                                
                                changeAppState('ZONE_LOCKED');
                                setAppPhase(`ЗАХВАТ ЦЕЛИ: ${foundZonePair}. ОЖИДАНИЕ СИГНАЛА...`);
                                await sleep(100);
                            } else {
                                setHighlightPair(TRADING_PAIRS[Math.floor(Math.random() * TRADING_PAIRS.length)]);
                                await sleep(2000); 
                            }
                        }
                        else if (state === 'ZONE_LOCKED' && !activeT) {
                            const pair = activePair;
                            setAppPhase(`СЛЕЖЕНИЕ ЗА ЗОНОЙ: ${pair}...`);
                            const freshData = await fetchWithRetry(pair, 150, activeTFParam);
                            if (!freshData) { await sleep(1000); continue; }

                            const freshLiq = calcLiquidityZones(freshData, 30);
                            const freshAtr = calcATRSeries(freshData, 14);
                            const lMap = new Map(freshLiq.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                            const aMap = new Map(freshAtr.map(i => [i.time, i.value]));

                            const evalIdx = freshData.length - 2; 
                            const evalCandleTime = freshData[evalIdx].time;
                            
                            const z = freshLiq[freshLiq.length - 1];
                            const a = freshAtr[freshAtr.length - 1].value;
                            const tick = freshData[freshData.length - 1];
                            
                            currentPrice.current = tick.close;
                            if (candleSeries.current) candleSeries.current.update(tick);

                            if (z && a) {
                                const distTop = z.upper - tick.close;
                                const distBot = tick.close - z.lower;
                                if (distTop > a * 2.5 && distBot > a * 2.5) {
                                    setZoneInfo(null);
                                    changeAppState('DASHBOARD');
                                    enqueueSpeech(`Цена ${pair.replace('USDT','')} покинула зону без подтверждения сигнала. Возврат в режим обзора.`, `zone-leave-${pair}`, 10000);
                                    continue;
                                }
                            }

                            if (evalCandleTime > lastEvaluatedCandleTime) {
                                const liveSignal = evaluateSignalEngine(freshData, evalIdx, lMap, aMap, engineStateRef.current, activeTF, pair);
                                
                                if (liveSignal && liveSignal.valid) {
                                    lastEvaluatedCandleTime = evalCandleTime; 
                                    
                                    changeAppState('PREPARING');
                                    setZoneInfo(null);
                                    playSound('found');
                                    setAppPhase(`СИГНАЛ: ${liveSignal.signalType}. ПОДГОТОВКА...`);

                                    const dirStr = liveSignal.isLong ? 'лонг' : 'шорт';
                                    const isRecovery = engineStateRef.current.riskMultiplier > 1.0;
                                    const volText = `Установлен рабочий объем ${currentStake.toFixed(0)} долларов.`;
                                    const dirText = `Сделка в ${dirStr}.`;
                                    const reasonText = `Причина сигнала: ${liveSignal.signalType}.`;
                                    
                                    if (isRecovery) {
                                        enqueueSpeech(`Внимание. Режим восстановления. ${volText} ${dirText} ${reasonText}`, 'prep-rec', 0);
                                    } else {
                                        enqueueSpeech(`${volText} ${dirText} ${reasonText}`, 'prep-std', 0);
                                    }

                                    for(let w=3; w>0; w--) {
                                        setPrepCountdown(w);
                                        await sleep(1000);
                                    }
                                    setPrepCountdown(null);

                                    const newTrade = {
                                        id: `trade_${Date.now()}`, tf: liveSignal.tf, pair: liveSignal.pair, isLong: liveSignal.isLong, type: liveSignal.isLong ? 'LONG' : 'SHORT',
                                        entryPrice: liveSignal.entryPrice, slPrice: liveSignal.slPrice, tp1Price: liveSignal.tp1Price, tp2Price: liveSignal.tp2Price, tp3Price: liveSignal.tp3Price,
                                        startTime: Date.now() / 1000, status: 'ACTIVE', score: liveSignal.score,
                                        warnedTP: false, warnedSL: false, stakeAmount: currentStake
                                    };
                                    
                                    setLiveTrade(newTrade);
                                    drawTradeLines(newTrade);
                                    
                                    changeAppState('ACTIVE_TRADE');
                                    setAppPhase(`СДЕЛКА В РАБОТЕ: ${newTrade.type} (${newTrade.pair})`);
                                }
                            }
                            await sleep(1000); 
                        }
                        else if (state === 'ACTIVE_TRADE') {
                            const activeT = activeTradeRef.current;
                            if(!activeT) { changeAppState('DASHBOARD'); continue; }

                            const newCandles = await fetchWithRetry(activeT.pair, 2, activeTFParam);
                            if (!newCandles || newCandles.length === 0) { await sleep(2000); continue; }
                            
                            const tick = newCandles[newCandles.length - 1];
                            tick.close += (Math.random() - 0.5) * (tick.close * 0.0001); 
                            tick.high = Math.max(tick.high, tick.close);
                            tick.low = Math.min(tick.low, tick.close);
                            currentPrice.current = tick.close;
                            if (candleSeries.current) candleSeries.current.update(tick);

                            const curP = currentPrice.current;
                            let closed = false;
                            let pnlAmount = 0;
                            let result = '';

                            if (activeT.isLong) {
                                const distToTP = activeT.tp1Price - activeT.entryPrice;
                                const distToSL = activeT.entryPrice - activeT.slPrice;
                                
                                if (!activeT.warnedTP && curP >= activeT.entryPrice + distToTP * 0.8) {
                                    activeT.warnedTP = true;
                                    enqueueSpeech("Цена приблизилась к уровню тейк-профита. Рекомендуется фиксация позиции.", `warn-tp-${activeT.id}`, 0);
                                }
                                if (!activeT.warnedSL && curP <= activeT.entryPrice - distToSL * 0.8) {
                                    activeT.warnedSL = true;
                                    enqueueSpeech("Цена приближается к уровню стоп-лосса. Будьте готовы к закрытию.", `warn-sl-${activeT.id}`, 0);
                                }

                                if (curP <= activeT.slPrice) { closed = true; result = 'LOSS'; pnlAmount = -activeT.stakeAmount; }
                                else if (curP >= activeT.tp1Price) { closed = true; result = 'WIN'; pnlAmount = activeT.stakeAmount * 1.5; }
                            } else {
                                const distToTP = activeT.entryPrice - activeT.tp1Price;
                                const distToSL = activeT.slPrice - activeT.entryPrice;

                                if (!activeT.warnedTP && curP <= activeT.entryPrice - distToTP * 0.8) {
                                    activeT.warnedTP = true;
                                    enqueueSpeech("Цена приблизилась к уровню тейк-профита. Рекомендуется фиксация позиции.", `warn-tp-${activeT.id}`, 0);
                                }
                                if (!activeT.warnedSL && curP >= activeT.entryPrice + distToSL * 0.8) {
                                    activeT.warnedSL = true;
                                    enqueueSpeech("Цена приближается к уровню стоп-лосса. Будьте готовы к закрытию.", `warn-sl-${activeT.id}`, 0);
                                }

                                if (curP >= activeT.slPrice) { closed = true; result = 'LOSS'; pnlAmount = -activeT.stakeAmount; }
                                else if (curP <= activeT.tp1Price) { closed = true; result = 'WIN'; pnlAmount = activeT.stakeAmount * 1.5; }
                            }

                            if (closed) {
                                updateBalance(pnlAmount);
                                activeT.status = 'CLOSED'; activeT.result = result; activeT.pnl = pnlAmount; activeT.closePrice = curP; activeT.closeTime = Date.now() / 1000;
                                updateTradeHistory([activeT, ...tradesHistoryRef.current].slice(0, 50));
                                setLiveTrade(null);
                                clearLines();
                                
                                changeAppState('TRADE_CLOSED');

                                if (result === 'LOSS') {
                                    playSound('loss');
                                    engineStateRef.current.consecutiveLosses += 1;
                                    
                                    if (engineStateRef.current.consecutiveLosses === 1) {
                                        engineStateRef.current.forcedDirection = activeT.isLong ? 'SHORT' : 'LONG';
                                        engineStateRef.current.riskMultiplier = 1.5; 
                                        enqueueSpeech('Сделка закрыта по стоп-лоссу. Активирую реверс стратегии и увеличиваю объем для компенсации.', 'close-loss1', 0);
                                    } else if (engineStateRef.current.consecutiveLosses === 2) {
                                        engineStateRef.current.securityPauseUntil = Math.floor(Date.now()/1000) + (30 * 60); 
                                        engineStateRef.current.forcedDirection = null; 
                                        engineStateRef.current.riskMultiplier = 1.0; 
                                        enqueueSpeech('Два убытка подряд. Рынок перегрет. Защита капитала активирована на 30 минут. Сканирование полностью остановлено.', 'close-loss2', 0);
                                    } else {
                                        engineStateRef.current.forcedDirection = null;
                                        engineStateRef.current.riskMultiplier = 1.0;
                                        enqueueSpeech('Сделка закрыта по стоп-лоссу. Переключаю сканер на старший таймфрейм.', 'close-loss3', 0);
                                    }
                                } else {
                                    playSound('win');
                                    enqueueSpeech('Целевая прибыль достигнута. Сделка успешно закрыта с плюсом.', `win-${Date.now()}`, 0);
                                    engineStateRef.current.consecutiveLosses = 0;
                                    engineStateRef.current.riskMultiplier = 1.0; 
                                    engineStateRef.current.forcedDirection = null;
                                }
                                await sleep(5000); 
                                changeAppState('DASHBOARD');
                            }
                        }
                        await sleep(1000);
                    } catch (e) {
                        await sleep(5000);
                    }
                }
            };

            const handleStart = () => {
                initAudio();
                setIsStarted(true);
                setTimeout(runEngine, 500);
            };

            if (!isStarted) {
                return (
                    <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#05020a]">
                        <div className="absolute inset-0 bg-grid-pattern opacity-30 pointer-events-none"></div>
                        <div className="absolute w-[60vw] h-[60vw] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                        
                        <div className="relative z-10 glass-panel-heavy p-10 rounded-3xl border border-purple-500/30 shadow-[0_25px_60px_rgba(0,0,0,0.9)] flex flex-col items-center max-w-md text-center">
                            <Cpu size={48} className="text-purple-400 mb-6 drop-shadow-[0_0_15px_rgba(168,85,247,0.8)] animate-pulse" />
                            <h2 className="text-purple-400 tracking-[0.4em] text-xs font-bold uppercase mb-2 oswald-font">Developed by Slava Gordeev</h2>
                            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-fuchsia-300 tracking-[0.1em] mb-8 oswald-font">UPSCALE.TRADE TERMINAL</h1>
                            <p className="text-sm text-slate-400 mb-8 font-medium">Профессиональная мульти-парная среда для проп-трейдинга. Встроенный Risk Manager (0.75%), динамический Take Profit и защита капитала.</p>
                            
                            <button onClick={handleStart} className="w-full py-4 bg-gradient-to-r from-purple-600 to-fuchsia-700 hover:from-purple-500 hover:to-fuchsia-600 text-white tracking-[0.2em] font-bold rounded-xl transition-all duration-300 shadow-[0_0_25px_rgba(168,85,247,0.4)] uppercase oswald-font">
                                АВТОРИЗАЦИЯ И ЗАПУСК
                            </button>
                        </div>
                    </div>
                );
            }

            const isDashboardMode = appState === 'DASHBOARD' || appState === 'DASHBOARD_SCANNING' || appState === 'PAUSED';

            return (
                <div className="h-[100dvh] w-screen flex flex-col relative overflow-hidden bg-[#05020a] text-slate-100">
                    <div className="bg-orb-1 pointer-events-none opacity-60"></div>
                    <div className="bg-orb-2 pointer-events-none opacity-60"></div>
                    <div className="absolute inset-0 bg-grid-pattern pointer-events-none opacity-30"></div>

                    {appState === 'RESULTS_PAUSE' && backtestStats && (
                        <div className="absolute inset-0 z-50 bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center">
                            <Activity size={80} className="text-purple-500 mb-6 drop-shadow-[0_0_30px_rgba(168,85,247,0.8)] animate-pulse" />
                            <h1 className="text-4xl md:text-5xl font-black text-white oswald-font tracking-widest mb-4">БЭКТЕСТ ЗАВЕРШЕН</h1>
                            <h2 className="text-2xl md:text-3xl font-bold text-purple-300 mb-6">{backtestStats.pair}</h2>
                            <div className="grid grid-cols-2 gap-4 text-left bg-slate-900 p-6 rounded-2xl border border-purple-500/30">
                                <div className="text-slate-400">Всего сигналов:</div><div className="text-white font-bold">{backtestStats.total}</div>
                                <div className="text-slate-400">Прибыль (PnL):</div><div className={backtestStats.pnl >= 0 ? 'text-emerald-400 font-bold' : 'text-rose-400 font-bold'}>{backtestStats.pnl > 0 ? '+' : ''}{backtestStats.pnl.toFixed(2)} USDT</div>
                                <div className="text-slate-400">Винрейт:</div><div className="text-purple-400 font-bold">{backtestStats.winrate}%</div>
                                <div className="text-slate-400">Успех / Убыток:</div><div className="text-white font-bold"><span className="text-emerald-400">{backtestStats.wins}</span> / <span className="text-rose-400">{backtestStats.losses}</span></div>
                                <div className="text-slate-400">Качество (Avg Q-Score):</div><div className="text-white font-bold">{backtestStats.avgScore}</div>
                            </div>
                        </div>
                    )}

                    {/* Security Overlay (30 min protection) */}
                    {appState === 'PAUSED' && (
                        <div className="absolute inset-0 z-50 bg-rose-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center">
                            <Shield size={80} className="text-rose-500 mb-6 drop-shadow-[0_0_30px_rgba(225,29,72,0.8)] animate-pulse" />
                            <h1 className="text-4xl md:text-5xl font-black text-white oswald-font tracking-widest mb-4 drop-shadow-md">РЫНОК ПЕРЕГРЕТ</h1>
                            <h2 className="text-2xl md:text-3xl font-bold text-rose-300 mb-6">ЗАЩИТА АКТИВИРОВАНА НА 30 МИНУТ</h2>
                            <p className="text-lg text-slate-300 font-mono">Причина: Зафиксировано 2 убыточные сделки подряд.<br/>Алгоритм заблокировал торговлю для защиты капитала.</p>
                        </div>
                    )}

                    {/* Top Ticker (News) */}
                    <div className="h-8 glass-panel z-40 overflow-hidden flex items-center shrink-0 w-full relative border-b border-purple-500/20">
                        <div className="h-full bg-slate-900/90 text-white px-4 flex items-center gap-2 z-20 text-[10px] tracking-widest shadow-[5px_0_15px_rgba(0,0,0,0.6)] font-bold oswald-font rounded-r-xl border-r border-purple-500/50 shrink-0">
                            <Globe size={14} className="text-purple-400" /> НОВОСТИ
                        </div>
                        <div className="flex-1 overflow-hidden relative h-full flex items-center mx-4">
                            <div className="text-[10px] text-slate-300 tracking-widest font-bold oswald-font animate-pulse">
                                {currentNews}
                            </div>
                        </div>
                    </div>

                    {/* Header */}
                    <header className="h-16 flex items-center justify-between px-6 shrink-0 z-30 bg-[rgba(10,5,20,0.8)] border-b border-purple-500/20 backdrop-blur-md">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-gradient-to-br from-purple-600 to-fuchsia-700 rounded-xl flex items-center justify-center font-bold text-xl shadow-[0_0_20px_rgba(168,85,247,0.4)]">U</div>
                            <div className="flex flex-col">
                                <h1 className="text-xl font-black tracking-wider oswald-font text-gradient">UPSCALE.TRADE <span className="text-white">PRO MAX</span></h1>
                                <span className={`text-[10px] tracking-[0.2em] uppercase font-bold text-purple-400`}>{appPhase}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4 hidden md:flex">
                            <div className="px-4 py-1.5 rounded-lg bg-slate-900/80 border border-slate-700 text-xs font-mono font-bold text-purple-300 flex items-center gap-2">
                                БАЛАНС: <span className="text-white text-sm">${propBalance.toFixed(2)}</span>
                                <TrendPixels />
                            </div>
                            <div className={`px-4 py-1.5 rounded-lg bg-slate-900/80 border border-slate-700 text-xs font-mono font-bold ${totalPnL >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                PnL: <span className="text-white text-sm ml-2">${totalPnL.toFixed(2)}</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 flex p-4 gap-4 overflow-hidden z-10 flex-col md:flex-row">
                        {/* LEFT: Chart & Scanner Area */}
                        <div className="flex-1 flex flex-col gap-4 overflow-hidden h-full">
                            <div className="compact-mtf-dash rounded-2xl flex flex-col sm:flex-row items-start sm:items-center justify-between px-6 py-3 shrink-0 gap-4">
                                <div className="flex items-center gap-4">
                                    <span className="text-xs font-bold text-purple-300 tracking-widest oswald-font uppercase">State Machine:</span>
                                    <div className="px-3 py-1 bg-slate-800 border border-purple-500/30 text-xs font-mono font-bold rounded shadow-inner text-purple-300">
                                        {appState}
                                    </div>
                                    <span className="text-xs font-bold text-purple-300 tracking-widest oswald-font uppercase ml-4">TF:</span>
                                    <div className="px-3 py-1 bg-slate-800 border border-purple-500/30 text-xs font-mono font-bold rounded shadow-inner text-white">
                                        {currentTF}
                                    </div>
                                </div>
                                <div className="flex bg-slate-900/40 rounded-xl border border-white/5 divide-x divide-white/5 shadow-inner">
                                    <CompactSpeedometer value={metrics.strength} label="STRENGTH" color="#d946ef" />
                                    <CompactSpeedometer value={metrics.vol} label="VOLUME" color="#a855f7" />
                                    <CompactSpeedometer value={metrics.liq} label="LIQUIDITY" color="#8b5cf6" />
                                </div>
                            </div>

                            {/* Dynamic Dual-View Container */}
                            <div className={`flex-1 relative w-full h-full`}>
                                
                                {/* 1. Dashboard View */}
                                <div className={`absolute inset-0 transition-opacity duration-300 z-20 ${isDashboardMode ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                                    <DashboardGrid allPairsData={allPairsData} highlightPair={highlightPair} />
                                </div>

                                {/* 2. Full Chart View */}
                                <div className={`absolute inset-0 transition-opacity duration-300 z-10 rounded-3xl overflow-hidden glass-panel-heavy border relative flex flex-col ${!isDashboardMode ? 'opacity-100 pointer-events-auto border-purple-500/30 shadow-[inset_0_4px_30px_rgba(0,0,0,0.5)]' : 'opacity-0 pointer-events-none border-transparent'}`}>
                                    
                                    {appState === 'PREPARING' && prepCountdown !== null && (
                                        <div className="absolute inset-0 bg-slate-900/80 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
                                            <span className="text-sm font-bold text-purple-400 tracking-widest uppercase mb-4 animate-pulse">ВХОД В ПОЗИЦИЮ ЧЕРЕЗ...</span>
                                            <div className="text-7xl font-black text-white drop-shadow-[0_0_30px_rgba(168,85,247,1)] mono-font">{prepCountdown}</div>
                                        </div>
                                    )}

                                    <div className="absolute top-4 left-4 z-10 bg-slate-900/80 px-3 py-1.5 rounded-lg border border-slate-700 flex flex-col pointer-events-none">
                                        <span className="text-lg font-black text-white oswald-font tracking-wider">{activePair.replace('USDT','/USDT')}</span>
                                        <span className="text-xs text-purple-400 font-mono font-bold">Price: {formatPrice(currentPrice.current)}</span>
                                    </div>
                                    
                                    <div ref={chartContainerRef} className="absolute inset-0 w-full h-full z-10" />
                                    
                                    <ChartOverlays 
                                        chart={chartInstance.current} 
                                        series={candleSeries.current} 
                                        trades={tradesHistory} 
                                        activeTrade={activeTrade} 
                                        zoneInfo={zoneInfo} 
                                        isFocusMode={appState === 'ZONE_LOCKED' || appState === 'PREPARING'} 
                                        replayTrade={replayTrade} 
                                        showHistoricalTrades={['BACKTESTING', 'RESULTS_PAUSE', 'ACTIVE_TRADE', 'TRADE_CLOSED'].includes(appState)}
                                        activePair={activePair}
                                    />
                                </div>
                            </div>

                            <div className="shrink-0 flex justify-center">
                                <BookflowButton />
                            </div>
                        </div>

                        {/* RIGHT: Journal & Controls */}
                        <div className="w-full md:w-[340px] flex flex-col gap-4 overflow-hidden shrink-0 h-[300px] md:h-full">
                            
                            <div className="author-block p-3 rounded-2xl flex items-center justify-between shrink-0">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full border border-purple-500/50 bg-purple-900/30 flex items-center justify-center shadow-[0_0_10px_rgba(168,85,247,0.3)]">
                                        <Cpu size={20} className="text-purple-400" />
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="text-[10px] text-slate-400 font-bold tracking-widest uppercase leading-none mb-1">Architecture by</span>
                                        <span className="text-sm font-black text-white tracking-widest uppercase leading-none">SLAVA GORDEEV</span>
                                    </div>
                                </div>
                            </div>

                            <div className="p-4 rounded-2xl bg-[rgba(20,10,35,0.6)] border border-purple-500/30 flex flex-col gap-2 shadow-[0_5px_15px_rgba(0,0,0,0.5)]">
                                <h3 className="text-[11px] font-black tracking-widest uppercase text-purple-300 mb-1 border-b border-purple-500/20 pb-1.5">Общая Статистика</h3>
                                <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-xs font-mono">
                                    <div className="flex justify-between text-slate-400"><span>Сделок:</span> <span className="text-white font-bold">{stats.total}</span></div>
                                    <div className="flex justify-between text-slate-400"><span>Винрейт:</span> <span className="text-purple-400 font-bold">{stats.winrate}%</span></div>
                                    <div className="flex justify-between text-slate-400"><span>Успех:</span> <span className="text-emerald-400 font-bold">{stats.wins}</span></div>
                                    <div className="flex justify-between text-slate-400"><span>Убыток:</span> <span className="text-rose-400 font-bold">{stats.losses}</span></div>
                                </div>
                            </div>

                            <div className="rounded-2xl bg-[rgba(20,10,35,0.6)] border border-purple-500/30 p-2 shadow-[0_5px_15px_rgba(0,0,0,0.5)] shrink-0 h-32">
                                <OrderBookDepth price={currentPrice.current} />
                            </div>

                            <div className={`p-4 rounded-2xl border flex flex-col gap-2 ${activeTrade ? 'bg-purple-900/30 border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'bg-slate-900/60 border-slate-700/50'}`}>
                                <h3 className="text-[11px] font-black tracking-widest uppercase text-purple-300 mb-1 border-b border-purple-500/20 pb-1.5 flex justify-between items-center">
                                    <span>STATUS: POSITION</span>
                                    {activeTrade && (activeTrade.isLong ? <ArrowUp className="text-emerald-400 w-5 h-5 drop-shadow-[0_0_5px_rgba(52,211,153,0.8)]" /> : <ArrowDown className="text-rose-400 w-5 h-5 drop-shadow-[0_0_5px_rgba(225,29,72,0.8)]" />)}
                                </h3>
                                {activeTrade ? (
                                    <div className="flex flex-col gap-1.5 text-xs font-mono">
                                        <div className="flex justify-between text-slate-300">
                                            <span>Пара:</span> 
                                            <span className="font-bold text-white">{activeTrade.pair}</span>
                                        </div>
                                        <div className="flex justify-between text-slate-300">
                                            <span>Направление:</span> 
                                            <span className={`font-bold uppercase ${activeTrade.isLong ? 'text-emerald-400' : 'text-rose-400'}`}>{activeTrade.type}</span>
                                        </div>
                                        <div className="flex justify-between text-slate-300">
                                            <span>Объем (Risk):</span> 
                                            <span className="text-white font-bold">{activeTrade.stakeAmount?.toFixed(2)} USDT</span>
                                        </div>
                                        <div className="flex justify-between text-slate-300">
                                            <span>Цена входа:</span> 
                                            <span className="text-white font-bold">{formatPrice(activeTrade.entryPrice)}</span>
                                        </div>
                                        <div className="mt-1 flex items-center gap-2">
                                            <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                            <span className="text-[10px] text-emerald-400 tracking-wider">СДЕЛКА В РАБОТЕ</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2 text-xs font-mono text-slate-400 py-2">
                                        {isDashboardMode ? <Radar size={14} className="animate-spin text-purple-500" /> : null} 
                                        {isDashboardMode ? 'Свободный депозит. Идет поиск...' : 'Ожидание...'}
                                    </div>
                                )}
                            </div>

                            <div className="flex-1 luxury-card rounded-2xl p-4 flex flex-col overflow-hidden">
                                <h3 className="text-sm font-black tracking-widest text-slate-200 uppercase oswald-font mb-4 border-b border-purple-500/20 pb-2">Журнал Сделок</h3>
                                <div className="flex-1 overflow-y-auto journal-scroll pr-2 flex flex-col gap-2">
                                    {tradesHistory.length === 0 ? (
                                        <div className="text-xs text-slate-500 text-center font-mono mt-4">Ожидание первых сделок...</div>
                                    ) : tradesHistory.map((t, idx) => (
                                        <div key={t.id || idx} className="bg-slate-900/60 p-3 rounded-xl border border-slate-700 flex flex-col gap-1 hover:border-purple-500/50 transition-colors cursor-default">
                                            <div className="flex justify-between items-center mb-1">
                                                <span className={`text-[10px] font-black tracking-widest uppercase px-2 py-0.5 rounded ${t.type === 'LONG' ? 'bg-emerald-900/50 text-emerald-400 border border-emerald-500/30' : 'bg-rose-900/50 text-rose-400 border border-rose-500/30'}`}>{t.type === 'LONG' ? 'Лонг' : 'Шорт'} • {t.pair.replace('USDT','')}</span>
                                                <span className={`text-xs font-black ${t.result?.includes('WIN') ? 'text-emerald-400' : 'text-rose-500'}`}>{t.pnl > 0 ? '+' : ''}{t.pnl?.toFixed(2)}$</span>
                                            </div>
                                            <div className="flex justify-between text-[9px] font-mono text-slate-400">
                                                <span>Вход: {formatPrice(t.entryPrice)}</span>
                                                <span>Выход: {formatPrice(t.closePrice)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
