        const ArrowUp = React.memo(({ className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        ));
        const ArrowDown = React.memo(({ className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
        ));

        // Constants
        const INITIAL_BALANCE = 5000;
        const BASE_RISK_PERCENT = 0.0075; // 0.75%
        const MAIN_TIMEFRAME = '1H'; // Primary timeframe requested

        const fetchWithTimeout = async (url, options = {}) => {
            const { timeout = 4000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id); return response;
            } catch(e) { clearTimeout(id); throw e; }
        };

        const ScannerAPI = {
          async getCandles(symbol, count = 1000, interval = '1h') { 
            const endpoints = [
                'https://api.binance.com', 'https://api1.binance.com',
                'https://api2.binance.com', 'https://api3.binance.com',
                'https://data-api.binance.vision'
            ];
            for (let retry = 0; retry < 3; retry++) {
                for (let base of endpoints) {
                    try {
                        const controller = new AbortController();
                        const id = setTimeout(() => controller.abort(), 4000);
                        let response = await fetch(`${base}/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${count}`, { signal: controller.signal });
                        clearTimeout(id);
                        if (response.ok) {
                            const data = await response.json();
                            return data.map(d => ({
                                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]),
                                low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
                            }));
                        }
                    } catch(e) {}
                }
                await new Promise(r => setTimeout(r, 2000));
            }
            return null; 
          }
        };

        const formatPrice = (p) => p ? p.toFixed(2) : '0.00';

        function calcLiquidityZones(data, period = 30) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period) { res.push({ time: data[i].time, upper: data[i].high, lower: data[i].low }); continue; }
                let high = -Infinity; let low = Infinity;
                for (let j = 1; j <= period; j++) {
                    high = Math.max(high, data[i - j].high); low = Math.min(low, data[i - j].low);
                }
                res.push({ time: data[i].time, upper: high, lower: low });
            }
            return res;
        }

        function calcATRSeries(data, period = 14) {
            let res = [];
            for (let i = 0; i < data.length; i++) {
                if (i === 0) { res.push({time: data[i].time, value: data[i].high - data[i].low}); continue; }
                let sumTR = 0; let count = 0;
                for(let j = 0; j < period && (i - j) > 0; j++) {
                    const c = data[i - j]; const prevC = data[i - j - 1];
                    let tr = Math.max( c.high - c.low, Math.abs(c.high - prevC.close), Math.abs(c.low - prevC.close) );
                    sumTR += tr; count++;
                }
                res.push({time: data[i].time, value: count > 0 ? sumTR / count : 0});
            }
            return res;
        }

        function evaluateSignalEngine(data, evalIdx, liqMap, atrMap, engineState, timeframeLabel) {
            if (evalIdx < 50) return { valid: false, score: 0 };

            const currCandle = data[evalIdx];
            const prevCandle = data[evalIdx - 1];
            const currTime = currCandle.time;
            
            const zones = liqMap.get(currTime);
            const cAtr = atrMap.get(currTime);
            
            if (!zones || !cAtr) return { valid: false, score: 0 };

            const cUpper = zones.upper;
            const cLower = zones.lower;
            
            const candleRange = currCandle.high - currCandle.low;
            if (candleRange === 0) return { valid: false, score: 0 };

            // Оценка объёма: средний за последние 20 свечей для подтверждения
            let sumVol = 0;
            for(let i=1; i<=20; i++) sumVol += data[evalIdx-i].volume;
            const avgVol = sumVol / 20;
            
            // Сигнал требует повышенного объёма
            const isHighVolume = currCandle.volume > avgVol * 1.1 || prevCandle.volume > avgVol * 1.1;

            const upperWick = currCandle.high - Math.max(currCandle.open, currCandle.close);
            const lowerWick = Math.min(currCandle.open, currCandle.close) - currCandle.low;
            const isRedCandle = currCandle.close < currCandle.open;
            const isGreenCandle = currCandle.close > currCandle.open;

            // НАСТОЯЩИЙ СЪЕМ ЛИКВИДНОСТИ: Тень обязательно должна выходить за пределы зон
            const sweptTop = currCandle.high > cUpper || prevCandle.high > cUpper;
            const sweptBot = currCandle.low < cLower || prevCandle.low < cLower;

            // Строгое подтверждение структуры (отторжение)
            const isStrongRejectionShort = sweptTop && isHighVolume && (
                (isRedCandle && currCandle.close < prevCandle.high) || 
                (upperWick / candleRange > 0.4 && currCandle.close < cUpper)
            );

            const isStrongRejectionLong = sweptBot && isHighVolume && (
                (isGreenCandle && currCandle.close > prevCandle.low) ||
                (lowerWick / candleRange > 0.4 && currCandle.close > cLower)
            );

            let isLong = false; let isShort = false; let signalType = ''; let baseScore = 60;

            if (isStrongRejectionShort) { isShort = true; signalType = 'SMC Real Sweep (1H)'; baseScore += 25; }
            if (isStrongRejectionLong) { isLong = true; signalType = 'SMC Real Sweep (1H)'; baseScore += 25; }

            // Контроль реверс-стратегии
            if (engineState.forcedDirection === 'LONG' && isShort) return { valid: false, score: 0 };
            if (engineState.forcedDirection === 'SHORT' && isLong) return { valid: false, score: 0 };

            if (!isLong && !isShort) return { valid: false, score: 0 };
            if (isLong && isShort) return { valid: false, score: 0 };

            let qScore = baseScore + Math.floor(Math.random() * 15);
            if (qScore < 75) return { valid: false, score: qScore }; // Строгий порог входа

            const entryPrice = currCandle.close;
            // SL выставляется за экстремум + небольшой буфер
            let rawSlPrice = isLong ? Math.min(currCandle.low, prevCandle.low) - (cAtr * 0.1) : Math.max(currCandle.high, prevCandle.high) + (cAtr * 0.1);
            
            const slDistancePercent = Math.abs(entryPrice - rawSlPrice) / entryPrice;
            if (slDistancePercent > 0.02) return { valid: false, score: 0 }; // Отклоняем, если SL шире 2%
            
            let slPrice = rawSlPrice;
            if (slDistancePercent < 0.002) slPrice = isLong ? entryPrice * 0.998 : entryPrice * 1.002; // Минимальный SL 0.2%

            // Четкие уровни TP (0.9%, 1.0%, 1.1%)
            const tp1Price = isLong ? entryPrice * 1.009 : entryPrice * 0.991;
            const tp2Price = isLong ? entryPrice * 1.010 : entryPrice * 0.990;
            const tp3Price = isLong ? entryPrice * 1.011 : entryPrice * 0.989;

            return { 
                valid: true, isLong, isShort, signalType, score: Math.min(100, qScore), 
                signalTime: currTime, entryPrice, slPrice, tp1Price, tp2Price, tp3Price,
                tf: timeframeLabel, cUpper, cLower, logicalIndex: evalIdx
            };
        }

        const CompactSpeedometer = React.memo(({ value, label, color }) => {
            const safeValue = isNaN(value) ? 50 : Math.max(0, Math.min(100, value));
            const angle = -90 + (safeValue / 100) * 180;
            const radius = 25; const circumference = Math.PI * radius;
            const strokeDashoffset = circumference - (safeValue / 100) * circumference;

            return (

                    try {
                        const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = oscType;

                        g.gain.setValueAtTime(0, ctx.currentTime + delay);

                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);

                activeTradeRef.current = trade; setActiveTrade(trade ? {...trade} : null);
            };

            useEffect(() => {
                const fetchNews = async () => {
                    try {
                        const res = await fetchWithTimeout('https://api.rss2json.com/v1/api.json?rss_url=https://lenta.ru/rss/news', { timeout: 6000 });
                        if (res.ok) {
                            const data = await res.json();
                            if (data?.items?.length > 0) {
                                const headlines = data.items.map(i => i.title);
                                setNewsData(headlines); setCurrentNews(headlines[0]);
                            }
                        }
                    } catch (e) {}
                };
                fetchNews();
                const intId = setInterval(fetchNews, 60 * 60 * 1000); 
                return () => clearInterval(intId);
            }, []);

            useEffect(() => {
                if (!isStarted || newsData.length === 0) return;
                let idx = 0;
                const rotInt = setInterval(() => { idx = (idx + 1) % newsData.length; setCurrentNews(newsData[idx]); }, 8000);
                return () => clearInterval(rotInt); 
            }, [isStarted, newsData]);

            const initChart = async () => {
                if (!chartContainerRef.current) { setTimeout(initChart, 500); return; }
                if (!window.LightweightCharts) {
                    await new Promise(resolve => {
                        const script = document.createElement('script'); script.src = 'https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js';
                        script.onload = resolve; document.head.appendChild(script);
                    });
                }
                if (chartInstance.current) return;

                const chart = window.LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight,
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1', fontFamily: 'JetBrains Mono' },
                    grid: { vertLines: { color: 'rgba(168, 85, 247, 0.05)' }, horzLines: { color: 'rgba(168, 85, 247, 0.05)' } },
                    timeScale: { timeVisible: true, borderVisible: false, rightOffset: 20 }, rightPriceScale: { borderVisible: false }
                });

                candleSeries.current = chart.addCandlestickSeries({ 
                    upColor: '#c084fc', downColor: '#64748b', borderVisible: true, 
                    borderUpColor: '#d946ef', borderDownColor: '#94a3b8', 
                    wickUpColor: '#d946ef', wickDownColor: '#94a3b8' 
                });
                chartInstance.current = chart;

                const ro = new ResizeObserver(() => {
                    if (chartInstance.current && chartContainerRef.current) {
                        chartInstance.current.applyOptions({ width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight });
                    }
                });
                ro.observe(chartContainerRef.current);
            };

            const clearLines = () => {
                if (!candleSeries.current) return;
                analysisLinesRef.current.forEach(l => { try { candleSeries.current.removePriceLine(l); } catch(e){} });
                analysisLinesRef.current = [];
            };

            const drawTradeLines = (trade) => {
                clearLines();
                if (!candleSeries.current || !trade) return;
                
                try {
                    const entryLine = candleSeries.current.createPriceLine({ price: trade.entryPrice, color: trade.isLong ? '#c084fc' : '#64748b', lineWidth: 2, lineStyle: 0, title: 'ENTRY' });
                    const slLine = candleSeries.current.createPriceLine({ price: trade.slPrice, color: '#e11d48', lineWidth: 2, lineStyle: 2, title: 'STOP LOSS' });
                    const tp1Line = candleSeries.current.createPriceLine({ price: trade.tp1Price, color: '#10b981', lineWidth: 2, lineStyle: 2, title: 'TP 0.9%' });
                    const tp2Line = candleSeries.current.createPriceLine({ price: trade.tp2Price, color: '#059669', lineWidth: 2, lineStyle: 2, title: 'TP 1.0%' });
                    const tp3Line = candleSeries.current.createPriceLine({ price: trade.tp3Price, color: '#047857', lineWidth: 2, lineStyle: 2, title: 'TP 1.1%' });
                    
                    analysisLinesRef.current.push(entryLine, slLine, tp1Line, tp2Line, tp3Line);
                } catch(e) {}
            };

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            const runEngine = async () => {
                if (engineActive.current) return; engineActive.current = true;
                
                // --- 1. BACKTEST PHASE (1H) ---
                setAppState('BACKTEST');
                setAppPhase('БЭКТЕСТ И ГЕНЕРАЦИЯ ИСТОРИИ (1H ТАЙМФРЕЙМ)...');
                
                const fetchWithRetry = async (sym, cnt, int) => {
                    while(engineActive.current) {
                        const data = await ScannerAPI.getCandles(sym, cnt, int);
                        if (data && data.length > 50) return data;
                        setAppPhase('ОШИБКА АПИ. ПОВТОРНАЯ ПОПЫТКА...');
                        await sleep(3000);
                    }
                };

                // Fetch ~300 1H candles (~12.5 days) for thorough indicator priming and backtesting the last 48-72h
                const data1h = await fetchWithRetry('BTCUSDT', 300, '1h');
                await initChart();
                if (candleSeries.current) {
                    candleSeries.current.setData(data1h);
                    setTimeout(() => chartInstance.current.timeScale().fitContent(), 100);
                }

                const liq = calcLiquidityZones(data1h, 30);
                const atr = calcATRSeries(data1h, 14);
                const lMap = new Map(liq.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                const aMap = new Map(atr.map(i => [i.time, i.value]));

                let histTrades = []; let bBalance = propBalanceRef.current;
                const startIdx = Math.max(50, data1h.length - 100); // Backtest last ~100 hours
                let btEngineState = { forcedDirection: null, riskMultiplier: 1.0, consecutiveLosses: 0 };

                for (let i = startIdx; i < data1h.length - 2; i++) {
                    // Yield to keep UI responsive
                    if (i % 10 === 0) await sleep(10);

                    const sig = evaluateSignalEngine(data1h, i, lMap, aMap, btEngineState, '1H');
                    
                    if (sig.valid) {
                        const tradeRisk = INITIAL_BALANCE * BASE_RISK_PERCENT * btEngineState.riskMultiplier;
                        let trade = {
                            id: `hist_${sig.signalTime}`, tf: '1H', isLong: sig.isLong, type: sig.isLong ? 'LONG' : 'SHORT',
                            entryPrice: sig.entryPrice, slPrice: sig.slPrice, tp1Price: sig.tp1Price, tp2Price: sig.tp2Price, tp3Price: sig.tp3Price, startTime: sig.signalTime,
                            score: sig.score, stakeAmount: tradeRisk, logicalIndex: i
                        };
                        
                        let result = 'LOSS'; let closeTime = data1h[i+1].time; let closePrice = trade.slPrice; let pnlAmount = -tradeRisk;

                        for(let j = i + 1; j < data1h.length; j++) {
                            const c = data1h[j];
                            if (trade.isLong) {
                                if (c.low <= trade.slPrice) { result='LOSS'; closeTime=c.time; break; }
                                if (c.high >= trade.tp1Price) { result='WIN (TP1)'; closeTime=c.time; closePrice=trade.tp1Price; pnlAmount = tradeRisk * 1.5; break; } // Assuming 1:1.5 RR average
                            } else {
                                if (c.high >= trade.slPrice) { result='LOSS'; closeTime=c.time; break; }
                                if (c.low <= trade.tp1Price) { result='WIN (TP1)'; closeTime=c.time; closePrice=trade.tp1Price; pnlAmount = tradeRisk * 1.5; break; }
                            }
                        }

                        trade.status = 'CLOSED'; trade.result = result; trade.pnl = pnlAmount; trade.closeTime = closeTime; trade.closePrice = closePrice;
                        histTrades.push(trade); bBalance += pnlAmount;
                        
                        // Логика Martingale (1.5x) и Реверса для Backtest
                        if (result === 'LOSS') {
                            btEngineState.consecutiveLosses += 1;
                            if (btEngineState.consecutiveLosses === 1) {
                                btEngineState.forcedDirection = trade.isLong ? 'SHORT' : 'LONG';
                                btEngineState.riskMultiplier = 1.5;
                            } else {
                                // 2+ убытка: сброс риска после применения штрафа
                                btEngineState.forcedDirection = null;
                                btEngineState.riskMultiplier = 1.0;
                                btEngineState.consecutiveLosses = 0; 
                            }
                        } else {
                            btEngineState.forcedDirection = null;
                            btEngineState.riskMultiplier = 1.0;
                            btEngineState.consecutiveLosses = 0;
                        }
                        i += 2; // Jump forward
                    }
                }
                
                updateTradeHistory(histTrades.reverse());
                
                setAppPhase('СИНХРОНИЗАЦИЯ ГРАФИКА...');
                for(let trade of histTrades.reverse()) { 
                    if (!engineActive.current) break;
                    chartInstance.current.timeScale().setVisibleLogicalRange({ from: trade.logicalIndex - 15, to: trade.logicalIndex + 15 });
                    setReplayTrade(trade); playSound('scan'); await sleep(150);
                }
                setReplayTrade(null);
                chartInstance.current.timeScale().scrollToRealTime();

                propBalanceRef.current = bBalance;
                totalPnLRef.current = bBalance - INITIAL_BALANCE;
                setPropBalance(bBalance); setTotalPnL(bBalance - INITIAL_BALANCE);
                
                // --- 2. PAUSE PHASE ---
                setAppState('RESULTS_PAUSE');
                setAppPhase(`ИСТОРИЯ ЗАГРУЖЕНА. СДЕЛОК: ${histTrades.length}.`);
                enqueueSpeech(`Анализ истории 1H завершен. Найдено ${histTrades.length} сделок. Перехожу в режим активного сканирования.`, 'startup-stats', 60000);
                await sleep(4000);

                let lastEvaluatedCandleTime = data1h[data1h.length - 1].time;

                // --- 3. LIVE LIVE SCANNING LOOP (1H Main) ---
                while (engineActive.current) {
                    try {
                        const nowSec = Math.floor(Date.now() / 1000);
                        const currentStake = INITIAL_BALANCE * BASE_RISK_PERCENT * engineStateRef.current.riskMultiplier;
                        setCurrentStake(currentStake);

                        // Safety Block: 2 losses = 30min pause
                        if (engineStateRef.current.securityPauseUntil > nowSec) {
                            setAppState('PAUSED');
                            setAppPhase(`ЗАЩИТА АКТИВИРОВАНА ДО ${new Date(engineStateRef.current.securityPauseUntil * 1000).toLocaleTimeString()}`);
                            setZoneInfo(null);
                            await sleep(5000);
                            continue;
                        }

                        // Always fetch 1H in live
                        const newCandles = await ScannerAPI.getCandles('BTCUSDT', 2, '1h');
                        if (!newCandles || newCandles.length === 0) { await sleep(2000); continue; }
                        
                        const tick = newCandles[newCandles.length - 1];
                        // Simulate live tick movement for demo
                        tick.close += (Math.random() - 0.5) * 10; 
                        tick.high = Math.max(tick.high, tick.close);
                        tick.low = Math.min(tick.low, tick.close);
                        currentPrice.current = tick.close;
                        
                        if (candleSeries.current) candleSeries.current.update(tick);

                        const activeT = activeTradeRef.current;

                        if (!activeT) {
                            // SCANNING LOGIC
                            setAppState('SCANNING');
                            setAppPhase(engineStateRef.current.forcedDirection ? `СКАНИРОВАНИЕ 1H (ОЖИДАНИЕ ${engineStateRef.current.forcedDirection})` : `ГЛУБОКОЕ СКАНИРОВАНИЕ 1H...`);

                            const freshData = await ScannerAPI.getCandles('BTCUSDT', 150, '1h');
                            if (!freshData || freshData.length < 50) { await sleep(2000); continue; }
                            setChartDataForScanner(freshData);

                            const freshLiq = calcLiquidityZones(freshData, 30);
                            const freshAtr = calcATRSeries(freshData, 14);
                            const lMap = new Map(freshLiq.map(i => [i.time, {upper: i.upper, lower: i.lower}]));
                            const aMap = new Map(freshAtr.map(i => [i.time, i.value]));

                            const evalIdx = freshData.length - 2; 
                            const evalCandleTime = freshData[evalIdx].time;

                            let liveSignal = null; let currentZone = null;
                            
                            const z = freshLiq[freshLiq.length - 1];
                            const a = freshAtr[freshAtr.length - 1].value;
                            
                            // Strict Zone Detection Logic
                            if (z && a && currentPrice.current) {
                                const distTop = z.upper - currentPrice.current;
                                const distBot = currentPrice.current - z.lower;
                                
                                if (distTop > 0 && distTop < a * 1.2) {
                                    currentZone = { type: 'RESISTANCE', top: z.upper, bottom: z.upper - (a*0.5), time: freshData[freshData.length-1].time };
                                } else if (distBot > 0 && distBot < a * 1.2) {
                                    currentZone = { type: 'SUPPORT', top: z.lower + (a*0.5), bottom: z.lower, time: freshData[freshData.length-1].time };
                                }
                                
                                if (currentZone && zoneInfo?.type !== currentZone.type) {
                                    enqueueSpeech(`Внимание. Цена вошла в зону ${currentZone.type === 'RESISTANCE' ? 'сопротивления' : 'поддержки'}. Старший таймфрейм 1 час.`, `zone-entry-${Date.now()}`, 120000);
                                    playSound('zone');
                                }
                            }

                            setZoneInfo(currentZone);

                            if (currentZone) {
                                setAppState('ZONE_DETECTED');
                                setAppPhase('ЦЕНА В ЗОНЕ. ОЖИДАНИЕ ПАТТЕРНА...');
                            }

                            // Evaluate new candle signal
                            if (evalCandleTime > lastEvaluatedCandleTime) {
                                liveSignal = evaluateSignalEngine(freshData, evalIdx, lMap, aMap, engineStateRef.current, '1H');
                                
                                if (liveSignal && liveSignal.valid) {
                                    lastEvaluatedCandleTime = evalCandleTime; 
                                    
                                    setAppState('PREPARING');
                                    setZoneInfo(null);
                                    playSound('found');
                                    setAppPhase(`СИГНАЛ: ${liveSignal.signalType}`);

                                    const isRecovery = engineStateRef.current.riskMultiplier > 1.0;
                                    const prepMsg = isRecovery ? 
                                        `Режим восстановления. Сделка ${liveSignal.isLong?'Лонг':'Шорт'}. Открытие позиций.` : 
                                        `Успешный тест ликвидности. Сделка ${liveSignal.isLong?'Лонг':'Шорт'}. Подготовка к входу.`;
                                    
                                    enqueueSpeech(prepMsg, 'prep-sig', 0);

                                    for(let w=3; w>0; w--) { setPrepCountdown(w); await sleep(1000); }
                                    setPrepCountdown(null);

                                    const newTrade = {
                                        id: `trade_${Date.now()}`, tf: liveSignal.tf, isLong: liveSignal.isLong, type: liveSignal.isLong ? 'LONG' : 'SHORT',
                                        entryPrice: liveSignal.entryPrice, slPrice: liveSignal.slPrice, tp1Price: liveSignal.tp1Price, tp2Price: liveSignal.tp2Price, tp3Price: liveSignal.tp3Price,
                                        startTime: Date.now() / 1000, status: 'ACTIVE', score: liveSignal.score,
                                        warnedTP: false, slTimerStarted: false, stakeAmount: currentStake
                                    };
                                    
                                    setLiveTrade(newTrade);
                                    drawTradeLines(newTrade); // IMMEDIATELY DRAW SL/TP
                                    
                                    setAppState('ACTIVE_TRADE');
                                    setAppPhase(`АКТИВНА СДЕЛКА: ${newTrade.type} 1H`);
                                    enqueueSpeech(`Ордер исполнен. Стоп лосс и тейк профит установлены на график.`, `trade-start-${Date.now()}`, 0);
                                }
                            }
                        } 
                        else {
                            // ACTIVE_TRADE STATE
                            setAppState('ACTIVE_TRADE');
                            setAppPhase(`В РАБОТЕ: ${activeT.type} 1H`);
                            setZoneInfo(null); 

                            const curP = currentPrice.current;
                            let closed = false; let pnlAmount = 0; let result = '';

                            const distToTP1 = Math.abs(activeT.tp1Price - activeT.entryPrice);
                            const distToSL = Math.abs(activeT.entryPrice - activeT.slPrice);
                            const currentDistSL = Math.abs(curP - activeT.slPrice);
                            const currentDistTP = Math.abs(curP - activeT.tp1Price);

                            // Strict SL Warning logic
                            if (currentDistSL < distToSL * 0.25 && !activeT.slTimerStarted) {
                                activeT.slTimerStarted = true;
                                setSlCountdown(5); // Start UI visual 5s timer
                                enqueueSpeech("Критическое приближение к стоп-лоссу. Позиция под угрозой ликвидации.", `warn-sl-${activeT.id}`, 0);
                            }

                            if (currentDistTP < distToTP1 * 0.2 && !activeT.warnedTP) {
                                activeT.warnedTP = true;
                                enqueueSpeech("Цена достигла зоны тейк-профита. Рекомендуется фиксация прибыли.", `warn-tp-${activeT.id}`, 0);
                            }

                            // Close conditions
                            if (activeT.isLong) {
                                if (curP <= activeT.slPrice) { closed = true; result = 'LOSS'; pnlAmount = -activeT.stakeAmount; }
                                else if (curP >= activeT.tp1Price) { closed = true; result = 'WIN'; pnlAmount = activeT.stakeAmount * 1.5; }
                            } else {
                                if (curP >= activeT.slPrice) { closed = true; result = 'LOSS'; pnlAmount = -activeT.stakeAmount; }
                                else if (curP <= activeT.tp1Price) { closed = true; result = 'WIN'; pnlAmount = activeT.stakeAmount * 1.5; }
                            }

                            if (closed) {
                                setSlCountdown(null); // Clear timer just in case
                                updateBalance(pnlAmount);
                                activeT.status = 'CLOSED'; activeT.result = result; activeT.pnl = pnlAmount; activeT.closePrice = curP; activeT.closeTime = Date.now() / 1000;
                                updateTradeHistory([activeT, ...tradesHistoryRef.current].slice(0, 50));
                                setLiveTrade(null);
                                clearLines(); // Remove lines, but the glass box handles visual history!
                                
                                setAppState('TRADE_CLOSED');

                                if (result === 'LOSS') {
                                    playSound('loss');
                                    engineStateRef.current.consecutiveLosses += 1;
                                    
                                    if (engineStateRef.current.consecutiveLosses === 1) {
                                        engineStateRef.current.forcedDirection = activeT.isLong ? 'SHORT' : 'LONG';
                                        engineStateRef.current.riskMultiplier = 1.5; 
                                        enqueueSpeech('Сделка закрыта по стоп-лоссу. Активирую реверс и увеличиваю риск по Мартингейлу в полтора раза.', 'close-loss1', 0);
                                    } else if (engineStateRef.current.consecutiveLosses >= 2) {
                                        engineStateRef.current.securityPauseUntil = Math.floor(Date.now()/1000) + (30 * 60); // 30 mins
                                        engineStateRef.current.forcedDirection = null; 
                                        engineStateRef.current.riskMultiplier = 1.0; // Сброс множителя риска
                                        engineStateRef.current.consecutiveLosses = 0; // Сброс счетчика убытков
                                        enqueueSpeech('Два убытка подряд. Риск сброшен до базового. Активирована защитная блокировка на 30 минут.', 'close-loss2', 0);
                                    }
                                } else {
                                    playSound('win');
                                    enqueueSpeech('Целевая прибыль достигнута. Риск-менеджмент возвращен к базовым настройкам.', `win-${Date.now()}`, 0);
                                    engineStateRef.current.consecutiveLosses = 0;
                                    engineStateRef.current.riskMultiplier = 1.0; 
                                    engineStateRef.current.forcedDirection = null;
                                }
                                
                                // Immediate return to scanning after brief 1s pause
                                await sleep(1000); 
                            }
                        }
                        await sleep(1500); // Live loop frequency
                    } catch (e) {
                        await sleep(5000);
                    }
                }
            };

            const handleStart = () => {
                initAudio();
                setIsStarted(true);
                setTimeout(runEngine, 500);
            };

            if (!isStarted) {
                return (
                    <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#030108]">
                        <div className="absolute inset-0 bg-grid-pattern opacity-40 pointer-events-none"></div>
                        <div className="absolute w-[80vw] h-[80vw] bg-purple-600/10 rounded-full blur-[150px] pointer-events-none"></div>
                        
                        <div className="relative z-10 glass-panel-heavy p-12 rounded-[2rem] shadow-[0_30px_80px_rgba(0,0,0,1)] flex flex-col items-center max-w-lg text-center transform hover:scale-[1.02] transition-transform duration-700">
                            <Cpu size={56} className="text-purple-400 mb-6 drop-shadow-[0_0_20px_rgba(168,85,247,0.8)] animate-pulse" />
                            <h2 className="text-fuchsia-400 tracking-[0.5em] text-xs font-black uppercase mb-3 oswald-font">Developed by Slava Gordeev</h2>
                            <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-300 via-fuchsia-200 to-indigo-300 tracking-[0.15em] mb-6 oswald-font drop-shadow-md">UPSCALE.TRADE 1H</h1>
                            <p className="text-sm text-slate-300 mb-10 font-medium leading-relaxed bg-black/30 p-4 rounded-xl border border-white/5">
                                Улучшенная версия терминала. Строгий анализ 1H таймфрейма, усовершенствованная визуализация зон интереса и система реверса.
                            </p>
                            
                            <button onClick={handleStart} className="w-full py-5 bg-gradient-to-r from-purple-600 to-indigo-700 hover:from-purple-500 hover:to-indigo-600 text-white tracking-[0.3em] font-black rounded-xl transition-all duration-300 shadow-[0_0_30px_rgba(168,85,247,0.5)] uppercase oswald-font hover:shadow-[0_0_50px_rgba(168,85,247,0.8)] border border-white/20">
                                АВТОРИЗАЦИЯ И ЗАПУСК
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-[100dvh] w-screen flex flex-col relative overflow-hidden bg-[#030108] text-slate-100 font-sans">
                    <div className="bg-orb-1 pointer-events-none opacity-80"></div>
                    <div className="bg-orb-2 pointer-events-none opacity-80"></div>
                    <div className="absolute inset-0 bg-grid-pattern pointer-events-none opacity-50"></div>

                    {appState === 'PAUSED' && (
                        <div className="absolute inset-0 z-50 bg-[#030108]/95 backdrop-blur-2xl flex flex-col items-center justify-center p-6 text-center border-4 border-rose-900/50">
                            <Shield size={100} className="text-rose-500 mb-8 drop-shadow-[0_0_40px_rgba(225,29,72,0.9)] animate-pulse" />
                            <h1 className="text-5xl md:text-6xl font-black text-white oswald-font tracking-[0.2em] mb-6 drop-shadow-lg">РЫНОК НЕСТАБИЛЕН</h1>
                            <div className="bg-rose-950/50 border border-rose-500/30 px-8 py-4 rounded-2xl mb-8">
                                <h2 className="text-2xl md:text-3xl font-bold text-rose-300">ЗАЩИТНАЯ БЛОКИРОВКА НА 30 МИНУТ</h2>
                            </div>
                            <p className="text-xl text-slate-300 font-mono max-w-2xl leading-relaxed">Система зафиксировала 2 убыточные сделки подряд. Во избежание дальнейших потерь, алгоритмы сканирования временно приостановлены.</p>
                        </div>
                    )}

                    <div className="h-9 bg-black/60 backdrop-blur-md z-40 overflow-hidden flex items-center shrink-0 w-full relative border-b border-purple-500/20">
                        <div className="h-full bg-gradient-to-r from-purple-900 to-indigo-900 text-white px-5 flex items-center gap-3 z-20 text-[11px] tracking-widest shadow-[10px_0_20px_rgba(0,0,0,0.8)] font-black oswald-font border-r border-purple-400/50 shrink-0">
                            <Globe size={14} className="text-purple-300 animate-pulse" /> ЛЕНТА НОВОСТЕЙ
                        </div>
                        <div className="flex-1 overflow-hidden relative h-full flex items-center mx-6">
                            <div className="text-[11px] text-slate-300 tracking-[0.2em] font-medium oswald-font opacity-90 truncate">
                                {currentNews}
                            </div>
                        </div>
                    </div>

                    <header className="h-[72px] flex items-center justify-between px-8 shrink-0 z-30 bg-black/40 border-b border-white/5 backdrop-blur-xl">
                        <div className="flex items-center gap-5">
                            <div className="w-12 h-12 bg-gradient-to-br from-fuchsia-600 to-indigo-700 rounded-2xl flex items-center justify-center font-black text-2xl shadow-[0_0_25px_rgba(217,70,239,0.5)] border border-white/20">U</div>
                            <div className="flex flex-col">
                                <h1 className="text-2xl font-black tracking-widest oswald-font text-gradient">UPSCALE.TRADE <span className="text-white">PRO MAX</span></h1>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse drop-shadow-[0_0_5px_rgba(52,211,153,1)]"></div>
                                    <span className={`text-[10px] tracking-[0.25em] uppercase font-bold text-fuchsia-300`}>{appPhase}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-6 hidden lg:flex">
                            <div className="px-5 py-2 rounded-xl bg-black/60 border border-white/10 text-xs font-mono font-bold text-purple-300 flex items-center gap-3 shadow-inner">
                                <span className="opacity-70">БАЛАНС:</span> <span className="text-white text-base drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]">${propBalance.toFixed(2)}</span>
                                <TrendPixels />
                            </div>
                            <div className={`px-5 py-2 rounded-xl bg-black/60 border border-white/10 text-xs font-mono font-bold flex items-center gap-3 shadow-inner ${totalPnL >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                <span className="opacity-70 text-slate-300">PnL:</span> <span className="text-base drop-shadow-[0_0_8px_currentColor]">${totalPnL.toFixed(2)}</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 flex p-5 gap-5 overflow-hidden z-10 flex-col xl:flex-row">
                        {/* LEFT COLUMN: Chart */}
                        <div className="flex-1 flex flex-col gap-5 overflow-hidden h-full">
                            
                            <div className="glass-panel-heavy rounded-2xl flex flex-col sm:flex-row items-center justify-between px-8 py-4 shrink-0 gap-6">
                                <div className="flex items-center gap-6 w-full sm:w-auto justify-between sm:justify-start">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-black text-purple-300/70 tracking-[0.2em] uppercase mb-1">Режим Системы</span>
                                        <div className="px-4 py-1.5 bg-black/50 border border-purple-500/40 text-xs font-mono font-bold rounded-lg shadow-inner text-fuchsia-300">
                                            {appState}
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <span className="text-[10px] font-black text-purple-300/70 tracking-[0.2em] uppercase mb-1">Timeframe</span>
                                        <div className="px-5 py-1.5 bg-gradient-to-r from-purple-900 to-indigo-900 border border-purple-400/50 text-xs font-black rounded-lg shadow-[0_0_15px_rgba(168,85,247,0.4)] text-white">
                                            {currentTF}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex bg-black/40 rounded-2xl border border-white/10 divide-x divide-white/10 shadow-inner">
                                    <CompactSpeedometer value={metrics.strength} label="STRENGTH" color="#d946ef" />
                                    <CompactSpeedometer value={metrics.vol} label="VOLUME" color="#a855f7" />
                                    <CompactSpeedometer value={metrics.liq} label="LIQUIDITY" color="#6366f1" />
                                </div>
                            </div>

                            <div className={`flex-1 rounded-[2rem] overflow-hidden bg-[rgba(5,2,10,0.8)] border relative flex flex-col min-h-[350px] w-full transition-all duration-700 ${appState === 'ZONE_DETECTED' || appState === 'PREPARING' ? 'border-fuchsia-500 shadow-[0_0_50px_rgba(217,70,239,0.2)]' : 'border-purple-500/20 shadow-[inset_0_0_50px_rgba(0,0,0,0.8)]'}`}>
                                
                                {appState === 'SCANNING' && <ScannerHUD data={chartDataForScanner} tf={currentTF} />}

                                {appState === 'PREPARING' && prepCountdown !== null && (
                                    <div className="absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center backdrop-blur-md">
                                        <span className="text-base font-black text-fuchsia-400 tracking-[0.3em] uppercase mb-6 animate-pulse">Вход в позицию 1H через...</span>
                                        <div className="text-8xl font-black text-white drop-shadow-[0_0_50px_rgba(217,70,239,1)] mono-font">{prepCountdown}</div>
                                    </div>
                                )}

                                <div className={`absolute top-5 left-5 z-20 bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10 flex flex-col pointer-events-none transition-opacity ${appState === 'SCANNING' ? 'opacity-0' : 'opacity-100'}`}>
                                    <span className="text-xl font-black text-white oswald-font tracking-widest drop-shadow-md">BTC/USDT</span>
                                    <span className="text-sm text-fuchsia-300 font-mono font-bold mt-1">Price: {formatPrice(currentPrice.current)}</span>
                                </div>
                                
                                <div ref={chartContainerRef} className="absolute inset-0 w-full h-full z-10" style={{ opacity: appState === 'SCANNING' ? 0.05 : 1 }} />
                                
                                <ChartOverlays 
                                    chart={chartInstance.current} series={candleSeries.current} 
                                    trades={tradesHistory} activeTrade={activeTrade} zoneInfo={zoneInfo} 
                                    isFocusMode={appState === 'ZONE_DETECTED' || appState === 'PREPARING'} 
                                    replayTrade={replayTrade} slCountdown={slCountdown}
                                />
                            </div>

                            <div className="shrink-0">
                                <BookflowButton />
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Controls */}
                        <div className="w-full xl:w-[380px] flex flex-col gap-5 overflow-hidden shrink-0 h-[400px] xl:h-full">
                            
                            <div className="glass-panel-heavy p-4 rounded-2xl flex items-center justify-between shrink-0">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-full border border-purple-400/50 bg-purple-900/40 flex items-center justify-center shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                                        <Cpu size={24} className="text-purple-300" />
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase leading-none mb-1.5">Architecture by</span>
                                        <span className="text-base font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-purple-200 tracking-widest uppercase leading-none">SLAVA GORDEEV</span>
                                    </div>
                                </div>
                            </div>

                            <div className="luxury-card p-5 rounded-2xl flex flex-col gap-3 shrink-0">
                                <h3 className="text-[12px] font-black tracking-[0.15em] uppercase text-purple-300 mb-2 border-b border-purple-500/20 pb-2">Общая Статистика (1H)</h3>
                                <div className="grid grid-cols-2 gap-x-6 gap-y-3 text-sm font-mono">
                                    <div className="flex justify-between text-slate-400"><span>Сделок:</span> <span className="text-white font-black">{stats.total}</span></div>
                                    <div className="flex justify-between text-slate-400"><span>Винрейт:</span> <span className="text-fuchsia-400 font-black">{stats.winrate}%</span></div>
                                    <div className="flex justify-between text-slate-400"><span>Успех:</span> <span className="text-emerald-400 font-black">{stats.wins}</span></div>
                                    <div className="flex justify-between text-slate-400"><span>Убыток:</span> <span className="text-rose-400 font-black">{stats.losses}</span></div>
                                </div>
                            </div>

                            <div className="h-40 shrink-0">
                                <OrderBookDepth price={currentPrice.current} />
                            </div>

                            <div className={`p-5 rounded-2xl border transition-all duration-500 flex flex-col gap-3 shrink-0 ${activeTrade ? 'bg-gradient-to-br from-purple-900/50 to-indigo-900/50 border-fuchsia-500/50 shadow-[0_0_25px_rgba(217,70,239,0.3)]' : 'bg-black/40 border-white/10 shadow-inner'}`}>
                                <h3 className="text-[12px] font-black tracking-[0.15em] uppercase text-purple-300 mb-1 border-b border-white/10 pb-2 flex justify-between items-center">
                                    <span>STATUS: POSITION</span>
                                    {activeTrade && (activeTrade.isLong ? <ArrowUp className="text-emerald-400 w-6 h-6 drop-shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-bounce" /> : <ArrowDown className="text-rose-400 w-6 h-6 drop-shadow-[0_0_8px_rgba(225,29,72,0.8)] animate-bounce" />)}
                                </h3>
                                {activeTrade ? (
                                    <div className="flex flex-col gap-2.5 text-sm font-mono mt-1">
                                        <div className="flex justify-between text-slate-300">
                                            <span>Направление:</span> 
                                            <span className={`font-black uppercase px-2 py-0.5 rounded ${activeTrade.isLong ? 'bg-emerald-900/50 text-emerald-400' : 'bg-rose-900/50 text-rose-400'}`}>{activeTrade.type} 1H</span>
                                        </div>
                                        <div className="flex justify-between text-slate-300">
                                            <span>Риск / Объем:</span> 
                                            <span className="text-white font-bold">{activeTrade.stakeAmount?.toFixed(2)} USDT</span>
                                        </div>
                                        <div className="flex justify-between text-slate-300">
                                            <span>Цена входа:</span> 
                                            <span className="text-white font-bold drop-shadow-md">{formatPrice(activeTrade.entryPrice)}</span>
                                        </div>
                                        <div className="mt-2 bg-black/30 p-2 rounded border border-white/5 flex items-center justify-center gap-3">
                                            <div className="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_10px_#34d399]"></div>
                                            <span className="text-[11px] text-emerald-300 font-bold tracking-widest uppercase">Сделка в работе</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center justify-center h-full gap-3 text-slate-400 py-4">
                                        {appState === 'SCANNING' ? <Radar size={28} className="animate-spin text-purple-500 opacity-60" /> : <Clock size={28} className="text-slate-600" />} 
                                        <span className="text-xs font-mono font-bold uppercase tracking-widest">{appState === 'SCANNING' ? 'Поиск 1H паттернов...' : 'Ожидание...'}</span>
                                    </div>
                                )}
                            </div>

                            <div className="flex-1 luxury-card rounded-2xl p-5 flex flex-col overflow-hidden">
                                <h3 className="text-sm font-black tracking-widest text-slate-200 uppercase oswald-font mb-4 border-b border-purple-500/30 pb-2">Журнал Сделок (1H)</h3>
                                <div className="flex-1 overflow-y-auto journal-scroll pr-2 flex flex-col gap-2.5">
                                    {tradesHistory.length === 0 ? (
                                        <div className="text-xs text-slate-500 text-center font-mono mt-6">Ожидание первых сделок...</div>
                                    ) : tradesHistory.map((t, idx) => (
                                        <div key={t.id || idx} className="bg-black/50 p-3.5 rounded-xl border border-white/5 flex flex-col gap-2 hover:border-purple-500/40 hover:bg-[#120920] transition-all cursor-default group">
                                            <div className="flex justify-between items-center">
                                                <span className={`text-[10px] font-black tracking-widest uppercase px-2 py-1 rounded shadow-inner ${t.type === 'LONG' ? 'bg-emerald-900/40 text-emerald-400 border border-emerald-500/20' : 'bg-rose-900/40 text-rose-400 border border-rose-500/20'}`}>{t.type}</span>
                                                <span className={`text-sm font-black ${t.result?.includes('WIN') ? 'text-emerald-400' : 'text-rose-500'}`}>{t.pnl > 0 ? '+' : ''}{t.pnl?.toFixed(2)}$</span>
                                            </div>
                                            <div className="flex justify-between text-[10px] font-mono text-slate-400 group-hover:text-slate-300 transition-colors">
                                                <span>IN: {formatPrice(t.entryPrice)}</span>
                                                <span>OUT: {formatPrice(t.closePrice)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
